script:
  medikament_bestand_sync:
    alias: "Medikament – Bestand zu Google Sheets"
    mode: parallel
    fields:
      med_nr:
        description: "Medikament Nummer (1-6)"
    sequence:
      - condition: template
        value_template: "{{ is_state('input_boolean.medikament_' ~ med_nr ~ '_aktiv', 'on') }}"
      - variables:
          vorrat: "{{ states('input_number.medikament_' ~ med_nr ~ '_vorrat') | float(0) }}"
          warnung: "{{ states('input_number.medikament_' ~ med_nr ~ '_vorrat_warnung') | int(10) }}"
          menge_str: "{{ states('input_select.medikament_' ~ med_nr ~ '_menge') }}"
          menge_faktor: >-
            {% set m = states('input_select.medikament_' ~ med_nr ~ '_menge') %}
            {% if m == '½ Tablette' %}{{ 0.5 }}
            {% elif m == '¼ Tablette' %}{{ 0.25 }}
            {% elif m == '2 Tabletten' %}{{ 2 }}
            {% elif m == '1½ Tabletten' %}{{ 1.5 }}
            {% else %}{{ 1 }}{% endif %}
      - service: rest_command.medikament_sheets_bestand
        data:
          medikament: "{{ states('input_text.medikament_' ~ med_nr ~ '_name') or ('Medikament ' ~ med_nr) }}"
          pzn: "{{ states('input_text.medikament_' ~ med_nr ~ '_pzn') }}"
          dosierung: "{{ states('input_text.medikament_' ~ med_nr ~ '_dosierung') }}"
          menge: "{{ menge_str }}"
          vorrat: "{{ vorrat }}"
          dosen: "{{ (vorrat | float / menge_faktor | float) | round(0) | int }}"
          packung: "{{ states('input_number.medikament_' ~ med_nr ~ '_packung_groesse') | int(0) }}"
          warnung: "{{ warnung }}"
          status: "{{ '⚠️ Niedrig' if vorrat | float <= warnung | float else '✅ OK' }}"

  medikament_reset:
    alias: "Medikament – Alles zurücksetzen"
    mode: parallel
    fields:
      med_nr:
        description: "Medikament Nummer (1-6)"
    sequence:
      - service: input_text.set_value
        target:
          entity_id: "input_text.medikament_{{ med_nr }}_name"
        data:
          value: ""
      - service: input_text.set_value
        target:
          entity_id: "input_text.medikament_{{ med_nr }}_pzn"
        data:
          value: ""
      - service: input_text.set_value
        target:
          entity_id: "input_text.medikament_{{ med_nr }}_dosierung"
        data:
          value: ""
      - service: input_text.set_value
        target:
          entity_id: "input_text.medikament_{{ med_nr }}_hinweis"
        data:
          value: ""
      - service: input_boolean.turn_off
        target:
          entity_id: "input_boolean.medikament_{{ med_nr }}_aktiv"
      - service: input_boolean.turn_off
        target:
          entity_id: "input_boolean.medikament_{{ med_nr }}_offen"
      - service: input_boolean.turn_off
        target:
          entity_id: "input_boolean.medikament_{{ med_nr }}_morgen_aktiv"
      - service: input_boolean.turn_off
        target:
          entity_id: "input_boolean.medikament_{{ med_nr }}_mittag_aktiv"
      - service: input_boolean.turn_off
        target:
          entity_id: "input_boolean.medikament_{{ med_nr }}_abend_aktiv"
      - service: input_number.set_value
        target:
          entity_id: "input_number.medikament_{{ med_nr }}_vorrat"
        data:
          value: 0
      - service: input_number.set_value
        target:
          entity_id: "input_number.medikament_{{ med_nr }}_vorrat_warnung"
        data:
          value: 10
      - service: input_number.set_value
        target:
          entity_id: "input_number.medikament_{{ med_nr }}_packung_groesse"
        data:
          value: 1
      - service: input_select.select_option
        target:
          entity_id: "input_select.medikament_{{ med_nr }}_tage"
        data:
          option: "Täglich"
      - service: input_select.select_option
        target:
          entity_id: "input_select.medikament_{{ med_nr }}_mahlzeit"
        data:
          option: "Egal"
      - service: input_select.select_option
        target:
          entity_id: "input_select.medikament_{{ med_nr }}_menge"
        data:
          option: "1 Tablette"
      - service: input_datetime.set_datetime
        target:
          entity_id: "input_datetime.medikament_{{ med_nr }}_letzte_einnahme"
        data:
          datetime: "2000-01-01 00:00:00"
      - service: input_datetime.set_datetime
        target:
          entity_id: "input_datetime.medikament_{{ med_nr }}_morgen_einnahme"
        data:
          datetime: "2000-01-01 00:00:00"
      - service: input_datetime.set_datetime
        target:
          entity_id: "input_datetime.medikament_{{ med_nr }}_mittag_einnahme"
        data:
          datetime: "2000-01-01 00:00:00"
      - service: input_datetime.set_datetime
        target:
          entity_id: "input_datetime.medikament_{{ med_nr }}_abend_einnahme"
        data:
          datetime: "2000-01-01 00:00:00"

  medikament_arznei_hinzufuegen:
    alias: "Medikament – Zur Arznei-Liste hinzufügen"
    mode: parallel
    fields:
      med_nr:
        description: "Medikament Nummer (1-6)"
    sequence:
      - service: todo.add_item
        target:
          entity_id: todo.arznei
        data:
          item: >-
            {{ states('input_text.medikament_' ~ med_nr ~ '_name') or ('Medikament ' ~ med_nr) -}}
            {% set pzn = states('input_text.medikament_' ~ med_nr ~ '_pzn') -%}
            {% if pzn | trim != '' %} · PZN {{ pzn }}{% endif %}
            ({{ states('input_number.medikament_' ~ med_nr ~ '_vorrat') | float(0) | round(2) | string | replace('.0','') }} übrig)

  medikament_packung_hinzufuegen:
    alias: "Medikament – Packung einbuchen"
    mode: parallel
    fields:
      med_nr:
        description: "Medikament Nummer (1-6)"
    sequence:
      - service: input_number.set_value
        target:
          entity_id: "input_number.medikament_{{ med_nr }}_vorrat"
        data:
          value: >-
            {{ (states('input_number.medikament_' ~ med_nr ~ '_vorrat') | int(0)) +
               (states('input_number.medikament_' ~ med_nr ~ '_packung_groesse') | int(1)) }}
      - service: script.medikament_bestand_sync
        data:
          med_nr: "{{ med_nr }}"

  medikament_genommen:
    alias: "Medikament – Als genommen markieren"
    mode: parallel
    fields:
      med_nr:
        description: "Medikament Nummer (1-6)"
    sequence:
      - variables:
          item_alt: >-
            {{ states('input_text.medikament_' ~ med_nr ~ '_name') or ('Medikament ' ~ med_nr) -}}
            {%- set pzn = states('input_text.medikament_' ~ med_nr ~ '_pzn') | trim -%}
            {%- if pzn != '' %} · PZN {{ pzn }}{%- endif %} ({{ states('input_number.medikament_' ~ med_nr ~ '_vorrat') | float(0) | round(2) | string | replace('.0','') }} übrig)
      - service: input_boolean.turn_off
        target:
          entity_id: "input_boolean.medikament_{{ med_nr }}_offen"
      - service: input_datetime.set_datetime
        target:
          entity_id: "input_datetime.medikament_{{ med_nr }}_letzte_einnahme"
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: input_number.set_value
        target:
          entity_id: "input_number.medikament_{{ med_nr }}_vorrat"
        data:
          value: >-
            {% set m = states('input_select.medikament_' ~ med_nr ~ '_menge') %}
            {% if m == '½ Tablette' %}{% set abzug = 0.5 %}
            {% elif m == '¼ Tablette' %}{% set abzug = 0.25 %}
            {% elif m == '2 Tabletten' %}{% set abzug = 2 %}
            {% elif m == '1½ Tabletten' %}{% set abzug = 1.5 %}
            {% else %}{% set abzug = 1 %}{% endif %}
            {{ [0, (states('input_number.medikament_' ~ med_nr ~ '_vorrat') | float(0)) - abzug] | max }}
      - variables:
          slot_key: >-
            {% set h = now().hour %}
            {{ 'morgen' if h < 12 else ('mittag' if h < 17 else 'abend') }}
          slot_label: >-
            {% set h = now().hour %}
            {{ 'Morgens' if h < 12 else ('Mittags' if h < 17 else 'Abends') }}
      - service: input_datetime.set_datetime
        target:
          entity_id: "input_datetime.medikament_{{ med_nr }}_{{ slot_key }}_einnahme"
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: shell_command.medikament_csv_init
      - service: shell_command.medikament_csv_log
        data:
          ZEILE: >-
            {{ now().strftime('%d.%m.%Y') }},{{ ['Mo','Di','Mi','Do','Fr','Sa','So'][now().weekday()] }},{{ now().strftime('%H:%M') }},{{ states('input_text.medikament_' ~ med_nr ~ '_name') or ('Medikament ' ~ med_nr) }},{{ slot_label }},{{ states('input_text.medikament_' ~ med_nr ~ '_dosierung') or '-' }},{{ states('input_select.medikament_' ~ med_nr ~ '_menge') or '1 Tablette' }}
      - service: rest_command.medikament_sheets_log
        data:
          datum: "{{ now().strftime('%d.%m.%Y') }}"
          wochentag: "{{ ['Mo','Di','Mi','Do','Fr','Sa','So'][now().weekday()] }}"
          uhrzeit: "{{ now().strftime('%H:%M') }}"
          medikament: "{{ states('input_text.medikament_' ~ med_nr ~ '_name') or ('Medikament ' ~ med_nr) }}"
          slot: "{{ slot_label }}"
          dosierung: "{{ states('input_text.medikament_' ~ med_nr ~ '_dosierung') or '-' }}"
          menge: "{{ states('input_select.medikament_' ~ med_nr ~ '_menge') or '1 Tablette' }}"
      - service: script.medikament_bestand_sync
        data:
          med_nr: "{{ med_nr }}"
      - variables:
          item_neu: >-
            {{ states('input_text.medikament_' ~ med_nr ~ '_name') or ('Medikament ' ~ med_nr) -}}
            {%- set pzn = states('input_text.medikament_' ~ med_nr ~ '_pzn') | trim -%}
            {%- if pzn != '' %} · PZN {{ pzn }}{%- endif %} ({{ states('input_number.medikament_' ~ med_nr ~ '_vorrat') | float(0) | round(2) | string | replace('.0','') }} übrig)
      - service: todo.update_item
        target:
          entity_id: todo.arznei
        data:
          item: "{{ item_alt }}"
          rename: "{{ item_neu }}"
        continue_on_error: true
      - variables:
          tg_name: "{{ states('input_text.medikament_' ~ med_nr ~ '_name') or ('Medikament ' ~ med_nr) }}"
          tg_vorrat: "{{ states('input_number.medikament_' ~ med_nr ~ '_vorrat') | float(0) | round(2) | string | replace('.0','') }}"
          tg_pkg: "{{ states('input_number.medikament_' ~ med_nr ~ '_packung_groesse') | int(0) }}"
          tg_warnung: "{{ states('input_number.medikament_' ~ med_nr ~ '_vorrat_warnung') | int(10) }}"
          tg_dos: "{{ states('input_text.medikament_' ~ med_nr ~ '_dosierung') }}"
          tg_menge: "{{ states('input_select.medikament_' ~ med_nr ~ '_menge') }}"
          tg_mahlzeit: "{{ states('input_select.medikament_' ~ med_nr ~ '_mahlzeit') }}"
          tg_hin: "{{ states('input_text.medikament_' ~ med_nr ~ '_hinweis') }}"
      - service: telegram_bot.send_message
        data:
          target:
            - 988178587
          parse_mode: html
          message: >-
            ✅ <b>{{ tg_name }}</b> – genommen
            {{ '\n' }}🕐 {{ now().strftime('%H:%M') }} Uhr
            {{ '\n' }}💊 {{ tg_menge }}{%- if tg_dos | trim != '' %} · {{ tg_dos }}{%- endif %}
            {{ '\n' }}📦 Vorrat: {{ tg_vorrat }} Stück{%- if tg_pkg > 0 %} (≈{{ (tg_vorrat / tg_pkg) | round(1) }} Pkg.){%- endif %}
            {%- if tg_mahlzeit != 'Egal' %}
            {{ '\n' }}🍽️ {{ tg_mahlzeit }}
            {%- endif %}
            {%- if tg_vorrat <= tg_warnung %}
            {{ '\n' }}⚠️ <b>Nachbestellen!</b> Warnung ab {{ tg_warnung }} Stück
            {%- endif %}
            {%- if tg_hin | trim != '' %}
            {{ '\n' }}💬 {{ tg_hin }}
            {%- endif %}

  medikament_alarm:
    alias: "Medikamente - Licht & TTS Alarm"
    mode: parallel
    fields:
      nachricht:
        description: "TTS Nachricht"
        default: "Nimm deine Medikamente!"
    sequence:
      - service: scene.create
        data:
          scene_id: medikament_licht_backup
          snapshot_entities:
            - light.schlafzimmer
      - variables:
          war_am_spielen: "{{ is_state('media_player.schlafzimmer_3', 'playing') }}"
          vol_vorher: "{{ state_attr('media_player.schlafzimmer_3', 'volume_level') | float(0.1) }}"
      - if:
          - condition: template
            value_template: "{{ war_am_spielen }}"
        then:
          - service: media_player.media_pause
            target:
              entity_id: media_player.schlafzimmer_3
          - delay:
              seconds: 1
      - service: media_player.volume_set
        target:
          entity_id: media_player.schlafzimmer_3
        data:
          volume_level: 0.5
      - delay:
          seconds: 4
      - parallel:
          - sequence:
              - repeat:
                  count: 15
                  sequence:
                    - service: light.turn_on
                      target:
                        entity_id: light.schlafzimmer
                      data:
                        rgb_color: [255, 0, 0]
                        brightness: 255
                        transition: 0.6
                    - delay:
                        milliseconds: 700
                    - service: light.turn_on
                      target:
                        entity_id: light.schlafzimmer
                      data:
                        rgb_color: [255, 0, 0]
                        brightness: 30
                        transition: 0.6
                    - delay:
                        milliseconds: 700
          - sequence:
              - service: tts.speak
                target:
                  entity_id: tts.home_assistant_cloud
                data:
                  media_player_entity_id: media_player.schlafzimmer_3
                  message: "{{ nachricht }}"
              - wait_template: "{{ not is_state('media_player.schlafzimmer_3', 'playing') }}"
                timeout:
                  seconds: 30
                continue_on_timeout: true
              - delay:
                  seconds: 2
      - service: scene.turn_on
        target:
          entity_id: scene.medikament_licht_backup
      - service: media_player.volume_set
        target:
          entity_id: media_player.schlafzimmer_3
        data:
          volume_level: "{{ vol_vorher }}"
      - if:
          - condition: template
            value_template: "{{ war_am_spielen }}"
        then:
          - service: media_player.media_play
            target:
              entity_id: media_player.schlafzimmer_3


automation:
  # ── Erinnerung starten ────────────────────────────────────────────────────
  - id: medikament_erinnerung_start
    alias: "Medikamente - Erinnerung starten"
    description: "Morgens/Mittags/Abends je nach aktiven Zeitslots, mit Wochentag-Prüfung"
    trigger:
      - { platform: time, at: input_datetime.medikament_1_zeit,        id: med1_morgen }
      - { platform: time, at: input_datetime.medikament_1_mittag_zeit, id: med1_mittag }
      - { platform: time, at: input_datetime.medikament_1_abend_zeit,  id: med1_abend  }
      - { platform: time, at: input_datetime.medikament_2_zeit,        id: med2_morgen }
      - { platform: time, at: input_datetime.medikament_2_mittag_zeit, id: med2_mittag }
      - { platform: time, at: input_datetime.medikament_2_abend_zeit,  id: med2_abend  }
      - { platform: time, at: input_datetime.medikament_3_zeit,        id: med3_morgen }
      - { platform: time, at: input_datetime.medikament_3_mittag_zeit, id: med3_mittag }
      - { platform: time, at: input_datetime.medikament_3_abend_zeit,  id: med3_abend  }
      - { platform: time, at: input_datetime.medikament_4_zeit,        id: med4_morgen }
      - { platform: time, at: input_datetime.medikament_4_mittag_zeit, id: med4_mittag }
      - { platform: time, at: input_datetime.medikament_4_abend_zeit,  id: med4_abend  }
      - { platform: time, at: input_datetime.medikament_5_zeit,        id: med5_morgen }
      - { platform: time, at: input_datetime.medikament_5_mittag_zeit, id: med5_mittag }
      - { platform: time, at: input_datetime.medikament_5_abend_zeit,  id: med5_abend  }
      - { platform: time, at: input_datetime.medikament_6_zeit,        id: med6_morgen }
      - { platform: time, at: input_datetime.medikament_6_mittag_zeit, id: med6_mittag }
      - { platform: time, at: input_datetime.medikament_6_abend_zeit,  id: med6_abend  }
    action:
      - variables:
          med_nr: >-
            {% set ids = {'med1_morgen':1,'med1_mittag':1,'med1_abend':1,
                          'med2_morgen':2,'med2_mittag':2,'med2_abend':2,
                          'med3_morgen':3,'med3_mittag':3,'med3_abend':3,
                          'med4_morgen':4,'med4_mittag':4,'med4_abend':4,
                          'med5_morgen':5,'med5_mittag':5,'med5_abend':5,
                          'med6_morgen':6,'med6_mittag':6,'med6_abend':6} %}
            {{ ids[trigger.id] }}
          zeitslot: >-
            {% if 'morgen' in trigger.id %}Morgens
            {% elif 'mittag' in trigger.id %}Mittags
            {% else %}Abends{% endif %}
          slot_bool: >-
            {% if 'morgen' in trigger.id %}morgen
            {% elif 'mittag' in trigger.id %}mittag
            {% else %}abend{% endif %}
      - condition: template
        value_template: >-
          {{ is_state('input_boolean.medikament_' ~ med_nr ~ '_aktiv', 'on') and
             is_state('input_boolean.medikament_' ~ med_nr ~ '_' ~ slot_bool ~ '_aktiv', 'on') }}
      - condition: template
        value_template: >-
          {% set t = states('input_select.medikament_' ~ med_nr ~ '_tage') %}
          {% set w = now().weekday() %}
          {{ t == 'Täglich' or
             (t == 'Werktags (Mo–Fr)' and w < 5) or
             (t == 'Wochenende (Sa+So)' and w >= 5) or
             (t == 'Mo / Mi / Fr' and w in [0,2,4]) or
             (t == 'Di / Do / Sa' and w in [1,3,5]) or
             (t == 'Mo / Do' and w in [0,3]) }}
      - service: input_boolean.turn_on
        target:
          entity_id: "input_boolean.medikament_{{ med_nr }}_offen"
      - variables:
          med_name: "{{ states('input_text.medikament_' ~ med_nr ~ '_name') or ('Medikament ' ~ med_nr) }}"
          dos: "{{ states('input_text.medikament_' ~ med_nr ~ '_dosierung') }}"
          mahlzeit: "{{ states('input_select.medikament_' ~ med_nr ~ '_mahlzeit') }}"
          hin: "{{ states('input_text.medikament_' ~ med_nr ~ '_hinweis') }}"
          vorrat: "{{ states('input_number.medikament_' ~ med_nr ~ '_vorrat') | int(0) }}"
          pkg: "{{ states('input_number.medikament_' ~ med_nr ~ '_packung_groesse') | int(0) }}"
          warnung: "{{ states('input_number.medikament_' ~ med_nr ~ '_vorrat_warnung') | int(10) }}"
          letzte: "{{ states('input_datetime.medikament_' ~ med_nr ~ '_letzte_einnahme') }}"
          msg: >-
            {{ zeitslot }}{%- if dos | trim != '' %} · {{ dos }}{% endif %}{%- if mahlzeit != 'Egal' %} · {{ mahlzeit }}{% endif %}
            {{ '\n' }}📦 {{ vorrat }} Stück{%- if pkg | int > 0 %} (≈{{ (vorrat | int / pkg | int) | round(1) }} Pkg.){%- endif %}{%- if vorrat | int <= warnung | int %} ⚠️ Nachbestellen!{% endif %}
            {%- if letzte not in ['unavailable','unknown','2000-01-01 00:00:00'] %}
            {{ '\n' }}🕐 Zuletzt: {%- if (as_timestamp(letzte)|timestamp_custom('%Y-%m-%d')) == now().strftime('%Y-%m-%d') %} Heute {{ as_timestamp(letzte)|timestamp_custom('%H:%M') }} Uhr{% else %} {{ as_timestamp(letzte)|timestamp_custom('%d.%m.%Y %H:%M') }}{% endif %}
            {%- endif %}
            {%- if hin | trim != '' %}
            {{ '\n' }}💬 {{ hin }}
            {%- endif %}
      - if:
          - condition: state
            entity_id: input_boolean.medikament_testmodus
            state: "on"
        then:
          - service: telegram_bot.send_message
            data:
              target:
                - 988178587
              parse_mode: html
              message: >-
                🧪 <b>TESTMODUS</b> | 💊 <b>{{ med_name }}</b>
                {{ zeitslot }}{%- if dos | trim != '' %} · {{ dos }}{% endif %}{%- if mahlzeit != 'Egal' %} · {{ mahlzeit }}{% endif %}
                📦 {{ vorrat }} Stück{%- if pkg | int > 0 %} (≈{{ (vorrat | int / pkg | int) | round(1) }} Pkg.){%- endif %}{%- if vorrat | int <= warnung | int %} ⚠️ Nachbestellen!{% endif %}
                {%- if letzte not in ['unavailable','unknown','2000-01-01 00:00:00'] %}
                🕐 Zuletzt: {%- if (as_timestamp(letzte)|timestamp_custom('%Y-%m-%d')) == now().strftime('%Y-%m-%d') %} Heute {{ as_timestamp(letzte)|timestamp_custom('%H:%M') }} Uhr{% else %} {{ as_timestamp(letzte)|timestamp_custom('%d.%m.%Y %H:%M') }}{% endif %}
                {%- endif %}
                {%- if hin | trim != '' %}💬 {{ hin }}{% endif %}
                <i>(Keine Alarme, kein TTS, kein Licht)</i>
        else:
          - service: notify.mobile_app_andreas_iphone_15pro_max
            data:
              title: "💊 {{ med_name }}"
              message: "{{ msg }}"
              data:
                actions:
                  - action: "MEDIKAMENT_{{ med_nr }}_BESTAETIGT"
                    title: "✅ Genommen"
                push:
                  sound:
                    name: default
                    critical: 1
                    volume: 1.0
                  interruption-level: critical
          - if:
              - condition: state
                entity_id: person.andreas
                state: "home"
            then:
              - service: script.medikament_alarm
                data:
                  nachricht: >-
                    Nimm deine Medikamente. {{ med_name }}.
                    {{ zeitslot }}.
                    {%- if mahlzeit != 'Egal' %} {{ mahlzeit }}.{% endif %}
    mode: parallel

  # ── Wiederholen alle 15 Minuten ────────────────────────────────────────────
  - id: medikament_erinnerung_wiederholen
    alias: "Medikamente - Erinnerung wiederholen"
    trigger:
      - platform: time_pattern
        minutes: "/15"
    condition:
      - condition: or
        conditions:
          - condition: state
            entity_id: input_boolean.medikament_1_offen
            state: "on"
          - condition: state
            entity_id: input_boolean.medikament_2_offen
            state: "on"
          - condition: state
            entity_id: input_boolean.medikament_3_offen
            state: "on"
          - condition: state
            entity_id: input_boolean.medikament_4_offen
            state: "on"
          - condition: state
            entity_id: input_boolean.medikament_5_offen
            state: "on"
          - condition: state
            entity_id: input_boolean.medikament_6_offen
            state: "on"
    action:
      - repeat:
          for_each: [1, 2, 3, 4, 5, 6]
          sequence:
            - if:
                - condition: template
                  value_template: "{{ is_state('input_boolean.medikament_' ~ repeat.item ~ '_offen', 'on') }}"
              then:
                - variables:
                    med_name: "{{ states('input_text.medikament_' ~ repeat.item ~ '_name') or ('Medikament ' ~ repeat.item) }}"
                    dos: "{{ states('input_text.medikament_' ~ repeat.item ~ '_dosierung') }}"
                    mahlzeit: "{{ states('input_select.medikament_' ~ repeat.item ~ '_mahlzeit') }}"
                - if:
                    - condition: state
                      entity_id: input_boolean.medikament_testmodus
                      state: "on"
                  then:
                    - service: telegram_bot.send_message
                      data:
                        target:
                          - 988178587
                        parse_mode: html
                        message: >-
                          🧪 <b>TESTMODUS</b> | 💊 <b>{{ med_name }}</b> – ⚠️ Noch offen
                          {%- if dos | trim != '' %} · {{ dos }}{% endif %}{%- if mahlzeit != 'Egal' %} · {{ mahlzeit }}{% endif %}
                          <i>(Wiederholung – keine Alarme)</i>
                  else:
                    - service: notify.mobile_app_andreas_iphone_15pro_max
                      data:
                        title: "💊 {{ med_name }} – ⚠️ Noch offen"
                        message: >-
                          Noch nicht genommen!
                          {%- if dos | trim != '' %} {{ dos }}{% endif %}
                          {%- if mahlzeit != 'Egal' %} · {{ mahlzeit }}{% endif %}
                        data:
                          actions:
                            - action: "MEDIKAMENT_{{ repeat.item }}_BESTAETIGT"
                              title: "✅ Genommen"
                          push:
                            sound:
                              name: default
                              critical: 1
                              volume: 1.0
                            interruption-level: critical
                    - if:
                        - condition: state
                          entity_id: person.andreas
                          state: "home"
                      then:
                        - service: script.medikament_alarm
                          data:
                            nachricht: >-
                              Medikament noch nicht genommen!
                              {{ states('input_text.medikament_' ~ repeat.item ~ '_name') or ('Medikament ' ~ repeat.item) }}
    mode: single

  # ── Bestätigung ────────────────────────────────────────────────────────────
  - id: medikament_erinnerung_bestaetigt
    alias: "Medikamente - Bestätigt"
    description: "Einnahme protokollieren, Vorrat reduzieren, Licht grün"
    trigger:
      - { platform: event, event_type: mobile_app_notification_action, event_data: { action: MEDIKAMENT_1_BESTAETIGT }, id: best1 }
      - { platform: event, event_type: mobile_app_notification_action, event_data: { action: MEDIKAMENT_2_BESTAETIGT }, id: best2 }
      - { platform: event, event_type: mobile_app_notification_action, event_data: { action: MEDIKAMENT_3_BESTAETIGT }, id: best3 }
      - { platform: event, event_type: mobile_app_notification_action, event_data: { action: MEDIKAMENT_4_BESTAETIGT }, id: best4 }
      - { platform: event, event_type: mobile_app_notification_action, event_data: { action: MEDIKAMENT_5_BESTAETIGT }, id: best5 }
      - { platform: event, event_type: mobile_app_notification_action, event_data: { action: MEDIKAMENT_6_BESTAETIGT }, id: best6 }
    action:
      - variables:
          med_nr: >-
            {% set ids = {'best1':1,'best2':2,'best3':3,'best4':4,'best5':5,'best6':6} %}
            {{ ids[trigger.id] }}
          item_alt: >-
            {{ states('input_text.medikament_' ~ med_nr ~ '_name') or ('Medikament ' ~ med_nr) -}}
            {%- set pzn = states('input_text.medikament_' ~ med_nr ~ '_pzn') | trim -%}
            {%- if pzn != '' %} · PZN {{ pzn }}{%- endif %} ({{ states('input_number.medikament_' ~ med_nr ~ '_vorrat') | float(0) | round(2) | string | replace('.0','') }} übrig)
      - condition: template
        value_template: "{{ is_state('input_boolean.medikament_' ~ med_nr ~ '_offen', 'on') }}"
      - service: input_boolean.turn_off
        target:
          entity_id: "input_boolean.medikament_{{ med_nr }}_offen"
      - service: input_datetime.set_datetime
        target:
          entity_id: "input_datetime.medikament_{{ med_nr }}_letzte_einnahme"
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: input_number.set_value
        target:
          entity_id: "input_number.medikament_{{ med_nr }}_vorrat"
        data:
          value: >-
            {% set m = states('input_select.medikament_' ~ med_nr ~ '_menge') %}
            {% if m == '½ Tablette' %}{% set abzug = 0.5 %}
            {% elif m == '¼ Tablette' %}{% set abzug = 0.25 %}
            {% elif m == '2 Tabletten' %}{% set abzug = 2 %}
            {% elif m == '1½ Tabletten' %}{% set abzug = 1.5 %}
            {% else %}{% set abzug = 1 %}{% endif %}
            {{ [0, (states('input_number.medikament_' ~ med_nr ~ '_vorrat') | float(0)) - abzug] | max }}
      - variables:
          slot_key: >-
            {% set h = now().hour %}
            {{ 'morgen' if h < 12 else ('mittag' if h < 17 else 'abend') }}
          slot_label: >-
            {% set h = now().hour %}
            {{ 'Morgens' if h < 12 else ('Mittags' if h < 17 else 'Abends') }}
      - service: input_datetime.set_datetime
        target:
          entity_id: "input_datetime.medikament_{{ med_nr }}_{{ slot_key }}_einnahme"
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: shell_command.medikament_csv_init
      - service: shell_command.medikament_csv_log
        data:
          ZEILE: >-
            {{ now().strftime('%d.%m.%Y') }},{{ ['Mo','Di','Mi','Do','Fr','Sa','So'][now().weekday()] }},{{ now().strftime('%H:%M') }},{{ states('input_text.medikament_' ~ med_nr ~ '_name') or ('Medikament ' ~ med_nr) }},{{ slot_label }},{{ states('input_text.medikament_' ~ med_nr ~ '_dosierung') or '-' }},{{ states('input_select.medikament_' ~ med_nr ~ '_menge') or '1 Tablette' }}
      - service: rest_command.medikament_sheets_log
        data:
          datum: "{{ now().strftime('%d.%m.%Y') }}"
          wochentag: "{{ ['Mo','Di','Mi','Do','Fr','Sa','So'][now().weekday()] }}"
          uhrzeit: "{{ now().strftime('%H:%M') }}"
          medikament: "{{ states('input_text.medikament_' ~ med_nr ~ '_name') or ('Medikament ' ~ med_nr) }}"
          slot: "{{ slot_label }}"
          dosierung: "{{ states('input_text.medikament_' ~ med_nr ~ '_dosierung') or '-' }}"
          menge: "{{ states('input_select.medikament_' ~ med_nr ~ '_menge') or '1 Tablette' }}"
      - service: todo.update_item
        target:
          entity_id: todo.arznei
        data:
          item: "{{ item_alt }}"
          rename: >-
            {{ states('input_text.medikament_' ~ med_nr ~ '_name') or ('Medikament ' ~ med_nr) -}}
            {%- set pzn = states('input_text.medikament_' ~ med_nr ~ '_pzn') | trim -%}
            {%- if pzn != '' %} · PZN {{ pzn }}{%- endif %} ({{ states('input_number.medikament_' ~ med_nr ~ '_vorrat') | float(0) | round(2) | string | replace('.0','') }} übrig)
        continue_on_error: true
      - variables:
          tg_name: "{{ states('input_text.medikament_' ~ med_nr ~ '_name') or ('Medikament ' ~ med_nr) }}"
          tg_vorrat: "{{ states('input_number.medikament_' ~ med_nr ~ '_vorrat') | float(0) | round(2) | string | replace('.0','') }}"
          tg_pkg: "{{ states('input_number.medikament_' ~ med_nr ~ '_packung_groesse') | int(0) }}"
          tg_warnung: "{{ states('input_number.medikament_' ~ med_nr ~ '_vorrat_warnung') | int(10) }}"
          tg_dos: "{{ states('input_text.medikament_' ~ med_nr ~ '_dosierung') }}"
          tg_menge: "{{ states('input_select.medikament_' ~ med_nr ~ '_menge') }}"
          tg_mahlzeit: "{{ states('input_select.medikament_' ~ med_nr ~ '_mahlzeit') }}"
          tg_hin: "{{ states('input_text.medikament_' ~ med_nr ~ '_hinweis') }}"
      - service: telegram_bot.send_message
        data:
          target:
            - 988178587
          parse_mode: html
          message: >-
            ✅ <b>{{ tg_name }}</b> – genommen
            {{ '\n' }}🕐 {{ now().strftime('%H:%M') }} Uhr
            {{ '\n' }}💊 {{ tg_menge }}{%- if tg_dos | trim != '' %} · {{ tg_dos }}{%- endif %}
            {{ '\n' }}📦 Vorrat: {{ tg_vorrat }} Stück{%- if tg_pkg > 0 %} (≈{{ (tg_vorrat / tg_pkg) | round(1) }} Pkg.){%- endif %}
            {%- if tg_mahlzeit != 'Egal' %}
            {{ '\n' }}🍽️ {{ tg_mahlzeit }}
            {%- endif %}
            {%- if tg_vorrat <= tg_warnung %}
            {{ '\n' }}⚠️ <b>Nachbestellen!</b> Warnung ab {{ tg_warnung }} Stück
            {%- endif %}
            {%- if tg_hin | trim != '' %}
            {{ '\n' }}💬 {{ tg_hin }}
            {%- endif %}
      - service: notify.mobile_app_andreas_iphone_15pro_max
        data:
          title: "✅ {{ states('input_text.medikament_' ~ med_nr ~ '_name') or ('Medikament ' ~ med_nr) }}"
          message: "Genommen! Vorrat: {{ states('input_number.medikament_' ~ med_nr ~ '_vorrat') | float(0) | round(2) | string | replace('.0','') }} Stück"
          data:
            push:
              interruption-level: passive
      - service: script.turn_off
        target:
          entity_id: script.medikament_alarm
      - if:
          - condition: state
            entity_id: input_boolean.medikament_testmodus
            state: "off"
        then:
          - service: light.turn_on
            target:
              entity_id: light.schlafzimmer
            data:
              rgb_color: [0, 255, 0]
              brightness: 255
          - delay:
              seconds: 5
          - service: scene.turn_on
            target:
              entity_id: scene.medikament_licht_backup
    mode: parallel

  # ── Wochenprotokoll – sonntags 20:00 per Telegram ────────────────────────
  - id: medikament_wochenprotokoll
    alias: "Medikamente – Wochenprotokoll Telegram"
    description: "Jeden Sonntag 20:00 Uhr: Zusammenfassung der letzten 7 Tage per Telegram"
    trigger:
      - platform: time
        at: "20:00:00"
    condition:
      - condition: template
        value_template: "{{ now().weekday() == 6 }}"
    action:
      - service: shell_command.medikament_wochenbericht
    mode: single

  # ── Vorrat niedrig – täglich 08:00 ────────────────────────────────────────
  - id: medikament_vorrat_warnung
    alias: "Medikamente - Vorrat niedrig"
    trigger:
      - platform: time
        at: "08:00:00"
    condition: []
    action:
      - variables:
          niedrig: >-
            {% set liste = namespace(meds=[]) %}
            {% for i in range(1, 7) %}
              {% set aktiv = is_state('input_boolean.medikament_' ~ i ~ '_aktiv', 'on') %}
              {% set vorrat = states('input_number.medikament_' ~ i ~ '_vorrat') | int(-1) %}
              {% set warnung = states('input_number.medikament_' ~ i ~ '_vorrat_warnung') | int(10) %}
              {% set name = states('input_text.medikament_' ~ i ~ '_name') or ('Medikament ' ~ i) %}
              {% if aktiv and vorrat >= 0 and vorrat <= warnung %}
                {% set liste.meds = liste.meds + [name ~ ' (' ~ vorrat ~ ' übrig)'] %}
              {% endif %}
            {% endfor %}
            {{ liste.meds }}
      - condition: template
        value_template: "{{ niedrig | length > 0 }}"
      - service: notify.mobile_app_andreas_iphone_15pro_max
        data:
          title: "💊 Medikamente nachbestellen!"
          message: "Niedriger Vorrat: {{ niedrig | join(', ') }}"
          data:
            push:
              interruption-level: time-sensitive
      - repeat:
          for_each: [1, 2, 3, 4, 5, 6]
          sequence:
            - if:
                - condition: template
                  value_template: >-
                    {% set v = states('input_number.medikament_' ~ repeat.item ~ '_vorrat') | int(-1) %}
                    {% set w = states('input_number.medikament_' ~ repeat.item ~ '_vorrat_warnung') | int(10) %}
                    {{ is_state('input_boolean.medikament_' ~ repeat.item ~ '_aktiv', 'on') and v >= 0 and v <= w }}
              then:
                - service: todo.add_item
                  target:
                    entity_id: todo.arznei
                  data:
                    item: >-
                      {% set name = states('input_text.medikament_' ~ repeat.item ~ '_name') or ('Medikament ' ~ repeat.item) %}
                      {% set pzn = states('input_text.medikament_' ~ repeat.item ~ '_pzn') %}
                      {% set v = states('input_number.medikament_' ~ repeat.item ~ '_vorrat') | int(0) %}
                      {{ name }}{% if pzn | trim != '' %} · PZN {{ pzn }}{% endif %} ({{ v }} übrig)
    mode: single

  # ── Verpasste Dosen täglich um 23:55 markieren ──────────────────────────────
  - id: medikament_verpasst_markieren
    alias: "Medikamente – Verpasste Dosen markieren"
    description: "23:55 Uhr: offene Erinnerungen als verpasst protokollieren"
    trigger:
      - platform: time
        at: "23:55:00"
    action:
      - repeat:
          for_each: [1, 2, 3, 4, 5, 6]
          sequence:
            - if:
                - condition: template
                  value_template: >-
                    {{ is_state('input_boolean.medikament_' ~ repeat.item ~ '_aktiv', 'on') and
                       is_state('input_boolean.medikament_' ~ repeat.item ~ '_offen', 'on') }}
              then:
                - service: input_datetime.set_datetime
                  target:
                    entity_id: "input_datetime.medikament_{{ repeat.item }}_letzte_verpasst"
                  data:
                    datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                - service: input_boolean.turn_off
                  target:
                    entity_id: "input_boolean.medikament_{{ repeat.item }}_offen"
    mode: single
