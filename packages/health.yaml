  # =====================
  # BLUTDRUCK WEBHOOK
  # =====================
  - id: health_blutdruck_import
    alias: "Health – Blutdruck Import (Webhook)"
    trigger:
      - platform: webhook
        webhook_id: blutdruck_import
        allowed_methods:
          - POST
        local_only: false
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.health_bp_systolisch
        data:
          value: "{{ trigger.json.systolisch | int }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.health_bp_diastolisch
        data:
          value: "{{ trigger.json.diastolisch | int }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.health_bp_puls
        data:
          value: "{{ trigger.json.puls | int }}"
    mode: single

  # =====================
  # BENACHRICHTIGUNGEN
  # =====================
  - id: health_schrittziel_erreicht
    alias: "Health – Schrittziel erreicht"
    trigger:
      - platform: numeric_state
        entity_id: input_number.hae_schritte
        above: input_number.health_schritte_ziel
    action:
      - service: notify.mobile_app_andreas_iphone_15pro_max
        data:
          title: "Schrittziel erreicht!"
          message: "{{ states('input_number.hae_schritte') | int }} Schritte heute – gut gemacht!"
          data:
            push:
              sound: default
    mode: single

  - id: health_wenig_schlaf
    alias: "Health – Wenig Schlaf"
    trigger:
      - platform: time
        at: "09:00:00"
    condition:
      - condition: template
        value_template: >
          {% set dauer = states('input_number.hae_schlafdauer') | float(99) %}
          {% set ziel = states('input_number.health_schlaf_ziel') | float(7.5) %}
          {{ dauer > 0 and dauer < ziel - 1.5 }}
    action:
      - service: notify.mobile_app_andreas_iphone_15pro_max
        data:
          title: "Wenig Schlaf letzte Nacht"
          message: >
            Nur {{ states('input_number.hae_schlafdauer') }} h Schlaf.
            Ziel: {{ states('input_number.health_schlaf_ziel') }} h.
    mode: single

  - id: health_niedrige_hrv
    alias: "Health – Niedrige HRV"
    trigger:
      - platform: numeric_state
        entity_id: input_number.hae_hrv
        below: 25
        above: 0
    condition:
      - condition: time
        after: "07:00:00"
        before: "20:00:00"
    action:
      - service: notify.mobile_app_andreas_iphone_15pro_max
        data:
          title: "Niedrige HRV heute"
          message: "HRV {{ states('input_number.hae_hrv') }} ms – schone dich heute etwas."
    mode: single
