automation:
- alias: 'OFF: Barcode aus Share Event oder Kurzbefehl'
  id: off_barcode_aus_share
  trigger:
  - platform: event
    event_type: mobile_app.share
    id: share
  - platform: webhook
    webhook_id: zwischenablage_empfangen
    allowed_methods:
    - POST
    local_only: false
    id: webhook
  variables:
    geteilter_inhalt: "{% if trigger.id == 'share' %}\n  {{ (trigger.event.data.text\
      \ | default('')) ~ ' ' ~\n     (trigger.event.data.url | default('')) ~ ' '\
      \ ~\n     (trigger.event.data.entered | default('')) ~ ' ' ~\n     (trigger.event.data.subject\
      \ | default('')) }}\n{% else %}\n  {{ trigger.json.text | default('') | string\
      \ }}\n{% endif %}"
    barcode_kandidaten: '{{ geteilter_inhalt | regex_findall(''\d{8,14}'') }}'
    barcode: "{{ (barcode_kandidaten[0] | string)\n   if barcode_kandidaten | length\
      \ > 0 else '' }}"
  condition:
  - condition: template
    value_template: '{{ barcode | string | length >= 8 }}'
  action:
  - action: input_text.set_value
    target:
      entity_id: input_text.off_barcode_eingabe
    data:
      value: '{{ barcode }}'
  - action: script.off_barcode_lookup
  - delay:
      seconds: 2
  mode: single
- alias: 'OFF: Webhook Einbuchen'
  id: off_webhook_einbuchen
  trigger:
  - platform: webhook
    webhook_id: barcode_einbuchen
    allowed_methods:
    - POST
    local_only: false
  variables:
    barcode_input: '{{ trigger.json.text | default('''') | string }}'
    barcode_kandidaten: '{{ barcode_input | regex_findall(''\d{8,14}'') }}'
    barcode: "{{ (barcode_kandidaten[0] | string)\n   if barcode_kandidaten | length\
      \ > 0 else '' }}"
    lagerplatz_eingabe: '{{ trigger.json.lagerplatz | default('''') | string }}'
    gueltige_lagerplaetze:
    - Vorratskammer
    - Kühlschrank
    - Gefrierschrank
    - Schrank
    - Sonstiges
  condition:
  - condition: template
    value_template: '{{ barcode | string | length >= 8 }}'
  action:
  - if:
    - condition: template
      value_template: '{{ lagerplatz_eingabe in gueltige_lagerplaetze }}'
    then:
    - action: input_select.select_option
      target:
        entity_id: input_select.off_lagerplatz
      data:
        option: '{{ lagerplatz_eingabe }}'
  - action: input_text.set_value
    target:
      entity_id: input_text.off_barcode_eingabe
    data:
      value: '{{ barcode }}'
  - action: script.off_barcode_lookup
  - delay:
      seconds: 2
  - if:
    - condition: template
      value_template: '{{ states(''input_text.off_barcode_eingabe'') | length == 0
        }}'
    then:
    - stop: War ein Lagerort-Code, kein Einbuchen
  - choose:
    - conditions:
      - condition: state
        entity_id: input_select.off_modus
        state: Umbuchen
      sequence:
      - action: script.off_umbuchen
    default:
    - action: script.off_einbuchen
  mode: single
- alias: 'OFF: Webhook Ausbuchen'
  id: off_webhook_ausbuchen
  trigger:
  - platform: webhook
    webhook_id: barcode_ausbuchen
