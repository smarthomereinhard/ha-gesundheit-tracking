input_text:
  off_barcode_eingabe:
    name: OFF Barcode
    icon: mdi:barcode
  off_menge:
    name: Menge / Größe
    icon: mdi:scale
    max: 100
  off_manuell_name:
    name: Produktname (manuell)
    icon: mdi:pencil
    max: 100
  off_manuell_marke:
    name: Marke (manuell)
    icon: mdi:tag-outline
    max: 100
  off_manuell_kategorie:
    name: Kategorie (manuell)
    icon: mdi:shape
    max: 50
  off_inventar_bestand:
    name: Inventar Bestand aktuell
    initial: ''
    max: 200
    icon: mdi:package-variant
input_select:
  off_modus:
    name: Modus
    icon: mdi:swap-horizontal
    options:
    - Einbuchen
    - Ausbuchen
    - Umbuchen
    initial: Einbuchen
  off_lagerplatz:
    name: Lagerplatz
    icon: mdi:warehouse
    options:
    - Vorratskammer
    - Kühlschrank
    - Gefrierschrank
    - Schrank
    - Sonstiges
    initial: Vorratskammer
  off_dashboard_seite:
    name: Dashboard Seite
    options:
    - Übersicht
    - Produkt buchen
    - Inventar
    - Einkaufsliste
    initial: Übersicht
  off_menge_einheit:
    name: Mengen-Einheit
    icon: mdi:scale
    options:
    - —
    - g
    - kg
    - ml
    - cl
    - l
    - Stk.
    - Pkg.
    - Rolle
    - Beutel
    - m
    - cm
    initial: —
input_number:
  off_anzahl:
    name: Anzahl
    icon: mdi:counter
    initial: 1
    min: 1
    max: 50
    step: 1
    mode: box
input_boolean:
  off_aus_lokaler_db:
    name: 'Marker: aus lokaler DB'
    icon: mdi:database-check
  off_produkt_im_buffer:
    name: 'Marker: Produkt im Buffer'
    icon: mdi:basket-fill
shell_command:
  off_excel_log: "bash -c ' FILE=\"/config/www/off_inventar.csv\";\nif [ ! -f \"$FILE\"\
    \ ]; then\n  echo \"Datum;Modus;Produkt;Marke;Menge;Barcode;Lagerplatz;Anzahl\"\
    \ > \"$FILE\";\nfi;\necho \"{{ datum }};{{ modus }};{{ produkt }};{{ marke }};{{\
    \ menge }};{{ code }};{{ lagerplatz }};{{ anzahl }}\" >> \"$FILE\"; '"
  inventar_vorratskammer_csv_init: bash -c 'echo "Stk;Produkt;Marke;Barcode;Lagerplatz"
    > /config/www/inventar_vorratskammer.csv'
  inventar_vorratskammer_csv_zeile: bash -c 'echo "{{ stk }};{{ produkt }};{{ marke
    }};{{ barcode }};{{ lagerplatz }}" >> /config/www/inventar_vorratskammer.csv'
rest_command:
  off_sheet_lookup:
    url: https://script.google.com/macros/s/AKfycbxK3gFwtzbqtYK8jXkXgzVImmisYb9sIh-rtcFSj1ZakoGJRfKLj7i_47MVLREx01AKuw/exec?barcode={{
      barcode }}
    method: GET
  off_sheet_anlegen:
    url: https://script.google.com/macros/s/AKfycbxK3gFwtzbqtYK8jXkXgzVImmisYb9sIh-rtcFSj1ZakoGJRfKLj7i_47MVLREx01AKuw/exec
    method: POST
    content_type: application/json
    payload: "{{ {\n  \"barcode\": barcode,\n  \"bestand\": bestand,\n  \"kategorie\"\
      : kategorie,\n  \"marke\": marke,\n  \"menge\": menge,\n  \"produkt\": produkt,\n\
      \  \"lagerplatz\": lagerplatz\n} | tojson }}"
  off_sheet_list:
    url: https://script.google.com/macros/s/AKfycbxK3gFwtzbqtYK8jXkXgzVImmisYb9sIh-rtcFSj1ZakoGJRfKLj7i_47MVLREx01AKuw/exec?action=list
    method: GET
    timeout: 60
rest:
- resource_template: https://de.openfoodfacts.org/api/v2/product/{{ states('input_text.off_barcode_eingabe')
    }}.json?fields=product_name,product_name_de,brands,quantity,categories
  scan_interval: 86400
  headers:
    User-Agent: HomeAssistant-OFF/1.0
    Accept-Language: de
  sensor:
  - name: OFF Last Lookup
    unique_id: off_last_lookup
    value_template: '{{ value_json.status_verbose | default(''unbekannt'') }}'
    json_attributes:
    - status
    - product
    - code
- resource_template: https://world.openbeautyfacts.org/api/v2/product/{{ states('input_text.off_barcode_eingabe')
    }}.json?fields=product_name,product_name_de,brands,quantity,categories
  scan_interval: 86400
  headers:
    User-Agent: HomeAssistant-OFF/1.0
    Accept-Language: de
  sensor:
  - name: OBF Last Lookup
    unique_id: obf_last_lookup
    value_template: '{{ value_json.status_verbose | default(''unbekannt'') }}'
    json_attributes:
    - status
    - product
    - code
- resource_template: https://world.openproductsfacts.org/api/v2/product/{{ states('input_text.off_barcode_eingabe')
    }}.json?fields=product_name,product_name_de,brands,quantity,categories
  scan_interval: 86400
  headers:
    User-Agent: HomeAssistant-OFF/1.0
    Accept-Language: de
  sensor:
  - name: OPF Last Lookup
    unique_id: opf_last_lookup
    value_template: '{{ value_json.status_verbose | default(''unbekannt'') }}'
    json_attributes:
    - status
    - product
    - code
template:
- sensor:
  - name: OFF Quelle
    unique_id: off_quelle
    icon: mdi:database-search
    state: "{% set ns = namespace(value='none') %} {% for src in ['off', 'obf', 'opf']\
      \ %}\n  {% if ns.value == 'none' %}\n    {% set product = state_attr('sensor.'\
      \ ~ src ~ '_last_lookup', 'product') %}\n    {% if product is mapping %}\n \
      \     {% set pn = (product.product_name | default('') | string) | trim %}\n\
      \      {% set pn_de = (product.product_name_de | default('') | string) | trim\
      \ %}\n      {% if (pn | length > 0) or (pn_de | length > 0) %}\n        {% set\
      \ ns.value = src %}\n      {% endif %}\n    {% endif %}\n  {% endif %}\n{% endfor\
      \ %} {% if ns.value == 'none' %}\n  {% set manuell = states('input_text.off_manuell_name')\
      \ | string | trim %}\n  {% if manuell | length > 0\n     and manuell | lower\
      \ not in ['unknown','unavailable','none'] %}\n    {% if is_state('input_boolean.off_aus_lokaler_db',\
      \ 'on') %}\n      {% set ns.value = 'lokal' %}\n    {% else %}\n      {% set\
      \ ns.value = 'manuell' %}\n    {% endif %}\n  {% endif %}\n{% endif %} {{ ns.value\
      \ }}"
  - name: OFF Product Name
    unique_id: off_product_name
    icon: mdi:food
    state: "{% set quelle = states('sensor.off_quelle') %} {% if quelle in ['off',\
      \ 'obf', 'opf'] %}\n  {% set ns = namespace(name_de='', name_fallback='') %}\n\
      \  {% for src in ['off', 'obf', 'opf'] %}\n    {% set product = state_attr('sensor.'\
      \ ~ src ~ '_last_lookup', 'product') %}\n    {% if product is mapping %}\n \
      \     {% if ns.name_de == '' %}\n        {% set pn_de = (product.product_name_de\
      \ | default('') | string) | trim %}\n        {% if pn_de | length > 0 %}\n \
      \         {% set ns.name_de = pn_de %}\n        {% endif %}\n      {% endif\
      \ %}\n      {% if ns.name_fallback == '' %}\n        {% set pn = (product.product_name\
      \ | default('') | string) | trim %}\n        {% if pn | length > 0 %}\n    \
      \      {% set ns.name_fallback = pn %}\n        {% endif %}\n      {% endif\
      \ %}\n    {% endif %}\n  {% endfor %}\n  {% if ns.name_de | length > 0 %}\n\
      \    {{ ns.name_de }}\n  {% elif ns.name_fallback | length > 0 %}\n    {{ ns.name_fallback\
      \ }}\n  {% else %}\n    unknown\n  {% endif %}\n{% elif quelle in ['manuell',\
      \ 'lokal'] %}\n  {{ states('input_text.off_manuell_name') }}\n{% else %}\n \
      \ unknown\n{% endif %}"
    attributes:
      quelle: '{{ states(''sensor.off_quelle'') }}'
      quelle_label: "{% set q = states('sensor.off_quelle') %} {% set names = {\n\
        \  'off': 'OpenFoodFacts',\n  'obf': 'OpenBeautyFacts',\n  'opf': 'OpenProductsFacts',\n\
        \  'lokal': 'Lokale Datenbank',\n  'manuell': 'Manuell eingetragen',\n  'none':\
        \ 'Nicht gefunden'\n} %} {{ names.get(q, 'Unbekannt') }}"
      marke: "{% set quelle = states('sensor.off_quelle') %} {% if quelle in ['off',\
        \ 'obf', 'opf'] %}\n  {% set product = state_attr('sensor.' ~ quelle ~ '_last_lookup',\
        \ 'product') %}\n  {{ product.brands | default('unknown') }}\n{% elif quelle\
        \ in ['manuell', 'lokal'] %}\n  {{ states('input_text.off_manuell_marke')\
        \ | default('unknown') }}\n{% else %}\n  unknown\n{% endif %}"
      menge_off: "{% set quelle = states('sensor.off_quelle') %} {% if quelle in ['off',\
        \ 'obf', 'opf'] %}\n  {% set product = state_attr('sensor.' ~ quelle ~ '_last_lookup',\
        \ 'product') %}\n  {{ product.quantity | default('unknown') }}\n{% else %}\n\
        \  unknown\n{% endif %}"
      kategorie: "{% set manuell = states('input_text.off_manuell_kategorie') | string\
        \ | trim %} {% if manuell | length > 0\n   and manuell | lower not in ['unknown','unavailable','none']\
        \ %}\n  {{ manuell }}\n{% else %}\n  {% set quelle = states('sensor.off_quelle')\
        \ %}\n  {% if quelle in ['off', 'obf', 'opf'] %}\n    {% set product = state_attr('sensor.'\
        \ ~ quelle ~ '_last_lookup', 'product') %}\n    {% set cats = product.categories\
        \ | default('') | string %}\n    {% if cats | length > 0 %}\n      {{ cats.split(',')\
        \ | last | trim }}\n    {% else %}\n      unknown\n    {% endif %}\n  {% else\
        \ %}\n    unknown\n  {% endif %}\n{% endif %}"
- binary_sensor:
  - name: OFF Barcode Vorhanden
    unique_id: off_barcode_vorhanden
    state: "{{ states('input_text.off_barcode_eingabe')\n   | string | regex_match('^\\\
      d{8,14}$') is not none }}"
- trigger:
  - platform: state
    entity_id: todo.inventar_vorratskammer
    for:
      minutes: 5
  - platform: homeassistant
    event: start
  action:
  - action: todo.get_items
    target:
      entity_id: todo.inventar_vorratskammer
    data:
      status: needs_action
    response_variable: result
  sensor:
  - name: Inventar Vorratskammer Summary
    unique_id: inventar_summary_vorratskammer
    icon: mdi:package-variant-closed
    state: '{{ result[''todo.inventar_vorratskammer''][''items''] | default([]) |
      length }}'
    attributes:
      total_stk: "{% set items = result['todo.inventar_vorratskammer']['items'] |\
        \ default([]) %} {% set ns = namespace(total=0) %} {% for item in items %}\n\
        \  {% set m = item.summary | regex_findall('^\\s*([0-9]+)\\s+Stk') %}\n  {%\
        \ if m | length > 0 %}\n    {% set ns.total = ns.total + (m[0] | int) %}\n\
        \  {% endif %}\n{% endfor %} {{ ns.total }}"
      niedrig: "{% set items = result['todo.inventar_vorratskammer']['items'] | default([])\
        \ %} {% set ns = namespace(n=0) %} {% for item in items %}\n  {% set m = item.summary\
        \ | regex_findall('^\\s*([0-9]+)\\s+Stk') %}\n  {% if m | length > 0 and (m[0]\
        \ | int) == 1 %}\n    {% set ns.n = ns.n + 1 %}\n  {% endif %}\n{% endfor\
        \ %} {{ ns.n }}"
