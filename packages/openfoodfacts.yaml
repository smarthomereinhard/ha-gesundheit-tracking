- alias: 'Inventar: Niedrigbestand → Einkaufsliste'
  id: inventar_niedrigbestand
  description: 'Überwacht alle Inventar-Listen. Sobald ein Produkt nur noch 1 Stück
    enthält, wird es automatisch auf die Einkaufsliste gesetzt - mit Dedup-Check über
    Barcode (oder Produktname als Fallback).

    '
  trigger:
  - platform: state
    entity_id:
    - todo.inventar_vorratskammer
    - todo.inventar_kuehlschrank
    - todo.inventar_gefrierschrank
    - todo.inventar_schrank
    - todo.inventar_sonstiges
    id: state
  - platform: time_pattern
    minutes: /30
    id: periodic
  condition:
  - condition: state
    entity_id: input_boolean.automationen_ein_aus
    state: 'on'
  action:
  - variables:
      ziel_listen: "{% if trigger.id == 'state' %}\n  {{ [trigger.entity_id] }}\n\
        {% else %}\n  {{ [\n    'todo.inventar_vorratskammer',\n    'todo.inventar_kuehlschrank',\n\
        \    'todo.inventar_gefrierschrank',\n    'todo.inventar_schrank',\n    'todo.inventar_sonstiges'\n\
        \  ] }}\n{% endif %}"
  - action: todo.get_items
    target:
      entity_id: todo.einkaufsliste_2
    data:
      status: needs_action
    response_variable: einkauf
  - repeat:
      for_each: '{{ ziel_listen }}'
      sequence:
      - variables:
          aktuelle_liste: '{{ repeat.item }}'
      - action: todo.get_items
        target:
          entity_id: '{{ aktuelle_liste }}'
        data:
          status: needs_action
        response_variable: inventar
      - repeat:
          for_each: '{{ inventar[aktuelle_liste][''items''] | default([]) }}'
          sequence:
          - variables:
              zeile: '{{ repeat.item.summary | string }}'
              beschreibung: '{{ repeat.item.description | default('''') | string }}'
              stk: "{% set neu = zeile | regex_findall('^\\s*([0-9]+)\\s+Stk\\.?')\
                \ %} {% if neu | length > 0 %}\n  {{ neu[0] | int(0) }}\n{% else %}\n\
                \  {% set alt = zeile | regex_findall('(?:Stückzahl|Stk\\.): ([0-9]+)')\
                \ %}\n  {{ alt[0] | int(0) if alt | length > 0 else 99 }}\n{% endif\
                \ %}"
              produkt: "{% set neu = zeile | regex_findall('^\\s*[0-9]+\\s+Stk\\.?\\\
                s+([^|]+)') %} {% if neu | length > 0 %}\n  {{ neu[0] | trim }}\n\
                {% else %}\n  {{ zeile.split(' | ')[0] | trim }}\n{% endif %}"
              marke_m: '{{ zeile | regex_findall(''Marke: ([^|]+)'') }}'
              marke: '{{ (marke_m[0] | trim) if marke_m | length > 0 else '''' }}'
              barcode: "{% set m_d = beschreibung | regex_findall('(?:EAN|Barcode):\\\
                s*(\\d+)') %} {% if m_d | length > 0 %}\n  {{ m_d[0] | trim }}\n{%\
                \ else %}\n  {% set m_s = zeile | regex_findall('Barcode:\\s*(\\d+)')\
                \ %}\n  {{ (m_s[0] | trim) if m_s | length > 0 else '' }}\n{% endif\
                \ %}"
              lagerplatz: "{% set lager_map = {\n  'todo.inventar_vorratskammer':\
                \ 'Vorratskammer',\n  'todo.inventar_kuehlschrank': 'Kühlschrank',\n\
                \  'todo.inventar_gefrierschrank': 'Gefrierschrank',\n  'todo.inventar_schrank':\
                \ 'Schrank',\n  'todo.inventar_sonstiges': 'Sonstiges'\n} %} {{ lager_map.get(aktuelle_liste,\
                \ '') }}"
              schon_drauf: "{% set b = barcode | string | trim %} {% set p = produkt\
                \ | string | lower | trim %} {% set ns = namespace(found=false) %}\
                \ {% for e in einkauf['todo.einkaufsliste_2']['items'] | default([])\
                \ %}\n  {% set sum = (e.summary | string) %}\n  {% set desc = (e.description\
                \ | default('') | string) %}\n  {% if b | length > 0 %}\n    {% if\
                \ ('EAN: ' ~ b) in desc\n          or ('Barcode: ' ~ b) in desc\n\
                \          or ('EAN: ' ~ b) in sum\n          or ('Barcode: ' ~ b)\
                \ in sum %}\n      {% set ns.found = true %}\n    {% endif %}\n  {%\
                \ elif p | length > 0 %}\n    {% if (sum | lower).startswith(p ~ '\
                \ nachkaufen')\n          or (sum | lower).startswith(p ~ ' |') %}\n\
                \      {% set ns.found = true %}\n    {% endif %}\n  {% endif %}\n\
                {% endfor %} {{ ns.found }}"
          - choose:
            - conditions:
              - condition: template
                value_template: "{{ (stk | int(0)) == 1\n   and (schon_drauf | string\
                  \ | lower) != 'true' }}"
              sequence:
              - action: todo.add_item
                target:
                  entity_id: todo.einkaufsliste_2
                data:
                  item: '{{ produkt }} nachkaufen | Nur noch 1 Stück | Marke: {{ marke
                    }} | Lagerplatz: {{ lagerplatz }}'
                  description: 'EAN: {{ barcode }}


                    <img src="https://barcodeapi.org/api/ean13/{{ barcode }}" alt="EAN"
                    height="30">

                    '
              - variables:
                  neuer_eintrag:
                    summary: '{{ produkt }} nachkaufen | Nur noch 1 Stück | Marke:
                      {{ marke }} | Lagerplatz: {{ lagerplatz }}'
                    description: 'EAN: {{ barcode }}'
                  einkauf: '{% set bestehend = einkauf[''todo.einkaufsliste_2''][''items'']
                    | default([]) %} {{ {''todo.einkaufsliste_2'': {''items'': bestehend
                    + [neuer_eintrag]}} }}'
  mode: queued
  max: 10
- alias: 'Einkaufsliste: Sync HA ↔ Apple Erinnerungen'
  id: einkaufsliste_sync_apple
  description: 'Spiegelt todo.einkaufsliste_2 (Master) zu todo.erinnerungen. In Apple
    abgehakte Items werden auch in HA als erledigt markiert.

    '
  trigger:
  - platform: state
    entity_id:
    - todo.einkaufsliste_2
    - todo.erinnerungen
  condition:
  - condition: state
    entity_id: input_boolean.automationen_ein_aus
    state: 'on'
  action:
  - action: todo.get_items
    target:
      entity_id: todo.einkaufsliste_2
    data:
      status: needs_action
    response_variable: ha
  - action: todo.get_items
    target:
      entity_id: todo.erinnerungen
    response_variable: apple
  - variables:
      ha_offen: "{{ ha['todo.einkaufsliste_2']['items']\n   | default([]) | map(attribute='summary')\
        \ | list }}"
      apple_alle: '{{ apple[''todo.erinnerungen''][''items''] | default([]) }}'
      apple_offen: "{{ apple_alle | selectattr('status', '==', 'needs_action')\n \
        \  | map(attribute='summary') | list }}"
      apple_done: "{{ apple_alle | selectattr('status', '==', 'completed')\n   | map(attribute='summary')\
        \ | list }}"
      zu_ha_done: '{{ ha_offen | select(''in'', apple_done) | list }}'
      zu_apple_add: "{{ ha_offen | reject('in', apple_offen)\n   | reject('in', apple_done)\
        \ | list }}"
      zu_apple_remove: '{{ apple_offen | reject(''in'', ha_offen) | list }}'
  - repeat:
      for_each: '{{ zu_ha_done }}'
      sequence:
      - action: todo.update_item
        target:
          entity_id: todo.einkaufsliste_2
        data:
          item: '{{ repeat.item }}'
          status: completed
        continue_on_error: true
  - repeat:
      for_each: '{{ zu_apple_add }}'
      sequence:
      - action: todo.add_item
        target:
          entity_id: todo.erinnerungen
        data:
          item: '{{ repeat.item }}'
        continue_on_error: true
  - repeat:
      for_each: '{{ zu_apple_remove }}'
      sequence:
      - action: todo.remove_item
        target:
          entity_id: todo.erinnerungen
        data:
          item: '{{ repeat.item }}'
        continue_on_error: true
  mode: queued
  max: 10
- id: off_webhook_umbuchen
  alias: 'OFF: Webhook Umbuchen'
  description: Empfängt Barcode vom iPhone-Kurzbefehl und bucht Produkt um.
  trigger:
  - platform: webhook
