homeassistant:
  customize:
    sensor.off_last_lookup:
      friendly_name: OFF Last Lookup
script:
  off_barcode_lookup:
    alias: 'OFF: Multi-DB Barcode nachschlagen'
    icon: mdi:magnify
    sequence:
    - variables:
        eingegebener_code: '{{ states(''input_text.off_barcode_eingabe'') | string
          }}'
        lagerort_mapping:
          '2900000000018': Vorratskammer
          '2900000000025': Kühlschrank
          '2900000000032': Gefrierschrank
          '2900000000049': Schrank
          '2900000000056': Sonstiges
        muell_code: '2900000099999'
        ist_lagerort: '{{ eingegebener_code in lagerort_mapping }}'
        ist_muell: '{{ eingegebener_code == muell_code }}'
        produkt_im_buffer: '{{ is_state(''input_boolean.off_produkt_im_buffer'', ''on'')
          }}'
    - if:
      - condition: template
        value_template: '{{ ist_muell }}'
      then:
      - if:
        - condition: template
          value_template: '{{ produkt_im_buffer }}'
        then:
        - action: input_select.select_option
          target:
            entity_id: input_select.off_modus
          data:
            option: Ausbuchen
        - action: script.off_buchen
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.off_produkt_im_buffer
      - action: input_text.set_value
        target:
          entity_id: input_text.off_barcode_eingabe
        data:
          value: ''
      - stop: Müll-Code verarbeitet
    - if:
      - condition: template
        value_template: '{{ ist_lagerort }}'
      then:
      - action: input_select.select_option
        target:
          entity_id: input_select.off_lagerplatz
        data:
          option: '{{ lagerort_mapping[eingegebener_code] }}'
      - if:
        - condition: template
          value_template: '{{ produkt_im_buffer }}'
        then:
        - action: input_select.select_option
          target:
            entity_id: input_select.off_modus
          data:
            option: Einbuchen
        - action: script.off_buchen
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.off_produkt_im_buffer
      - action: input_text.set_value
        target:
          entity_id: input_text.off_barcode_eingabe
        data:
          value: ''
      - stop: Lagerort verarbeitet
    - action: input_text.set_value
      target:
        entity_id: input_text.off_manuell_name
      data:
        value: ''
    - action: input_text.set_value
      target:
        entity_id: input_text.off_manuell_marke
      data:
        value: ''
    - action: input_text.set_value
      target:
        entity_id: input_text.off_manuell_kategorie
      data:
        value: ''
    - action: input_select.select_option
      target:
        entity_id: input_select.off_menge_einheit
      data:
        option: —
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.off_aus_lokaler_db
    - action: rest_command.off_sheet_lookup
      data:
        barcode: '{{ states(''input_text.off_barcode_eingabe'') | string }}'
      response_variable: sheet_resp
    - variables:
        sheet_data: "{% set c = sheet_resp.content | default({}) %} {% if c is mapping\
          \ %}\n  {{ c }}\n{% elif c is string and c | length > 0 %}\n  {{ c | from_json\
          \ }}\n{% else %}\n  {}\n{% endif %}"
        sheet_found: '{{ (sheet_data.status | default('''')) == ''found'' }}'
    - if:
      - condition: template
        value_template: '{{ sheet_found }}'
      then:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.off_aus_lokaler_db
      - action: input_text.set_value
        target:
          entity_id: input_text.off_manuell_name
        data:
          value: '{{ sheet_data.produkt | default('''') }}'
      - action: input_text.set_value
        target:
          entity_id: input_text.off_manuell_marke
        data:
          value: '{{ sheet_data.marke | default('''') }}'
      - action: input_text.set_value
        target:
          entity_id: input_text.off_manuell_kategorie
        data:
          value: '{{ sheet_data.kategorie | default('''') }}'
      - action: input_text.set_value
        target:
          entity_id: input_text.off_menge
        data:
          value: '{{ sheet_data.menge | default('''') }}'
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.off_produkt_im_buffer
      - stop: Produkt aus eigenem Sheet geladen
    - parallel:
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.off_last_lookup
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.obf_last_lookup
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.opf_last_lookup
    - delay:
        milliseconds: 1500
    - if:
      - condition: template
        value_template: '{{ states(''sensor.off_quelle'') | string != ''none'' }}'
      then:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.off_produkt_im_buffer
      else:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.off_produkt_im_buffer
      - if:
        - condition: state
          entity_id: input_boolean.sonos_tts_aktiv
          state: 'on'
        - condition: state
          entity_id: input_boolean.inventar_tts
          state: 'on'
        then:
        - action: tts.speak
          target:
            entity_id: tts.home_assistant_cloud
          data:
            media_player_entity_id: media_player.sonos_all
            message: Produkt nicht gefunden. Bitte Namen manuell eingeben.
            language: de-DE
      - action: telegram_bot.send_message
        data:
          chat_id: 988178587
          parse_mode: html
          message: '❓ <b>Produkt nicht gefunden</b>

            Barcode <code>{{ states(''input_text.off_barcode_eingabe'') }}</code>
            wurde nicht gefunden. Bitte manuell eingeben.'
      - action: notify.mobile_app_andreas_iphone_15pro_max
        data:
          title: ❓ Produkt nicht gefunden
          message: Barcode {{ states('input_text.off_barcode_eingabe') }} – bitte
            manuell eingeben.
          data:
            push:
              sound:
                name: default
                critical: 1
                volume: 1
    mode: single
  off_buchen:
    alias: 'OFF: Produkt buchen'
    icon: mdi:basket
    sequence:
    - variables:
        produkt: '{{ states(''sensor.off_product_name'') | string }}'
        marke: '{{ state_attr(''sensor.off_product_name'', ''marke'') | string }}'
        kategorie: '{{ state_attr(''sensor.off_product_name'', ''kategorie'') | string
          }}'
        code: "{% set api_code = state_attr('sensor.off_last_lookup', 'code') | string\
          \ | trim %} {% set eingabe  = states('input_text.off_barcode_eingabe') |\
          \ string | trim %} {% if api_code | regex_match('^\\d{8,14}$') %}\n  {{\
          \ api_code }}\n{% elif eingabe | regex_match('^\\d{8,14}$') %}\n  {{ eingabe\
          \ }}\n{% else %}\n  {{ api_code }}\n{% endif %}"
        modus: '{{ states(''input_select.off_modus'') | string }}'
        lagerplatz: '{{ states(''input_select.off_lagerplatz'') | string }}'
        anzahl: '{{ states(''input_number.off_anzahl'') | int(1) }}'
        menge: "{% set m_zahl = states('input_text.off_menge') | string | trim %}\
          \ {% set m_einheit = states('input_select.off_menge_einheit') | string |\
          \ trim %} {% set off_menge = state_attr('sensor.off_product_name', 'menge_off')\
          \ | string %} {% set m_skip = ['unknown','unavailable','none',''] %} {%\
          \ if m_zahl | length > 0 and m_einheit != '—' %}\n  {{ m_zahl }} {{ m_einheit\
          \ }}\n{% elif m_zahl | length > 0 and m_zahl | lower not in m_skip %}\n\
          \  {{ m_zahl }}\n{% elif off_menge | lower not in m_skip %}\n  {{ off_menge\
          \ }}\n{% else %}\n  keine Angabe\n{% endif %}"
        ziel_liste: "{% if lagerplatz == 'Vorratskammer' %}\n  todo.inventar_vorratskammer\n\
          {% elif lagerplatz == 'Kühlschrank' %}\n  todo.inventar_kuehlschrank\n{%\
          \ elif lagerplatz == 'Gefrierschrank' %}\n  todo.inventar_gefrierschrank\n\
          {% elif lagerplatz == 'Schrank' %}\n  todo.inventar_schrank\n{% else %}\n\
          \  todo.inventar_sonstiges\n{% endif %}"
    - condition: template
      value_template: '{{ produkt | string | lower not in [''unknown'',''unavailable'',''none'','''']
        }}'
    - if:
      - condition: template
        value_template: '{{ modus == ''Ausbuchen'' }}'
      then:
      - action: todo.get_items
        target:
          entity_id:
          - todo.inventar_vorratskammer
          - todo.inventar_kuehlschrank
          - todo.inventar_gefrierschrank
          - todo.inventar_schrank
          - todo.inventar_sonstiges
        data:
          status: needs_action
        response_variable: alle_inv
      - variables:
          gefundene_liste: "{% set ns = namespace(liste='') %} {% set c = code | string\
            \ | trim %} {% if c | length > 0 %}\n  {% for liste_id, daten in alle_inv.items()\
            \ %}\n    {% for item in daten['items'] | default([]) %}\n      {% set\
            \ desc = item.description | default('') | string %}\n      {% set sum\
            \ = item.summary | string %}\n      {% if ('EAN: ' ~ c) in desc\n    \
            \        or ('Barcode: ' ~ c) in desc\n            or ('EAN: ' ~ c) in\
            \ sum\n            or ('Barcode: ' ~ c) in sum %}\n        {% set ns.liste\
            \ = liste_id %}\n      {% endif %}\n    {% endfor %}\n  {% endfor %}\n\
            {% endif %} {{ ns.liste }}"
      - if:
        - condition: template
          value_template: '{{ gefundene_liste | length == 0 }}'
        then:
        - stop: 'Ausbuchen abgebrochen: Produkt in keiner Liste.'
      - variables:
          ziel_liste: '{{ gefundene_liste }}'
      - action: input_select.select_option
        target:
          entity_id: input_select.off_lagerplatz
        data:
          option: "{% set lager_map = {\n  'todo.inventar_vorratskammer': 'Vorratskammer',\n\
            \  'todo.inventar_kuehlschrank': 'Kühlschrank',\n  'todo.inventar_gefrierschrank':\
            \ 'Gefrierschrank',\n  'todo.inventar_schrank': 'Schrank',\n  'todo.inventar_sonstiges':\
            \ 'Sonstiges'\n} %} {{ lager_map.get(gefundene_liste, 'Sonstiges') }}"
    - if:
      - condition: template
        value_template: '{{ modus == ''Umbuchen'' }}'
      then:
      - action: todo.get_items
        data:
          status: needs_action
        response_variable: alle_inv_u
        target:
          entity_id:
          - todo.inventar_vorratskammer
          - todo.inventar_kuehlschrank
          - todo.inventar_gefrierschrank
          - todo.inventar_schrank
          - todo.inventar_sonstiges
      - variables:
          quell_liste: '{% set ns = namespace(l='''') %}{% set c = code | string |
            trim %}{% for lid, d in alle_inv_u.items() %}  {% for it in d[''items'']
            | default([]) %}    {% set desc = it.description | default('''') | string
            %}    {% set sum = it.summary | string %}    {% if (''EAN: ''~c) in desc
            or (''EAN: ''~c) in sum %}      {% set ns.l = lid %}    {% endif %}  {%
            endfor %}{% endfor %}{{ ns.l | trim }}'
      - if:
        - condition: template
          value_template: '{{ quell_liste | length == 0 }}'
        then:
        - action: notify.mobile_app_andreas_iphone_15pro_max
          data:
            title: ❌ Umbuchen fehlgeschlagen
            message: Produkt nicht im Inventar gefunden.
        - stop: 'Umbuchen: Produkt nicht gefunden'
      - if:
        - condition: template
          value_template: '{{ quell_liste == ziel_liste }}'
        then:
        - action: notify.mobile_app_andreas_iphone_15pro_max
          data:
            title: ❌ Umbuchen fehlgeschlagen
            message: Quelle und Ziel sind gleich.
        - stop: 'Umbuchen: Quelle = Ziel'
      - variables:
          quell_lagerplatz: '{% set m = {''todo.inventar_vorratskammer'':''Vorratskammer'',''todo.inventar_kuehlschrank'':''Kühlschrank'',''todo.inventar_gefrierschrank'':''Gefrierschrank'',''todo.inventar_schrank'':''Schrank'',''todo.inventar_sonstiges'':''Sonstiges''}
            %}{{ m.get(quell_liste, ''Unbekannt'') }}'
          quell_item_summary: '{% set ns = namespace(s='''') %}{% set c = code | string
            | trim %}{% for it in alle_inv_u[quell_liste][''items''] | default([])
            %}  {% set desc = it.description | default('''') | string %}  {% set sum
            = it.summary | string %}  {% if (''EAN: ''~c) in desc or (''EAN: ''~c)
            in sum %}    {% set ns.s = sum %}  {% endif %}{% endfor %}{{ ns.s | trim
            }}'
          quell_stueckzahl: '{% set ns = namespace(s='''') %}{% set c = code | string
            | trim %}{% for it in alle_inv_u[quell_liste][''items''] | default([])
            %}  {% set desc = it.description | default('''') | string %}  {% set sum
            = it.summary | string %}  {% if (''EAN: ''~c) in desc or (''EAN: ''~c)
            in sum %}    {% set ns.s = sum %}  {% endif %}{% endfor %}{% set match
            = ns.s | trim | regex_findall(''^([0-9]+)\s+Stk'') %}{{ match[0] | int(1)
            if match | length > 0 else 1 }}'
      - action: todo.get_items
        data:
          status: needs_action
        response_variable: ziel_inv_u
        target:
          entity_id: '{{ ziel_liste }}'
      - variables:
          ziel_item_summary: '{% set ns = namespace(s='''') %}{% set c = code | string
            | trim %}{% for it in ziel_inv_u[ziel_liste][''items''] | default([])
            %}  {% set desc = it.description | default('''') | string %}  {% set sum
            = it.summary | string %}  {% if (''EAN: ''~c) in desc or (''EAN: ''~c)
            in sum %}    {% set ns.s = sum %}  {% endif %}{% endfor %}{{ ns.s | trim
            }}'
          ziel_stueckzahl_alt: '{% set ns = namespace(s='''') %}{% set c = code |
            string | trim %}{% for it in ziel_inv_u[ziel_liste][''items''] | default([])
            %}  {% set desc = it.description | default('''') | string %}  {% set sum
            = it.summary | string %}  {% if (''EAN: ''~c) in desc or (''EAN: ''~c)
            in sum %}    {% set ns.s = sum %}  {% endif %}{% endfor %}{% set match
            = ns.s | trim | regex_findall(''^([0-9]+)\s+Stk'') %}{{ match[0] | int(0)
            if match | length > 0 else 0 }}'
          neue_quell_stk: '{{ [quell_stueckzahl | int(1) - anzahl | int(1), 0] | max
            }}'
          neue_ziel_stk: '{{ ziel_stueckzahl_alt | int(0) + anzahl | int(1) }}'
      - action: todo.remove_item
        continue_on_error: true
        data:
          item: '{{ quell_item_summary }}'
        target:
          entity_id: '{{ quell_liste }}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ neue_quell_stk | int(0) > 0 }}'
          sequence:
          - action: todo.add_item
            data:
              item: '{{ neue_quell_stk }} Stk. {{ produkt | trim }}{{ '' '' ~ (menge|trim)
                if (menge|trim) not in [''keine Angabe'',''unknown'',''unavailable'','''']
                else '''' }} | Marke: {{ marke }}'
              description: 'EAN: {{ code }}


                <img src="https://barcodeapi.org/api/ean13/{{ code }}" alt="EAN" height="30">'
            target:
              entity_id: '{{ quell_liste }}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ ziel_item_summary | length > 0 }}'
          sequence:
          - action: todo.remove_item
            continue_on_error: true
            data:
              item: '{{ ziel_item_summary }}'
            target:
              entity_id: '{{ ziel_liste }}'
      - action: todo.add_item
        data:
          item: '{{ neue_ziel_stk }} Stk. {{ produkt | trim }}{{ '' '' ~ (menge|trim)
            if (menge|trim) not in [''keine Angabe'',''unknown'',''unavailable'','''']
            else '''' }} | Marke: {{ marke }}'
          description: 'EAN: {{ code }}


            <img src="https://barcodeapi.org/api/ean13/{{ code }}" alt="EAN" height="30">'
        target:
          entity_id: '{{ ziel_liste }}'
      - action: telegram_bot.send_message
        continue_on_error: true
        data:
          target: 988178587
          parse_mode: html
          message: '🔄 <b>Produkt umgebucht</b>

            🏷️ <b>{{ produkt | trim }}</b>

            📤 Von: {{ quell_lagerplatz }} → noch {{ neue_quell_stk }} Stk.

            📥 Nach: {{ lagerplatz }} → jetzt {{ neue_ziel_stk }} Stk.

            ⏰ {{ now().strftime(''%d.%m.%Y %H:%M'') }}'
      - action: notify.mobile_app_andreas_iphone_15pro_max
        continue_on_error: true
        data:
          title: 🔄 Umgebucht
          message: '{{ produkt | trim }}: {{ quell_lagerplatz }} → {{ lagerplatz }}'
          data:
            push:
              sound:
                name: default
                critical: 1
                volume: 1
      - if:
        - condition: state
          entity_id: input_boolean.sonos_tts_aktiv
          state: 'on'
        - condition: state
          entity_id: input_boolean.inventar_tts
          state: 'on'
        then:
        - action: tts.speak
          data:
            language: de-DE
            media_player_entity_id: media_player.sonos_all
            message: 'Umgebucht: {{ produkt | trim }}. Von {{ quell_lagerplatz }}
              nach {{ lagerplatz }}.'
          target:
            entity_id: tts.home_assistant_cloud
      - action: shell_command.off_excel_log
        continue_on_error: true
        data:
          anzahl: '{{ anzahl }}'
          code: '{{ code }}'
          datum: '{{ now().strftime(''%d.%m.%Y %H:%M'') }}'
          lagerplatz: '{{ quell_lagerplatz }}'
          marke: '{{ marke }}'
          menge: '{{ menge }}'
          modus: Ausbuchen (Umbuchen)
          produkt: '{{ produkt }}'
      - action: shell_command.off_excel_log
        continue_on_error: true
        data:
          anzahl: '{{ anzahl }}'
          code: '{{ code }}'
          datum: '{{ now().strftime(''%d.%m.%Y %H:%M'') }}'
          lagerplatz: '{{ lagerplatz }}'
          marke: '{{ marke }}'
          menge: '{{ menge }}'
          modus: Einbuchen (Umbuchen)
          produkt: '{{ produkt }}'
      - stop: Umbuchen abgeschlossen.
    - action: todo.get_items
      target:
        entity_id: '{{ ziel_liste }}'
      data:
        status: needs_action
      response_variable: inventar
    - variables:
        vorhandene_items: '{{ inventar[ziel_liste][''items''] | default([]) }}'
        vorhandenes_item: "{% set ns = namespace(item='') %} {% set c = code | string\
          \ | trim %} {% if c | length > 0 %}\n  {% for item in vorhandene_items %}\n\
          \    {% set sum = item.summary | string %}\n    {% set desc = item.description\
          \ | default('') | string %}\n    {% if ('EAN: ' ~ c) in desc\n         \
          \ or ('Barcode: ' ~ c) in desc\n          or ('EAN: ' ~ c) in sum\n    \
          \      or ('Barcode: ' ~ c) in sum %}\n      {% set ns.item = item.summary\
          \ %}\n    {% endif %}\n  {% endfor %}\n{% endif %} {{ ns.item }}"
        alte_stueckzahl: "{% if vorhandenes_item | length > 0 %}\n  {% set neu = vorhandenes_item\
          \ | regex_findall('^\\s*([0-9]+)\\s+Stk\\.?') %}\n  {% if neu | length >\
          \ 0 %}\n    {{ neu[0] | int(0) }}\n  {% else %}\n    {% set alt = vorhandenes_item\
          \ | regex_findall('(?:Stückzahl|Stk\\.): ([0-9]+)') %}\n    {% if alt |\
          \ length > 0 %}\n      {{ alt[0] | int(0) }}\n    {% else %}\n      1\n\
          \    {% endif %}\n  {% endif %}\n{% else %}\n  0\n{% endif %}"
        neue_stueckzahl: "{% if modus == 'Einbuchen' %}\n  {{ alte_stueckzahl | int(0)\
          \ + anzahl | int(1) }}\n{% else %}\n  {{ alte_stueckzahl | int(0) - anzahl\
          \ | int(1) }}\n{% endif %}"
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ vorhandenes_item | length > 0 }}'
        sequence:
        - action: todo.remove_item
          target:
            entity_id: '{{ ziel_liste }}'
          data:
            item: '{{ vorhandenes_item }}'
          continue_on_error: true
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ neue_stueckzahl | int(0) > 0 }}'
        sequence:
        - action: todo.add_item
          target:
            entity_id: '{{ ziel_liste }}'
          data:
            item: '{{ neue_stueckzahl }} Stk. {{ produkt | trim }}{{ '' '' ~ (menge
              | trim) if (menge | trim) not in [''keine Angabe'',''unknown'',''unavailable'','''']
              else '''' }}{{ '' | Kategorie: '' ~ (kategorie | trim) if (kategorie
              | trim) not in ['''',''unknown'',''unavailable'',''none''] else ''''
              }} | Marke: {{ marke }}'
            description: 'EAN: {{ code }}


              <img src="https://barcodeapi.org/api/ean13/{{ code }}" alt="EAN" height="30">

              '
    - action: shell_command.off_excel_log
      data:
        datum: '{{ now().strftime(''%d.%m.%Y %H:%M'') }}'
        modus: '{{ modus }}'
        produkt: '{{ produkt }}'
        marke: '{{ marke }}'
        menge: '{{ menge }}'
        code: '{{ code }}'
        lagerplatz: '{{ lagerplatz }}'
        anzahl: '{{ anzahl }}'
    - action: rest_command.off_sheet_anlegen
      data:
        barcode: '{{ code }}'
        bestand: '{{ neue_stueckzahl | int(0) }}'
        kategorie: '{{ kategorie | trim }}'
        marke: '{{ marke }}'
        menge: '{{ menge }}'
        produkt: '{{ produkt | trim }}'
        lagerplatz: '{{ lagerplatz }}'
      continue_on_error: true
    - action: telegram_bot.send_message
      data:
        target: 988178587
        parse_mode: html
        message: '{% if modus == ''Einbuchen'' %}📥{% else %}📤{% endif %} <b>Produkt
          {{ modus | lower }}</b>

          🏷️ <b>{{ produkt | trim }}{% if menge not in [''keine Angabe'',''unknown'',''unavailable'','''']
          %} {{ menge }}{% endif %}</b> {% if marke not in [''unknown'',''unavailable'','''',''none'']
          %}🏭 Marke: {{ marke }} {% endif %}🏬 Lagerplatz: {{ lagerplatz }} 📊 Bestand:
          <b>{{ neue_stueckzahl }} Stk.</b> ⏰ {{ now().strftime(''%d.%m.%Y %H:%M'')
          }}'
      continue_on_error: true
    - action: notify.mobile_app_andreas_iphone_15pro_max
      data:
        title: '{% if modus == ''Einbuchen'' %}📥{% else %}📤{% endif %} Produkt {{
          modus | lower }}'
        message: '{{ produkt | trim }} – {{ neue_stueckzahl }} Stk. in {{ lagerplatz
          }}'
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1
      continue_on_error: true
    - if:
      - condition: state
        entity_id: input_boolean.sonos_tts_aktiv
        state: 'on'
      - condition: state
        entity_id: input_boolean.inventar_tts
        state: 'on'
      then:
      - action: tts.speak
        target:
          entity_id: tts.home_assistant_cloud
        data:
          media_player_entity_id: media_player.sonos_all
          message: 'Produkt {{ modus | lower }}: {{ produkt | trim }}. Bestand jetzt
            {{ neue_stueckzahl }} Stück.'
          language: de-DE
      continue_on_error: true
    - action: input_text.set_value
      target:
        entity_id: input_text.off_manuell_name
      data:
        value: ''
    - action: input_text.set_value
      target:
        entity_id: input_text.off_manuell_marke
      data:
        value: ''
    - action: input_text.set_value
      target:
        entity_id: input_text.off_manuell_kategorie
      data:
        value: ''
    - action: input_text.set_value
      target:
        entity_id: input_text.off_menge
      data:
        value: ''
    - action: input_number.set_value
      target:
        entity_id: input_number.off_anzahl
      data:
        value: 1
    - action: input_select.select_option
      target:
        entity_id: input_select.off_menge_einheit
      data:
        option: —
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.off_aus_lokaler_db
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.off_produkt_im_buffer
  off_einbuchen:
    alias: 'OFF: Einbuchen (Shortcut)'
    icon: mdi:basket-plus
    sequence:
    - action: input_select.select_option
      target:
        entity_id: input_select.off_modus
      data:
        option: Einbuchen
    - action: script.off_buchen
  off_ausbuchen:
    alias: 'OFF: Ausbuchen (Shortcut)'
    icon: mdi:basket-minus
    sequence:
    - action: input_select.select_option
      target:
        entity_id: input_select.off_modus
      data:
        option: Ausbuchen
    - action: script.off_buchen
  off_barcode_kopieren:
    alias: 'OFF: Barcode in Zwischenablage kopieren'
    icon: mdi:content-copy
    sequence:
    - variables:
        code: '{{ state_attr(''sensor.off_last_lookup'', ''code'') | string }}'
    - condition: template
      value_template: '{{ code | length >= 8 }}'
    - action: browser_mod.javascript
      data:
        command: navigator.clipboard.writeText('{{ code }}');
    - action: browser_mod.notification
      data:
        message: Barcode {{ code }} kopiert
        duration: 2000
  inventar_vorratskammer_export:
    alias: Inventar Vorratskammer → CSV exportieren
    icon: mdi:file-excel
    sequence:
    - action: todo.get_items
      target:
        entity_id: todo.inventar_vorratskammer
      data:
        status: needs_action
      response_variable: liste
    - action: shell_command.inventar_vorratskammer_csv_init
    - repeat:
        for_each: '{{ liste[''todo.inventar_vorratskammer''][''items''] | default([])
          }}'
        sequence:
        - variables:
            zeile: '{{ repeat.item.summary | string }}'
            beschreibung: '{{ repeat.item.description | default('''') | string }}'
            stk: "{% set neu = zeile | regex_findall('^\\s*([0-9]+)\\s+Stk\\.?') %}\
              \ {% if neu | length > 0 %}\n  {{ neu[0] }}\n{% else %}\n  {% set alt\
              \ = zeile | regex_findall('(?:Stückzahl|Stk\\.): ([0-9]+)') %}\n  {{\
              \ alt[0] if alt | length > 0 else '' }}\n{% endif %}"
            produkt: "{% set neu = zeile | regex_findall('^\\s*[0-9]+\\s+Stk\\.?\\\
              s+([^|]+)') %} {% if neu | length > 0 %}\n  {{ neu[0] | trim }}\n{%\
              \ else %}\n  {% set p = zeile.split(' | ')[0] | trim %}\n  {% set m\
              \ = zeile | regex_findall('Menge: ([^|]+)') %}\n  {% if m | length >\
              \ 0 and (m[0] | trim) not in ['keine Angabe','unknown','unavailable','']\
              \ %}\n    {{ p }} {{ m[0] | trim }}\n  {% else %}\n    {{ p }}\n  {%\
              \ endif %}\n{% endif %}"
            marke: '{% set m = zeile | regex_findall(''Marke: ([^|]+)'') %} {{ (m[0]
              | trim) if m | length > 0 else '''' }}'
            barcode: "{% set m_d = beschreibung | regex_findall('(?:EAN|Barcode):\\\
              s*(\\d+)') %} {% if m_d | length > 0 %}\n  {{ m_d[0] | trim }}\n{% else\
              \ %}\n  {% set m_s = zeile | regex_findall('Barcode:\\s*(\\d+)') %}\n\
              \  {{ (m_s[0] | trim) if m_s | length > 0 else '' }}\n{% endif %}"
            lagerplatz: Vorratskammer
        - action: shell_command.inventar_vorratskammer_csv_zeile
          data:
