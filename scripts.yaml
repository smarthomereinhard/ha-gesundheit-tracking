niimbot_inventar_labels_drucken:
  alias: "\U0001F5A8️ Inventar Labels drucken"
  icon: mdi:label
  description: 'Druckt Inventar-Labels: Ausbuchen + alle Lagerorte'
  mode: queued
  max: 10
  fields:
    label:
      name: Label
      description: Welches Label drucken?
      required: true
      selector:
        select:
          options:
          - Ausbuchen
          - Vorratskammer
          - Kühlschrank
          - Gefrierschrank
          - Schrank
          - Sonstiges
          - Alle
    preview:
      name: Vorschau
      description: Nur Vorschau ohne Druck
      default: false
      selector:
        boolean: {}
  sequence:
  - variables:
      label_map:
        Ausbuchen:
          code: '2900000099999'
          icon: trash-can
          name: AUSBUCHEN
        Vorratskammer:
          code: '2900000000018'
          icon: cupboard
          name: VORRATSKAMMER
        Kühlschrank:
          code: '2900000000025'
          icon: fridge
          name: KÜHLSCHRANK
        Gefrierschrank:
          code: '2900000000032'
          icon: fridge-industrial
          name: GEFRIERSCHRANK
        Schrank:
          code: '2900000000049'
          icon: wardrobe
          name: SCHRANK
        Sonstiges:
          code: '2900000000056'
          icon: package-variant
          name: SONSTIGES
      to_print: '{{ [label] if label != ''Alle'' else [''Ausbuchen'',''Vorratskammer'',''Kühlschrank'',''Gefrierschrank'',''Schrank'',''Sonstiges'']
        }}'
  - repeat:
      for_each: '{{ to_print }}'
      sequence:
      - alias: Warten bis Niimbot verbunden
        wait_template: '{{ is_state(''binary_sensor.niimbot_b0b555_connection'', ''on'')
          }}'
        timeout: 00:02:00
        continue_on_timeout: false
      - alias: Kurz warten nach Verbindung
        delay:
          seconds: 2
      - action: niimbot.print
        target:
          device_id: 80f37c115038fb0ddd49c3a2da00d51c
        data:
          width: 400
          height: 240
          density: 3
          preview: '{{ preview | default(false) }}'
          payload:
          - type: qrcode
            data: '{{ label_map[repeat.item][''code''] }}'
            eclevel: m
            x: 5
            y: 5
            boxsize: 5
            border: 1
          - type: text
            value: '{{ label_map[repeat.item][''name''] }}'
            x: 160
            y: 20
            size: 32
            width: 230
            height: 50
            anchor: lt
            align: left
          - type: line
            x: 160
            y: 85
            x2: 395
            y2: 85
            width: 2
          - type: icon
            value: '{{ label_map[repeat.item][''icon''] }}'
            x: 220
            y: 100
            size: 70
          - type: text
            value: '{{ label_map[repeat.item][''code''] }}'
            x: 160
            y: 215
            size: 16
            width: 230
            height: 25
            anchor: lt
            align: left
      - alias: Warten bis Druck fertig
        wait_template: '{{ not is_state_attr(''sensor.niimbot_b0b555_print_duration'',
          ''is_printing'', true) }}'
        timeout: 00:02:00
        continue_on_timeout: true
      - alias: Pause zwischen Labels
        delay:
          seconds: 8
niimbot_custom_label_drucken:
  alias: "\U0001F5A8️ Custom Label drucken"
  icon: mdi:label-outline
  description: Druckt ein individuelles Label mit Name, Untertitel und Datum
  mode: queued
  max: 10
  fields:
    name:
      name: Name
      description: Produktname (z.B. Marmelade)
      required: true
      selector:
        text: {}
    untertitel:
      name: Untertitel
      description: Beschreibung (z.B. selbstgemacht)
      default: ''
      selector:
        text: {}
    datum:
      name: Datum
      description: Datum auf Label (leer = heute)
      default: ''
      selector:
        text: {}
    anzahl:
      name: Anzahl
      description: Wie viele Labels drucken?
      default: 1
      selector:
        number:
          min: 1
          max: 10
          step: 1
    preview:
      name: Vorschau
      description: Nur Vorschau ohne Druck
      default: false
      selector:
        boolean: {}
  sequence:
  - variables:
      druck_datum: '{{ datum if datum != '''' else now().strftime(''%d.%m.%Y'') }}'
      hat_untertitel: '{{ untertitel | default('''') != '''' }}'
  - repeat:
      count: '{{ anzahl | default(1) }}'
      sequence:
      - action: niimbot.print
        target:
          device_id: 80f37c115038fb0ddd49c3a2da00d51c
        data:
          width: 400
          height: 180
          density: 3
          preview: '{{ preview | default(false) }}'
          payload:
          - type: text
            value: '{{ name }}'
            x: 10
            y: 10
            size: 40
            width: 380
            height: 60
            anchor: lt
            align: left
          - type: text
            value: '{{ untertitel | default('''') }}'
            x: 10
            y: 72
            size: 28
            width: 380
            height: 40
            anchor: lt
            align: left
          - type: line
            x: 0
            y: 122
            x2: 400
            y2: 122
            width: 2
          - type: text
            value: '{{ druck_datum }}'
            x: 10
            y: 132
            size: 28
            width: 200
            height: 40
            anchor: lt
            align: left
      - delay:
          seconds: 3
