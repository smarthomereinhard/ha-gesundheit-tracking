hue_lightstrip_grun_pulsieren_1_minute:
  alias: Hue Lightstrip – Grün pulsieren 1 Minute
  mode: single
  sequence:
  - alias: Aktuellen Zustand sichern
    action: scene.create
    data:
      scene_id: hue_lightstrip_1_vor_pulsieren
      snapshot_entities:
      - light.hue_lightstrip_1
  - alias: Lightstrip einschalten und auf Grün setzen
    action: light.turn_on
    target:
      entity_id: light.hue_lightstrip_1
    data:
      rgb_color:
      - 0
      - 255
      - 0
      brightness_pct: 15
      transition: 0.5
  - delay:
      milliseconds: 600
  - alias: 1 Minute grün pulsieren
    repeat:
      count: 15
      sequence:
      - alias: Hochdimmen
        action: light.turn_on
        target:
          entity_id: light.hue_lightstrip_1
        data:
          rgb_color:
          - 0
          - 255
          - 0
          brightness_pct: 100
          transition: 1
      - delay:
          seconds: 1
      - alias: Runterdimmen
        action: light.turn_on
        target:
          entity_id: light.hue_lightstrip_1
        data:
          rgb_color:
          - 0
          - 255
          - 0
          brightness_pct: 15
          transition: 1
      - delay:
          seconds: 1
  - alias: Vorherigen Zustand wiederherstellen
    action: scene.turn_on
    target:
      entity_id: scene.hue_lightstrip_1_vor_pulsieren
    data:
      transition: 1
  description: ''
