the_frame_55_ein_und_art_mode:
  alias: The Frame (55) – Einschalten und Art Mode
  description: Schaltet den 55er The Frame ein und setzt ihn robust in den Art Mode.
  mode: single
  sequence:
  - choose:
    - conditions:
      - condition: state
        entity_id: media_player.samsung_the_frame_55_thf
        state: 'off'
      sequence:
      - alias: Erster Einschaltversuch
        action: media_player.turn_on
        target:
          entity_id: media_player.samsung_the_frame_55_thf
      - alias: Auf TV-Start warten (20s)
        wait_template: '{{ not is_state(''media_player.samsung_the_frame_55_thf'',
          ''off'') }}'
        timeout: 00:00:20
        continue_on_timeout: true
      - alias: Zweiter Versuch falls noch aus
        choose:
        - conditions:
          - condition: state
            entity_id: media_player.samsung_the_frame_55_thf
            state: 'off'
          sequence:
          - action: media_player.turn_on
            target:
              entity_id: media_player.samsung_the_frame_55_thf
          - wait_template: '{{ not is_state(''media_player.samsung_the_frame_55_thf'',
              ''off'') }}'
            timeout: 00:00:20
            continue_on_timeout: true
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.samsung_the_frame_55_thf
      state: 'off'
  - alias: Stabilisierungszeit
    delay:
      seconds: 5
  - alias: Art Mode Versuch 1
    action: samsungtv_smart.set_art_mode
    data:
      entity_id: media_player.samsung_the_frame_55_thf
  - delay:
      seconds: 5
  - alias: Art Mode Versuch 2 (Absicherung)
    action: samsungtv_smart.set_art_mode
    data:
      entity_id: media_player.samsung_the_frame_55_thf
  - delay:
      seconds: 5
  - alias: Art Mode Versuch 3 (letzter Fallback)
    action: samsungtv_smart.set_art_mode
    data:
      entity_id: media_player.samsung_the_frame_55_thf
