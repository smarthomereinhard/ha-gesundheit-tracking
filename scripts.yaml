notfall_medikamente_benachrichtigung:
  alias: "\U0001F6A8 Notfall – Medikamente senden"
  icon: mdi:pill-multiple
  mode: single
  sequence:
  - variables:
      med_text: "{% set ns = namespace(text='') %} {% for i in [1,2,3,4,5,6] %} {%
        set name = states('input_text.medikament_' ~ i ~ '_name') %} {% if name not
        in ['unknown', '', 'unavailable', 'None'] and is_state('input_boolean.medikament_'
        ~ i ~ '_aktiv', 'on') %} {% set menge = states('input_select.medikament_'
        ~ i ~ '_menge') %} {% set mg = states('input_text.medikament_' ~ i ~ '_mg')
        %} {% set mahlzeit = states('input_select.medikament_' ~ i ~ '_mahlzeit')
        %} {% set morgen_aktiv = is_state('input_boolean.medikament_' ~ i ~ '_morgen_aktiv',
        'on') %} {% set zt = states('input_datetime.medikament_' ~ i ~ '_zeit') %}
        {% set zm = states('input_datetime.medikament_' ~ i ~ '_mittag_zeit') %} {%
        set za = states('input_datetime.medikament_' ~ i ~ '_abend_zeit') %} {% set
        h = states('input_text.medikament_' ~ i ~ '_hinweis') %} {% set z = '\U0001F48A
        ' ~ name %} {% if mg not in ['', 'unknown', 'unavailable', 'None'] %}{% set
        z = z ~ ' (' ~ mg ~ ' mg)' %}{% endif %} {% set z = z ~ '\\n   ' ~ menge %}
        {% if mahlzeit not in ['Egal', 'unknown', 'unavailable'] %}{% set z = z ~
        ' · ' ~ mahlzeit %}{% endif %} {% if morgen_aktiv and zt not in ['00:00:00',
        'unknown', 'unavailable'] %}{% set z = z ~ '\\n   \U0001F305 ' ~ zt[:5] ~
        ' Uhr' %}{% endif %} {% if zm not in ['00:00:00', 'unknown', 'unavailable']
        %}{% set z = z ~ '\\n   ☀️ ' ~ zm[:5] ~ ' Uhr' %}{% endif %} {% if za not
        in ['00:00:00', 'unknown', 'unavailable'] %}{% set z = z ~ '\\n   \U0001F319
        ' ~ za[:5] ~ ' Uhr' %}{% endif %} {% if h not in ['', 'unknown', 'unavailable',
        'None'] %}{% set z = z ~ '\\n   \U0001F4DD ' ~ h %}{% endif %} {% set ns.text
        = ns.text ~ z ~ '\\n\\n' %} {% endif %} {% endfor %} {{ ns.text | trim }}"
  - parallel:
    - action: telegram_bot.send_message
      data:
        chat_id: 988178587
        parse_mode: html
        message: "\U0001F6A8 <b>NOTFALL – MEDIKAMENTE</b>\n\n{{ med_text }}"
    - action: notify.mobile_app_andreas_iphone_15pro_max
      data:
        title: "\U0001F6A8 NOTFALL – MEDIKAMENTE"
        message: '{{ med_text }}'
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
    - action: browser_mod.navigate
      data:
        path: /meine-gesundheit/notfall-medikamente
batterien_ansagen_low_liste:
  alias: Batterien ansagen (Low-Liste)
  mode: single
  sequence:
  - variables:
      store: '{{ states(''input_text.batterie_low_liste'') }}'
      data_obj: "{% if store in ['unknown','unavailable','none',''] %}\n  {{ dict()
        }}\n{% else %}\n  {{ store | from_json }}\n{% endif %}\n"
      items: '{{ data_obj.values() | list }}'
      count: '{{ items | length }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ count == 0 }}'
      sequence:
      - action: media_player.volume_set
        target:
          entity_id: media_player.sonos_all
        data:
          volume_level: 0.49
      - target:
          entity_id: media_player.sonos_all
        data:
          message: Keine Batterie Warnungen vorhanden.
          cache: false
        action: tts.cloud_say
    - conditions:
      - condition: template
        value_template: '{{ count > 0 }}'
      sequence:
      - action: media_player.volume_set
        target:
          entity_id: media_player.sonos_all
        data:
          volume_level: 0.49
      - target:
          entity_id: media_player.sonos_all
        data:
          message: 'Es gibt {{ count }} Geräte mit niedriger Batterie. {% for i in
            items %} {{ i.device_name }}: {{ i.battery_level }} Prozent. {% endfor
            %}'
          cache: false
        action: tts.cloud_say
  description: ''
