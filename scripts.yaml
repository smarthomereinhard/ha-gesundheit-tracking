        | float(0) - states(\"input_number.wasser_warm_stand_vorherig\") | float(0))
        | round(3) }} m³\n  Kosten: {{ ((states(\"input_number.wasser_warm_zaehlerstand\")
        | float(0) - states(\"input_number.wasser_warm_stand_vorherig\") | float(0))
        * 8.5) | round(2) }} €\n\n\U0001F4B6 Gesamtkosten Periode:\n  {{ (((states(\"input_number.wasser_kalt_zaehlerstand\")
        | float(0) - states(\"input_number.wasser_kalt_stand_vorherig\") | float(0))
        * 2.5) + ((states(\"input_number.wasser_warm_zaehlerstand\") | float(0) -
        states(\"input_number.wasser_warm_stand_vorherig\") | float(0)) * 8.5)) |
        round(2) }} €"
