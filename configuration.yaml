input_text:
  medikament_1_name:
    name: "Medikament 1 Name"
    icon: mdi:pill
    max: 50
    initial: ""
  medikament_2_name:
    name: "Medikament 2 Name"
    icon: mdi:pill
    max: 50
    initial: ""
  medikament_3_name:
    name: "Medikament 3 Name"
    icon: mdi:pill
    max: 50
    initial: ""
  medikament_1_hinweis:
    name: "Medikament 1 Hinweis"
    icon: mdi:information-outline
    max: 100
    initial: ""
  medikament_2_hinweis:
    name: "Medikament 2 Hinweis"
    icon: mdi:information-outline
