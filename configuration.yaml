    name: "Medikament 3 Hinweis"
    icon: mdi:information-outline
    max: 100
    initial: ""
  barcode_scan:
    name: "Barcode Scan"
    max: 255
    icon: mdi:barcode-scan
  spulmaschine_letzte_kosten:
    name: "Spülmaschine letzte Kosten"
    max: 20
    icon: mdi:dishwasher

input_datetime:
  medikament_1_zeit:
