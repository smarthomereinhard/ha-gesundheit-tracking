input_select:
  energie_ansicht:
    name: Energie Ansicht
    icon: mdi:swap-horizontal
    options:
      - Verbrauch
      - Kosten
    initial: Verbrauch
  aktuelles_produkt:
    name: "Aktuelles Produkt"
    icon: mdi:package-variant
    options:
      - "Keine Auswahl"
  db_anzeigetafel_bahnhof:
    name: DB Anzeigetafel Bahnhof
    icon: mdi:train
    options:
      - Mannheim Hbf
      - Mannheim Arena
      - Heidelberg Hbf
      - Eberbach
    initial: Mannheim Hbf
  db_anzeigetafel_zeitfenster:
    name: DB Zeitfenster
    icon: mdi:clock-outline
    options:
      - 30 Minuten
      - 1 Stunde
      - 2 Stunden
      - 6 Stunden
      - 24 Stunden
    initial: 2 Stunden