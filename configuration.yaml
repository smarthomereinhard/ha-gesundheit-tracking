default_config:

lovelace:
  mode: storage
  dashboards:
    home-overview:
      mode: yaml
      title: Home
      icon: mdi:home
      show_in_sidebar: true
      filename: dashboards/home.yaml
    medikamente-verwaltung:
      mode: yaml
      title: Medikamente
      icon: mdi:pill
      show_in_sidebar: true
      filename: dashboards/medikamente.yaml
    wasch-kueche:
      mode: yaml
      title: Waschküche
      icon: mdi:washing-machine
      show_in_sidebar: true
      filename: dashboards/waschkueche.yaml
    meine-gesundheit:
      mode: yaml
      title: Gesundheit
      icon: mdi:heart-pulse
      show_in_sidebar: true
      filename: dashboards/health.yaml
    karo-gesundheit:
      mode: yaml
      title: Gesundheit Karo
      icon: mdi:heart-pulse
      show_in_sidebar: true
      filename: dashboards/karo_gesundheit.yaml

influxdb:
  host: a0d7b954-influxdb
  port: 8086
  database: homeassistant
  username: homeassistant
  password: homeassistant123
  max_retries: 3
  default_measurement: state
  exclude:
    domains:
      - automation
      - script
      - scene
      - group
      - update
      - button
  include:
    domains:
      - sensor
      - binary_sensor
      - switch
      - light
      - climate
      - cover
      - fan
      - input_boolean
      - input_number

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1

frontend:
  themes: !include_dir_merge_named themes

homeassistant:
  packages: !include_dir_named packages

automation: !include automations.yaml

script: !include scripts.yaml

scene: !include scenes.yaml

shell_command:
  restlos_update: "python3 /Users/andreasreinhard/.openclaw/workspace/restlos_html_generator_iphone.py && python3 /Users/andreasreinhard/.openclaw/workspace/restlos_shopping_list.py && python3 /Users/andreasreinhard/.openclaw/workspace/restlos_csv_export.py && python3 /Users/andreasreinhard/.openclaw/workspace/restlos_ha_sensors.py"
  medikament_csv_log: 'echo "${ZEILE}" >> /config/www/medikamente_protokoll.csv'
  medikament_csv_init: 'test -f /config/www/medikamente_protokoll.csv || echo "Datum,Wochentag,Uhrzeit,Medikament,Slot,Dosierung" > /config/www/medikamente_protokoll.csv'
  medikament_wochenbericht: 'python3 /config/medikamente_wochenbericht.py'

rest_command:
  medikament_sheets_log:
    url: "https://script.google.com/macros/s/AKfycbxhuyU7wUhUCcSecIJXYUsFWpoTBXt59HB12UGvVNdGItK77MPEX2_IhRYpH5JO6Ul4/exec"
    method: POST
    headers:
      Content-Type: application/json
    payload: '{"datum":"{{ datum }}","wochentag":"{{ wochentag }}","uhrzeit":"{{ uhrzeit }}","medikament":"{{ medikament }}","slot":"{{ slot }}","dosierung":"{{ dosierung }}","menge":"{{ menge }}"}'
  medikament_sheets_bestand:
    url: "https://script.google.com/macros/s/AKfycbxhuyU7wUhUCcSecIJXYUsFWpoTBXt59HB12UGvVNdGItK77MPEX2_IhRYpH5JO6Ul4/exec"
    method: POST
    headers:
      Content-Type: application/json
    payload: '{"type":"bestand","medikament":"{{ medikament }}","pzn":"{{ pzn }}","dosierung":"{{ dosierung }}","menge":"{{ menge }}","vorrat":{{ vorrat }},"dosen":{{ dosen }},"packung":{{ packung }},"warnung":{{ warnung }},"status":"{{ status }}"}'
  magic_mirror_monitor_on:
    url: "http://192.168.178.183:8080/api/notification/MONITORON?apiKey=magicmirror123"
    method: GET
  magic_mirror_monitor_off:
    url: "http://192.168.178.183:8080/api/notification/MONITOROFF?apiKey=magicmirror123"
    method: GET
  magic_mirror_shutdown:
    url: "http://192.168.178.183:8080/api/notification/SHUTDOWN?apiKey=magicmirror123"
    method: GET
  magic_mirror_reboot:
    url: "http://192.168.178.183:8080/api/notification/REBOOT?apiKey=magicmirror123"
    method: GET

input_number:
  bestand_aktuell:
    name: "Bestand (aktuell)"
    icon: mdi:package
    unit_of_measurement: "Stk"
    min: 0
    max: 999
    step: 1
  spuelmaschine_start_kwh:
    name: "Spülmaschine Start kWh"
    min: 0
    max: 99999
    step: 0.001
    unit_of_measurement: "kWh"
    icon: mdi:dishwasher
  waschmaschine_start_kwh:
    name: "Waschmaschine Start kWh"
