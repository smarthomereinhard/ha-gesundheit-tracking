  hund_erinnerung_tts:
    name: "Hund Erinnerung TTS"
    icon: mdi:volume-high
    initial: true
  ich_schlafe_noch:
    name: "Ich schlafe noch"
    icon: mdi:sleep
    initial: false
  inventar_tts:
    name: "Inventar Ansage"
    icon: mdi:barcode-scan
    initial: true
  medikament_1_aktiv:
    name: "Medikament 1 aktiv"
    icon: mdi:pill
    initial: false
  medikament_2_aktiv:
    name: "Medikament 2 aktiv"
    icon: mdi:pill
    initial: false
  medikament_3_aktiv:
