            primary: "📖 Dashboard-Anleitung"
            secondary: Antippen für Erklärung & Hilfe
            icon: mdi:information-outline
            icon_color: blue
            fill_container: true
            layout: horizontal
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  title: "💊 Medikamente – Anleitung"
                  dismissable: true
                  right_button: "Verstanden ✓"
                  content:
                    type: markdown
                    content: "## 💊 Medikamente – Anleitung\n\n---\n\n### 📊 Übersicht (oben)\n- **Chips-Leiste** – Name jedes Medikaments · 🟢 grün = aktiv, ⚫ grau = inaktiv\n- **Offene Erinnerungen** – 🔴 rot solange Einnahme nicht bestätigt wurde\n- **Vorrat kritisch** – 🔴 rot wenn Bestand ≤ Warnschwelle\n\n---\n\n### 💊 Jede Medikament-Karte\n**Statuskarte** – Name, aktive Zeitslots (🌅🕛🌙), Dosierung und Mahlzeit-Hinweis\n\n**Info-Zeile** (zwei Felder nebeneinander)\n- *Letzte Einnahme* – 🟢 grün wenn heute · 🟡 amber wenn älter\n- *Vorrat* – Stückzahl + berechnete Packungen (z. B. 150 Stück ≈ 0.8 Pkg.)\n\n**Aktiv-Schalter** – alle Erinnerungen für dieses Medikament ein/aus\n\n---\n\n### ⚙️ Einstellungen (Zahnrad-Expander)\n\n| Feld | Bedeutung |\n|---|---|\n| Name | Freiname des Medikaments |\n| PZN | Pharmazentralnummer für die Apotheke |\n| Dosierung | z. B. »1 Tablette« |\n| Mahlzeit | Egal / Vor dem Essen / Nach dem Essen / Zum Essen |\n| Wochentage | Täglich / Werktags / Mo·Mi·Fr / usw. |\n\n**Zeitslots** – jeden Slot einzeln aktivieren und Uhrzeit setzen:\n- 🌅 **Morgens** – Toggle + Uhrzeit\n- 🕛 **Mittags** – Toggle + Uhrzeit\n- 🌙 **Abends** – Toggle + Uhrzeit\n\n| Feld | Bedeutung |\n|---|---|\n| Vorrat (Stück) | Aktueller Gesamtbestand |\n| Packungsgröße | Stück pro Packung (z. B. 200) |\n| ➕ Packung einbuchen | Antippen = +1 Packung zum Vorrat |\n| Warnung ab | Warnung wenn Vorrat ≤ diesem Wert |\n| Hinweis | Freitext (z. B. »mit Wasser nehmen«) |\n\n🛒 **Arznei-Liste** – fügt Medikament + PZN + Stückzahl in die Todo-Liste *Arznei* ein\n\n📋 **Gelber Info-Button** – zeigt Beschreibung, Einnahme-Hinweise und Nebenwirkungen des Medikaments in einem Popup\n\n🗑️ **Roter Reset-Button** – öffnet eine Sicherheitsabfrage und setzt **alle** Einstellungen des Medikaments auf leer/Standard zurück (Name, PZN, Vorrat, Zeitslots, usw.)\n\n---\n\n### 🔔 Erinnerungsablauf\n1. Zum eingestellten Zeitpunkt → **Push-Notification** mit Zeitslot + Mahlzeit-Hinweis\n2. Wenn zuhause → **Licht blinkt rot** + **TTS über Sonos**\n3. Alle **15 Min. Wiederholung** bis zur Bestätigung\n4. »✅ Genommen« → Zeitstempel gesetzt · Vorrat −1 · Licht kurz grün\n\n*Nur aktiv wenn:* Medikament aktiv + Zeitslot aktiv + Wochentag passt\n\n---\n\n### 📦 Vorrat & Packungsverwaltung\n- **Packungsgröße** einmalig eintragen (z. B. 200 Stück/Packung)\n- **Anfangsvorrat** = Packungen × Größe manuell setzen (z. B. 2 × 200 = 400)\n- Jede bestätigte Einnahme → Vorrat automatisch −1\n- Neue Packung → **➕ Packung einbuchen** antippen\n- Täglich **08:00 Uhr**: Prüfung → Push + Todo-Eintrag in *Arznei* bei niedrigem Vorrat\n\n---\n\n### 🧪 Testmodus\nDer **Testmodus-Schalter** oben im Dashboard erlaubt das Testen der Erinnerungen ohne Alarm:\n\n| Modus | Verhalten |\n|---|---|\n| **Normal (aus)** | iOS Critical Push + Licht blinkt rot + TTS Sonos |\n| **Testmodus (an)** | Nur stille Telegram-Nachricht – kein Alarm, kein Licht, kein TTS |\n\nDie Bestätigung (»✅ Genommen«), der Vorrats-Abzug und der Zeitstempel funktionieren im Testmodus **genauso** wie normal.\n\n⚠️ Nach dem Test **Testmodus wieder ausschalten**, damit echte Alarme wieder kommen!"

