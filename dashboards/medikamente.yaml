                    content: |-
                      {%- set name = states('input_text.medikament_1_name') %}
                      ## 💊 {{ name if name | trim != '' else 'Medikament 1' }}

                      ---

                      ### Anwendungsgebiete

                      - Bluthochdruck
                      - Herzschwäche
                      - Herzschwäche nach Herzinfarkt
                      - Vorbeugung gegen Herzinfarkt und Schlaganfall bei erhöhtem Risiko
                      - Nichtdiabetische Nierenerkrankung (Glomerulopathie)
                      - Nierenerkrankung bei Diabetes

                      ---

                      ### Dosierung und Anwendungshinweise

                      **1 Tablette · 1-mal täglich · morgens** (unabhängig von der Mahlzeit)

                      **½ Tablette · 2-mal täglich · morgens und abends** (unabhängig von der Mahlzeit)

                      **½–1 Tablette · 1-mal täglich · morgens** (unabhängig von der Mahlzeit)

                      Die Gesamtdosis nicht ohne Rücksprache mit Arzt oder Apotheker überschreiten.

                      **Anwendung:** Mit ausreichend Flüssigkeit (z.B. 1 Glas Wasser) einnehmen.

                      **Dauer:** Zeitlich nicht begrenzt, richtet sich nach Erkrankung – nur vom Arzt zu bestimmen.

                      **Überdosierung:** Blutdruckabfall, Pulserniedrigung, Kreislaufversagen möglich → sofort Arzt kontaktieren.

                      **Einnahme vergessen:** Zum nächsten Zeitpunkt normal fortsetzen (keine doppelte Dosis).

                      ---

                      ### Gegenanzeigen

                      **Immer:**
                      - Überempfindlichkeit gegen Inhaltsstoffe
                      - Zustand nach Nierentransplantation
                      - Dialyse
                      - Überproduktion von Aldosteron in der Nebenniere
                      - Gestörte Abwehrreaktionen (überschießende Immunreaktionen, Desensibilisierung)

                      **Unter Umständen (Arzt/Apotheker fragen):**
                      - Hypertrophe Kardiomyopathie
                      - Verengung einer Herzklappe (Mitral-/Aortenklappe)
                      - Koronare Herzkrankheit
                      - Durchblutungsstörung der Hirngefäße
                      - Eingeschränkte Nieren- oder Leberfunktion
                      - Verengung einer Nierenarterie
                      - Flüssigkeits-/Salz-Haushaltsstörungen (Erbrechen, Durchfall)
                      - Diabetes mellitus
                      - Neigung zu angioneurotischem Ödem
                      - Kollagenosen (Lupus erythematodes, Sklerodermie)

                      **Altersgruppen:**
                      - Kinder unter 18 Jahren: nicht anwenden
                      - Ab 65 Jahren: engmaschige Kontrolle empfohlen

                      **Schwangerschaft/Stillzeit:** Nicht empfohlen; Abstillen ggf. in Erwägung ziehen.

                      ---

                      ### Nebenwirkungen

                      - **Husten** (vor allem trockener Husten)
                      - Magen-Darm: Übelkeit, Erbrechen, Durchfall, Bauchschmerzen
                      - Geschmacksstörungen, Appetitlosigkeit
                      - Kopfschmerzen, Schwindel, Müdigkeit, Benommenheit
                      - Schlafstörungen, Depressionen, Missempfindungen
                      - Bindehautentzündung, Schnupfen
                      - Hautreaktionen: Juckreiz, Hautausschlag, Nesselausschlag, Schwitzen
                      - **Angioneurotisches Ödem** (Schwellung Gesicht, Hand, Fuß)
                      - Blutdruckabfall, Herzklopfen, Pulsbeschleunigung
                      - Nierenfunktionsstörungen (Kreatinin- und Harnstoffanstieg)
                      - Erhöhte Kaliumwerte, Leberwertanstieg
                      - Allgemeine Schwäche, Potenzschwäche, Sodbrennen, Sehstörungen

                      Bei Veränderungen → Arzt oder Apotheker aufsuchen.

                      ---

                      ### Zusammensetzung

                      **Wirkstoff:** Ramipril 10 mg

                      **Hilfsstoffe:** Mikrokristalline Cellulose · Hypromellose · Natriumhydrogencarbonat · Natriumstearylfumarat · Vorverkleisterte Maisstärke

                      ---

                      ### Wirkungsweise

                      **ACE-Hemmer:** Verhindert Freisetzung von Angiotensin, das Blutgefäße verengt und den Blutdruck erhöht. Erweitert Blutgefäße indirekt und entlastet das Herz.

                      ---

                      ### Wichtige Hinweise

                      - Reaktionsvermögen kann beeinträchtigt sein → Vorsicht im Straßenverkehr und bei Maschinenbedienung
                      - ACE-Hemmer: verstärkte Überempfindlichkeitsreaktionen auf Insektenstiche möglich
                      - Wechselwirkungen möglich → alle Arzneimittel dem Arzt/Apotheker angeben

                      **Aufbewahrung:** Vor Hitze geschützt aufbewahren.

                      ---

                      *Zu Risiken und Nebenwirkungen lesen Sie die Packungsbeilage und fragen Sie Ihren Arzt oder Apotheker.*
