      - type: custom:expander-card
        title: "💊 Medikament 6"
        expanded: true
        icon: mdi:pill
        cards:
          - type: custom:mushroom-template-card
            primary: >-
              {% set name = states('input_text.medikament_6_name') %}
              {{ name if name | trim != '' else 'Medikament 6' }}
            secondary: >-
              {% if is_state('input_boolean.medikament_6_aktiv', 'on') %}
                {% set slots = namespace(s=[]) %}
                {% if is_state('input_boolean.medikament_6_morgen_aktiv','on') %}{% set slots.s = slots.s + ['🌅 '~states('input_datetime.medikament_6_zeit')[:5]] %}{% endif %}
                {% if is_state('input_boolean.medikament_6_mittag_aktiv','on') %}{% set slots.s = slots.s + ['🕛 '~states('input_datetime.medikament_6_mittag_zeit')[:5]] %}{% endif %}
                {% if is_state('input_boolean.medikament_6_abend_aktiv','on') %}{% set slots.s = slots.s + ['🌙 '~states('input_datetime.medikament_6_abend_zeit')[:5]] %}{% endif %}
                {% set dos = states('input_text.medikament_6_dosierung') %}
                {% set mahlzeit = states('input_select.medikament_6_mahlzeit') %}
                {{ slots.s | join(' · ') if slots.s else 'Kein Zeitslot aktiv' }}
                {%- if dos | trim != '' %} · {{ dos }}{% endif %}
                {%- if mahlzeit != 'Egal' %} · {{ mahlzeit }}{% endif %}
                {%- if is_state('input_boolean.medikament_6_offen','on') %} · ⚠️ offen{% endif %}
              {% else %}Inaktiv{% endif %}
            icon: mdi:pill
            icon_color: >-
              {% if is_state('input_boolean.medikament_6_offen','on') %}red
              {% elif is_state('input_boolean.medikament_6_aktiv','on') %}green
              {% else %}grey{% endif %}
            badge_icon: >-
              {% if is_state('input_boolean.medikament_6_offen','on') %}mdi:bell-ring
              {% elif is_state('input_boolean.medikament_6_aktiv','on') %}mdi:check-circle
              {% else %}mdi:minus-circle{% endif %}
            badge_color: >-
              {% if is_state('input_boolean.medikament_6_offen','on') %}red
              {% elif is_state('input_boolean.medikament_6_aktiv','on') %}green
              {% else %}grey{% endif %}
            multiline_secondary: false
            fill_container: true
            layout: horizontal
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: Letzte Einnahme
                secondary: >-
                  {% set l = states('input_datetime.medikament_6_letzte_einnahme') %}
                  {% if l not in ['unavailable','unknown',''] %}
                    {% if as_timestamp(l)|timestamp_custom('%Y-%m-%d') == now().strftime('%Y-%m-%d') %}Heute · {{ as_timestamp(l)|timestamp_custom('%H:%M') }} Uhr ✓
                    {% else %}{{ as_timestamp(l)|timestamp_custom('%d.%m.%Y') }}{% endif %}
                  {% else %}Noch nicht erfasst{% endif %}
                icon: mdi:clock-check-outline
                icon_color: >-
                  {% set l = states('input_datetime.medikament_6_letzte_einnahme') %}
                  {% if l not in ['unavailable','unknown',''] %}
                    {% if as_timestamp(l)|timestamp_custom('%Y-%m-%d') == now().strftime('%Y-%m-%d') %}green{% else %}amber{% endif %}
                  {% else %}grey{% endif %}
                fill_container: true
                layout: horizontal
              - type: custom:mushroom-template-card
                primary: Vorrat
                secondary: >-
                  {% set v = states('input_number.medikament_6_vorrat') | int(0) %}
                  {% set w = states('input_number.medikament_6_vorrat_warnung') | int(10) %}
                  {% set g = states('input_number.medikament_6_packung_groesse') | int(0) %}
                  {{ v }} Stück{%- if g > 0 %} (≈{{ (v/g)|round(1) }} Pkg.){%- endif %}{%- if v <= w %} · ⚠️ Nachbestellen!{% endif %}
                icon: mdi:pill-multiple
                icon_color: >-
                  {% set v = states('input_number.medikament_6_vorrat') | int(0) %}
                  {% set w = states('input_number.medikament_6_vorrat_warnung') | int(10) %}
                  {% if v <= w %}red{% elif v <= w*2 %}amber{% else %}green{% endif %}
                fill_container: true
                layout: horizontal
