  # EINGANG (Subview)
  ##############################################
  - title: Eingang
    path: eingang
    icon: mdi:door
    type: sections
    subview: true
    back_path: /home-overview/home
    sections:
      - title: "💡 Beleuchtung"
        cards:
          - type: custom:expander-card
            title: 💡 Beleuchtung
            expanded: false
            icon: mdi:lightbulb
            cards:
              - type: tile
                entity: light.deckenlampe_eingang
                name: Deckenlampe Eingang
                features:
                  - type: light-brightness
              - type: tile
                entity: light.deckenlampe_flur
                name: Deckenlampe Flur
                features:
                  - type: light-brightness

      - title: "🔔 Türsummer"
        cards:
          - type: custom:expander-card
            title: 🔔 Türsummer
            expanded: false
            icon: mdi:door
            cards:
              - type: custom:button-card
                entity: lock.tur_summer
                name: Türsummer
                icon: |
                  [[[
                    return states['input_boolean.tuer_summer_gesperrt']?.state === 'on'
                      ? 'mdi:door-closed-lock'
                      : 'mdi:home-lock-open';
                  ]]]
                triggers_update:
                  - lock.tur_summer
                  - input_boolean.tuer_summer_gesperrt
                show_icon: true
                show_name: true
                show_state: false
                show_label: true
                tap_action:
                  action: call-service
                  service: button.press
                  service_data:
                    entity_id: button.tur_summer
                hold_action:
                  action: more-info
                label: |
                  [[[
                    const gesperrt = states['input_boolean.tuer_summer_gesperrt']?.state === 'on';
                    const schloss = entity.state === 'unlocked' ? 'Offen' : 'Geschlossen';
                    return `${gesperrt ? 'Gesperrt' : 'Entsperrt'} · ${schloss}`;
                  ]]]
                custom_fields:
                  badge: |
                    [[[
                      const gesperrt = states['input_boolean.tuer_summer_gesperrt']?.state === 'on';
                      return `<div class="status-badge">${gesperrt ? 'GESPERRT' : 'OFFEN'}</div>`;
                    ]]]
                  action_hint: |
                    [[[
                      return `<div class="action-hint">Tippen zum Öffnen · Halten für Details</div>`;
                    ]]]
                styles:
                  grid:
                    - grid-template-areas: '"i n n badge" "i l l badge" "action_hint action_hint action_hint action_hint"'
                    - grid-template-columns: 78px 1fr 1fr auto
                    - column-gap: 14px
                    - row-gap: 10px
                  card:
                    - padding: 20px
                    - border-radius: 28px
                    - border: 1px solid rgba(255,255,255,0.08)
                    - background: |
                        [[[
                          const gesperrt = states['input_boolean.tuer_summer_gesperrt']?.state === 'on';
                          return gesperrt
                            ? 'linear-gradient(180deg, rgba(244,67,54,0.18) 0%, rgba(244,67,54,0.05) 100%)'
                            : 'linear-gradient(180deg, rgba(76,175,80,0.18) 0%, rgba(76,175,80,0.05) 100%)';
                        ]]]
                  img_cell:
                    - width: 78px
                    - height: 78px
                    - border-radius: 24px
                    - background: |
                        [[[
                          const gesperrt = states['input_boolean.tuer_summer_gesperrt']?.state === 'on';
                          return gesperrt ? 'rgba(244,67,54,0.15)' : 'rgba(76,175,80,0.15)';
                        ]]]
                  icon:
                    - width: 42px
                    - color: |
                        [[[
                          const gesperrt = states['input_boolean.tuer_summer_gesperrt']?.state === 'on';
                          return gesperrt ? '#F44336' : '#4CAF50';
                        ]]]
                  name:
                    - justify-self: start
