title: Home
views:
  ##############################################
  # HAUPTÜBERSICHT
  ##############################################
  - title: Home
    path: home
    icon: mdi:home
    type: sections
    sections:
      - title: Räume
        cards:
          - type: grid
            columns: 2
            square: true
            cards:
              - type: button
                name: Wohnzimmer
                icon: mdi:sofa
                entity: light.wohnzimmer
                show_state: false
                tap_action:
                  action: navigate
                  navigation_path: /home-overview/wohnzimmer
              - type: button
                name: Schlafzimmer
                icon: mdi:bed
                entity: light.schlafzimmer
                show_state: false
                tap_action:
                  action: navigate
                  navigation_path: /home-overview/schlafzimmer
              - type: button
                name: Küche
                icon: mdi:chef-hat
                entity: light.kuche
                show_state: false
                tap_action:
                  action: navigate
                  navigation_path: /home-overview/kuche
              - type: button
                name: Eingang
                icon: mdi:door
                entity: light.deckenlampe_eingang
                show_state: false
                tap_action:
                  action: navigate
                  navigation_path: /home-overview/eingang
              - type: button
                name: Büro
                icon: mdi:desk
                entity: light.buro
                show_state: false
                tap_action:
                  action: navigate
                  navigation_path: /home-overview/buro
              - type: button
                name: Balkon
                icon: mdi:flower
                entity: light.balkon
                show_state: false
                tap_action:
                  action: navigate
                  navigation_path: /home-overview/balkon
              - type: button
                name: Abstellkammer
                icon: mdi:archive-outline
                entity: binary_sensor.ikea_sensor_05_tur
                show_state: false
                tap_action:
                  action: navigate
                  navigation_path: /home-overview/abstellkammer
              - type: button
                name: Badezimmer
                icon: mdi:shower
                entity: light.licht_deckenlampe_bad
                show_state: false
                tap_action:
                  action: navigate
                  navigation_path: /home-overview/bad
              - type: button
                name: Radio
                icon: mdi:radio
                entity: input_select.radio_lautsprecher
                show_state: false
                tap_action:
                  action: navigate
                  navigation_path: /home-overview/radio
              - type: button
                name: Hund
                icon: mdi:dog
                entity: input_boolean.hund_gefuettert_morgens
                show_state: false
                tap_action:
                  action: navigate
                  navigation_path: /home-overview/hund

      - title: Magic Mirror
        cards:
          - type: tile
            entity: input_boolean.magic_mirror_monitor
            name: Monitor AN/AUS
            icon: mdi:mirror
          - type: grid
            columns: 2
            square: false
            cards:
              - type: button
                name: Shutdown
                icon: mdi:power
                entity: script.magic_mirror_shutdown
                tap_action:
                  action: perform-action
                  perform_action: script.turn_on
                  target:
                    entity_id: script.magic_mirror_shutdown
              - type: button
                name: Neustart
                icon: mdi:restart
                entity: script.magic_mirror_neustart
                tap_action:
                  action: perform-action
                  perform_action: script.turn_on
                  target:
                    entity_id: script.magic_mirror_neustart

  ##############################################
  # WOHNZIMMER (Subview)
  ##############################################
  - title: Wohnzimmer
    path: wohnzimmer
    icon: mdi:sofa
    type: sections
    subview: true
    back_path: /home-overview/home
    sections:
      - title: "💡 Beleuchtung"
        cards:
          - type: custom:expander-card
            title: 💡 Beleuchtung
            expanded: false
            icon: mdi:lightbulb
            cards:
              - type: tile
                entity: light.wohnzimmer
                name: Alle Lichter
                features:
                  - type: light-brightness
              - type: tile
                entity: light.deckenlampe
                name: Deckenlampe
                features:
                  - type: light-brightness
              - type: tile
                entity: light.ambilight
                name: Ambilight
                features:
                  - type: light-brightness
              - type: tile
                entity: light.stehlampe_links
                name: Stehlampe Links
                features:
                  - type: light-brightness
              - type: tile
                entity: light.stehlampe_rechts
                name: Stehlampe Rechts
                features:
                  - type: light-brightness
              - type: tile
                entity: light.hue_go_1
                name: Hue Go 1
                features:
                  - type: light-brightness
              - type: tile
                entity: light.hue_go_2
                name: Hue Go 2
                features:
                  - type: light-brightness

      - title: "🪟 Rollladen"
        cards:
          - type: custom:expander-card
            title: 🪟 Rollladen
            expanded: false
            icon: mdi:roller-shade
            cards:
              - type: tile
                entity: cover.rolladen
                name: Rollladen
                features:
                  - type: cover-position

      - title: "🌡️ Klima & Fenster"
        cards:
          - type: custom:expander-card
            title: 🌡️ Klima & Fenster
            expanded: false
            icon: mdi:thermometer
            cards:
              - type: tile
                entity: sensor.timmerflotte_temp_hmd_sensor_temperatur
                name: Temperatur
              - type: tile
                entity: sensor.timmerflotte_temp_hmd_sensor_luftfeuchtigkeit
                name: Luftfeuchtigkeit
              - type: tile
                entity: binary_sensor.fenster_07_entprellt
                name: Fenster 1
              - type: tile
                entity: binary_sensor.fenster_08_entprellt
                name: Fenster 2

      - title: "🖼️ The Frame 55 – Art Mode"
        cards:
          - type: custom:expander-card
            title: 🖼️ The Frame 55 – Art Mode
            expanded: false
            icon: mdi:image-frame
            cards:
              - type: custom:mushroom-title-card
                title: 🖼️ The Frame (55)
                subtitle: Art Mode, Status und Schnellaktionen
              - type: custom:mushroom-chips-card
                alignment: justify
                chips:
                  - type: template
                    entity: media_player.samsung_the_frame_55_thf
                    icon: mdi:television
                    icon_color: >-
                      {% if is_state('media_player.samsung_the_frame_55_thf', 'on') %}green
                      {% elif is_state('media_player.samsung_the_frame_55_thf', 'off') %}grey
                      {% else %}amber{% endif %}
                    content: >-
                      {% if is_state('media_player.samsung_the_frame_55_thf', 'on') %}TV an
                      {% elif is_state('media_player.samsung_the_frame_55_thf', 'off') %}TV aus
                      {% else %}{{ states('media_player.samsung_the_frame_55_thf') }}{% endif %}
                  - type: template
                    entity: media_player.samsung_the_frame_55_thf
                    icon: mdi:video-input-hdmi
                    icon_color: blue
                    content: >-
                      {% set s = state_attr('media_player.samsung_the_frame_55_thf', 'source') %}
                      {{ s if s not in [none, '', 'unknown', 'unavailable'] else 'Keine Quelle' }}
                  - type: template
                    entity: media_player.samsung_the_frame_55_thf
                    icon: mdi:volume-high
                    icon_color: deep-orange
                    content: >-
                      {% set v = state_attr('media_player.samsung_the_frame_55_thf', 'volume_level') %}
                      {% if v is not none %}{{ (v * 100) | round(0) }} %{% else %}—{% endif %}
              - type: custom:mushroom-template-card
                entity: media_player.samsung_the_frame_55_thf
                primary: The Frame (55) – Art Mode
                secondary: |-
                  {% if is_state('media_player.samsung_the_frame_55_thf', 'on') %}Antippen zum Starten des Art Mode
                  {% elif is_state('media_player.samsung_the_frame_55_thf', 'off') %}TV ist aus
                  {% else %}Status: {{ states('media_player.samsung_the_frame_55_thf') }}{% endif %}
                icon: mdi:image-frame
                icon_color: |-
                  {% if is_state('media_player.samsung_the_frame_55_thf', 'on') %}amber
                  {% elif is_state('media_player.samsung_the_frame_55_thf', 'off') %}grey
                  {% else %}blue{% endif %}
                multiline_secondary: true
                fill_container: true
                layout: horizontal
                tap_action:
                  action: perform-action
                  perform_action: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.the_frame_55_art_mode
                hold_action:
                  action: more-info
                double_tap_action:
                  action: perform-action
                  perform_action: media_player.turn_off
                  target:
                    entity_id: media_player.samsung_the_frame_55_thf
                badge_icon: |-
                  {% if is_state('media_player.samsung_the_frame_55_thf', 'on') %}mdi:gesture-tap-button
                  {% else %}mdi:power{% endif %}
                badge_color: |-
                  {% if is_state('media_player.samsung_the_frame_55_thf', 'on') %}green
                  {% else %}red{% endif %}
              - type: grid
                columns: 2
                square: false
                cards:
                  - type: custom:mushroom-template-card
                    primary: Art Mode
                    secondary: Starten
                    icon: mdi:image-frame
                    icon_color: amber
                    fill_container: true
                    tap_action:
                      action: perform-action
                      perform_action: input_boolean.turn_on
                      target:
                        entity_id: input_boolean.the_frame_55_art_mode
                    hold_action:
                      action: more-info
                  - type: custom:mushroom-template-card
                    primary: TV aus
                    secondary: Komplett ausschalten
                    icon: mdi:power
                    icon_color: red
                    fill_container: true
                    tap_action:
                      action: perform-action
                      perform_action: media_player.turn_off
                      target:
                        entity_id: media_player.samsung_the_frame_55_thf
                    hold_action:
                      action: more-info
              - type: custom:mushroom-media-player-card
                entity: media_player.samsung_the_frame_55_thf
                name: The Frame (55)
                icon_type: icon
                use_media_info: true
                show_volume_level: true
                volume_controls:
                  - volume_mute
                  - volume_set
                media_controls:
                  - on_off
                  - play_pause_stop
                fill_container: true

      - title: "🖼️ The Frame 55 – Steuerung"
        cards:
          - type: custom:expander-card
            title: 🖼️ The Frame 55 – Steuerung
            expanded: false
            icon: mdi:television-play
            cards:
              - type: custom:mushroom-title-card
                title: 🖼️ The Frame 55
                subtitle: Einschalten, Art Mode und Status
              - type: custom:mushroom-chips-card
                alignment: justify
                chips:
                  - type: template
                    entity: media_player.samsung_the_frame_55_thf
                    icon: mdi:television
                    icon_color: >-
                      {% if is_state('media_player.samsung_the_frame_55_thf', 'on') %}green
                      {% elif is_state('media_player.samsung_the_frame_55_thf', 'off') %}grey
                      {% else %}amber{% endif %}
                    content: >-
                      {% if is_state('media_player.samsung_the_frame_55_thf', 'on') %}TV an
                      {% elif is_state('media_player.samsung_the_frame_55_thf', 'off') %}TV aus
                      {% else %}{{ states('media_player.samsung_the_frame_55_thf') }}{% endif %}
                  - type: template
                    entity: media_player.samsung_the_frame_55_thf
                    icon: mdi:image-frame
                    icon_color: amber
                    content: >-
                      {% set s = state_attr('media_player.samsung_the_frame_55_thf', 'source') %}
                      {{ s if s not in [none, '', 'unknown', 'unavailable'] else 'Art / Quelle' }}
                  - type: template
                    entity: person.andreas
                    icon: mdi:home-account
                    icon_color: "{% if is_state('person.andreas', 'home') %}green{% else %}red{% endif %}"
                    content: "{% if is_state('person.andreas', 'home') %}Andreas zuhause{% else %}Andreas weg{% endif %}"
              - type: custom:mushroom-template-card
                entity: media_player.samsung_the_frame_55_thf
                primary: The Frame 55
                secondary: |-
                  {% if is_state('media_player.samsung_the_frame_55_thf', 'off') %}Antippen zum Einschalten + Art Mode
                  {% elif is_state('media_player.samsung_the_frame_55_thf', 'on') %}Antippen für Art Mode
                  {% else %}Status: {{ states('media_player.samsung_the_frame_55_thf') }}{% endif %}
                icon: mdi:image-frame
                icon_color: |-
                  {% if is_state('media_player.samsung_the_frame_55_thf', 'off') %}grey
                  {% elif is_state('media_player.samsung_the_frame_55_thf', 'on') %}amber
                  {% else %}blue{% endif %}
                multiline_secondary: true
                fill_container: true
                layout: horizontal
                tap_action:
                  action: perform-action
                  perform_action: script.the_frame_55_ein_und_art_mode
                hold_action:
                  action: more-info
                double_tap_action:
                  action: perform-action
                  perform_action: media_player.turn_off
                  target:
                    entity_id: media_player.samsung_the_frame_55_thf
                badge_icon: |-
                  {% if is_state('media_player.samsung_the_frame_55_thf', 'off') %}mdi:power
                  {% else %}mdi:gesture-tap-button{% endif %}
                badge_color: |-
                  {% if is_state('media_player.samsung_the_frame_55_thf', 'off') %}red
                  {% else %}green{% endif %}
              - type: grid
                columns: 2
                square: false
                cards:
                  - type: custom:mushroom-template-card
                    primary: TV ein + Art Mode
                    secondary: Starten
                    icon: mdi:image-frame
                    icon_color: amber
                    fill_container: true
                    tap_action:
                      action: perform-action
                      perform_action: script.the_frame_55_ein_und_art_mode
                    hold_action:
                      action: more-info
                  - type: custom:mushroom-template-card
                    primary: TV aus
                    secondary: Komplett ausschalten
                    icon: mdi:power
                    icon_color: red
                    fill_container: true
                    tap_action:
                      action: perform-action
                      perform_action: media_player.turn_off
                      target:
                        entity_id: media_player.samsung_the_frame_55_thf
                    hold_action:
                      action: more-info
              - type: custom:mushroom-media-player-card
                entity: media_player.samsung_the_frame_55_thf
                name: Samsung The Frame 55
                icon_type: icon
                use_media_info: true
                show_volume_level: true
                volume_controls:
                  - volume_mute
                  - volume_set
                media_controls:
                  - on_off
                  - play_pause_stop
                fill_container: true
      - title: "📺 Weitere Medien"
        cards:
          - type: custom:expander-card
            title: 📺 Weitere Medien
            expanded: false
            icon: mdi:multimedia
            cards:
              - type: media-control
                entity: media_player.wohnzimmer_andreas_s_samsung_tv_2020_u
              - type: media-control
                entity: media_player.wohnzimmer_3


      - title: "📻 Radio"
        cards:
          - type: custom:expander-card
            title: 📻 Radio
            expanded: false
            icon: mdi:radio
            cards:
              - type: entities
                entities:
                  - entity: input_select.radio_lautsprecher
                    name: 🔊 Lautsprecher
                  - type: button
                    name: SWR3
                    icon: mdi:radio
                    tap_action:
                      action: call-service
                      service: automation.trigger
                      service_data:
                        entity_id: automation.radio_swr3
                  - type: button
                    name: Radio Regenbogen
                    icon: mdi:radio
                    tap_action:
                      action: call-service
                      service: automation.trigger
                      service_data:
                        entity_id: automation.radio_regenbogen
                  - type: button
                    name: bigFM
                    icon: mdi:radio
                    tap_action:
                      action: call-service
                      service: automation.trigger
                      service_data:
                        entity_id: automation.radio_bigfm
                  - type: section
                    label: Sonos
                  - entity: media_player.wohnzimmer
                    name: Sonos Beam
                  - entity: media_player.sonos_tisch
                    name: Sonos Tisch
                  - entity: media_player.sonos_all
                  - type: section
                    label: HomePods
                  - entity: media_player.wohnzimmer_2
                    name: HomePod WZ
                  - entity: media_player.buro_2
                    name: HomePod Büro 2
                  - entity: media_player.badezimmer
                    name: HomePod Bad
                  - entity: media_player.badezimmer_2
                    name: HomePod WC
                  - entity: media_player.schlafzimmer_2
                    name: HomePod Schlafzimmer
                  - entity: media_player.schlafzimmer_4
                    name: HomePod SZ
              - type: custom:mini-media-player
                entity: media_player.wohnzimmer
                name: 📻 Radio
                artwork: cover
                source: icon
                hide:
                  power_state: false
                shortcuts:
                  columns: 3
                  buttons:
                    - name: SWR3
                      image: /local/radio/swr3.svg
                      type: service
                      id: automation.trigger
                      data:
                        entity_id: automation.radio_swr3
                    - name: Regenbogen
                      image: /local/radio/regenbogen.svg
                      type: service
                      id: automation.trigger
                      data:
                        entity_id: automation.radio_regenbogen
                    - name: bigFM
                      image: /local/radio/bigfm.svg
                      type: service
                      id: automation.trigger
                      data:
                        entity_id: automation.radio_bigfm

  ##############################################
  # SCHLAFZIMMER (Subview)
  ##############################################
  - title: Schlafzimmer
    path: schlafzimmer
    icon: mdi:bed
    type: sections
    subview: true
    back_path: /home-overview/home
    sections:
      - title: "💡 Beleuchtung & Klima"
        cards:
          - type: custom:expander-card
            title: 💡 Beleuchtung & Klima
            expanded: false
            icon: mdi:lightbulb
            cards:
              - type: tile
                entity: light.schlafzimmer
                name: Alle Lichter
                features:
                  - type: light-brightness
              - type: tile
                entity: light.bettgestell
                name: Bettgestell
                features:
                  - type: light-brightness
              - type: tile
                entity: light.deckenlampe_schlafzimmer
                name: Deckenlampe
                features:
                  - type: light-brightness
              - type: tile
                entity: light.sonos_lampe_2
                name: Sonos Lampe
                features:
                  - type: light-brightness
              - type: tile
                entity: sensor.hub_2_58_temperatur
                name: Temperatur
              - type: tile
                entity: sensor.hub_2_58_luftfeuchtigkeit
                name: Luftfeuchtigkeit
              - type: tile
                entity: fan.ventilator
                name: Ventilator
                features:
                  - type: fan-speed
              - type: tile
                entity: climate.klimaanlage
                name: Klimaanlage
                features:
                  - type: target-temperature

      - title: "🔌 Steckdosen"
        cards:
          - type: custom:expander-card
            title: 🔌 Steckdosen
            expanded: false
            icon: mdi:power-socket-de
            cards:
              - type: custom:button-card
                entity: switch.tv_schlafzimmer
                name: TV Schlafzimmer
                icon: mdi:television
                triggers_update:
                  - switch.tv_schlafzimmer
                  - sensor.tv_schlafzimmer
                  - sensor.tv_schlafzimmer_tag
                  - sensor.tv_schlafzimmer_monat
                  - sensor.tv_schlafzimmer_jahr
                  - sensor.strompreis_aktiv_eur_kwh
                show_icon: true
                show_name: true
                show_state: false
                show_label: true
                tap_action:
                  action: toggle
                hold_action:
                  action: more-info
                label: |
                  [[[
                    const p = Number(hass.states['sensor.tv_schlafzimmer']?.state) || 0;
                    const on = entity.state === 'on';
                    const stateTxt = on ? (p > 15 ? 'Läuft' : 'Standby') : 'Aus';
                    return `${stateTxt} · ${p.toLocaleString('de-DE', { minimumFractionDigits: 1, maximumFractionDigits: 1 })} W`;
                  ]]]
                custom_fields:
                  badge: |
                    [[[
                      const p = Number(hass.states['sensor.tv_schlafzimmer']?.state) || 0;
                      const on = entity.state === 'on';
                      const text = !on ? 'AUS' : p > 15 ? 'EIN · AKTIV' : 'EIN · STANDBY';
                      return `<div class="status-badge">${text}</div>`;
                    ]]]
                  hero: |
                    [[[
                      const n = (id) => { const v = Number(hass.states[id]?.state); return Number.isFinite(v) ? v : 0; };
                      const power = n('sensor.tv_schlafzimmer');
                      const preis = n('sensor.strompreis_aktiv_eur_kwh');
                      const kostenH = (power / 1000) * preis;
                      return `<div class="hero-grid"><div class="hero-card"><div class="hero-kicker">Jetzt</div><div class="hero-number">${power.toLocaleString('de-DE', { minimumFractionDigits: 1, maximumFractionDigits: 1 })}<span> W</span></div></div><div class="hero-card"><div class="hero-kicker">Aktuell</div><div class="hero-number">${kostenH.toLocaleString('de-DE', { minimumFractionDigits: 3, maximumFractionDigits: 3 })}<span> €/h</span></div></div></div>`;
                    ]]]
                  verbrauch: |
                    [[[
                      const n = (id) => { const v = Number(hass.states[id]?.state); return Number.isFinite(v) ? v : 0; };
                      const f2 = (v) => v.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                      return `<div class="section"><div class="section-title">Verbrauch</div><div class="metric-row"><span>Heute</span><strong>${f2(n('sensor.tv_schlafzimmer_tag'))} kWh</strong></div><div class="metric-row"><span>Monat</span><strong>${f2(n('sensor.tv_schlafzimmer_monat'))} kWh</strong></div><div class="metric-row"><span>Jahr</span><strong>${f2(n('sensor.tv_schlafzimmer_jahr'))} kWh</strong></div></div>`;
                    ]]]
                  kosten: |
                    [[[
                      const n = (id) => { const v = Number(hass.states[id]?.state); return Number.isFinite(v) ? v : 0; };
                      const preis = n('sensor.strompreis_aktiv_eur_kwh');
                      const f2 = (v) => v.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                      return `<div class="section"><div class="section-title">Kosten</div><div class="metric-row"><span>Heute</span><strong>${f2(n('sensor.tv_schlafzimmer_tag') * preis)} €</strong></div><div class="metric-row"><span>Monat</span><strong>${f2(n('sensor.tv_schlafzimmer_monat') * preis)} €</strong></div><div class="metric-row"><span>Jahr</span><strong>${f2(n('sensor.tv_schlafzimmer_jahr') * preis)} €</strong></div></div>`;
                    ]]]
                  footer: |
                    [[[
                      const preis = Number(hass.states['sensor.strompreis_aktiv_eur_kwh']?.state) || 0;
                      return `<div class="footer-note">Preisbasis: ${preis.toLocaleString('de-DE', { minimumFractionDigits: 4, maximumFractionDigits: 4 })} €/kWh</div>`;
                    ]]]
                styles:
                  grid:
                    - grid-template-areas: >-
                        "i n n badge" "i l l badge" "hero hero hero hero" "verbrauch verbrauch
                        kosten kosten" "footer footer footer footer"
                    - grid-template-columns: 78px 1fr 1fr auto
                    - column-gap: 14px
                    - row-gap: 14px
                  card:
                    - padding: 18px
                    - border-radius: 28px
                    - overflow: hidden
                    - border: 1px solid rgba(255,255,255,0.08)
                    - background: |
                        [[[
                          const p = Number(hass.states['sensor.tv_schlafzimmer']?.state) || 0;
                          const on = entity.state === 'on';
                          if (on && p > 15) return 'linear-gradient(180deg, rgba(33,150,243,0.18) 0%, rgba(33,150,243,0.05) 100%)';
                          if (on) return 'linear-gradient(180deg, rgba(76,175,80,0.15) 0%, rgba(76,175,80,0.04) 100%)';
                          return 'linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%)';
                        ]]]
                  img_cell:
                    - width: 78px
                    - height: 78px
                    - border-radius: 24px
                    - background: rgba(33,150,243,0.14)
                  icon:
                    - width: 40px
                    - color: "#2196F3"
