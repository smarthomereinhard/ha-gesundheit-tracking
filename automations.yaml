- id: '1774842547874'
  alias: Bewegungsfreiheit Melder test Wohnzimmer
  description: Schaltet die Deckenlampe bei Bewegung ein und sofort aus, wenn keine
    Anwesenheit mehr erkannt wird. Art Mode 55" wird bei Bewegung aktiviert, bei keiner
    Präsenz wird der TV ausgeschaltet.
  triggers:
  - entity_id: binary_sensor.presence_sensor_fp2_c965_presence_sensor_3
    to: 'on'
    id: motion_on
    trigger: state
  - entity_id: binary_sensor.presence_sensor_fp2_c965_presence_sensor_3
    to: 'off'
    id: motion_off
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      - condition: or
        conditions:
        - condition: sun
          after: sunset
        - condition: sun
          before: sunrise
      sequence:
      - target:
          entity_id: light.deckenlampe
        action: light.turn_on
        data:
          brightness_pct: 50
      - action: script.the_frame_55_ein_und_art_mode
        enabled: true
    - conditions:
      - condition: trigger
        id: motion_off
      sequence:
      - target:
          entity_id: light.deckenlampe
        action: light.turn_off
        data:
          transition: 10
      - condition: not
        conditions:
        - condition: state
          entity_id: media_player.samsung_the_frame_55_thf
          state: 'off'
      - action: media_player.turn_off
        target:
          entity_id: media_player.samsung_the_frame_55_thf
  mode: restart
