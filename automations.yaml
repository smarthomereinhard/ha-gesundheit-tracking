- id: '1757048514129'
  alias: Balkon – Tür offen (Sonos + Telegram + Wandlampe bei Dunkelheit)
  description: Wandlampe sofort an bei Dunkelheit wenn Balkontür geöffnet wird. Erinnerung
    nach 10 Minuten (2x alle 5 Minuten), TTS nur tagsüber. Wandlampe wird 60 Minuten
    nach Sonnenaufgang ausgeschaltet.
  triggers:
  - id: opened
    entity_id: binary_sensor.ikea_sensor_03_balkontur
    to: 'on'
    trigger: state
  - id: open_10min
    entity_id: binary_sensor.ikea_sensor_03_balkontur
    to: 'on'
    for: 00:10:00
    trigger: state
  - id: closed
    entity_id: binary_sensor.ikea_sensor_03_balkontur
    to: 'off'
    trigger: state
  - id: sunrise_off
    trigger: sun
    event: sunrise
    offset: 01:00:00
  conditions:
  - condition: state
    entity_id: input_boolean.automationen_ein_aus
    state: 'on'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: sunrise_off
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.wandlampe
    - conditions:
      - condition: trigger
        id: opened
      - condition: numeric_state
        entity_id: sun.sun
        attribute: elevation
        below: 0
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.wandlampe
        data:
          brightness_pct: 30
    - conditions:
      - condition: trigger
        id: closed
      sequence:
      - delay: 00:00:30
      - action: light.turn_off
        target:
          entity_id: light.wandlampe
      - action: telegram_bot.send_message
        enabled: false
        data:
          chat_id: 988178587
          parse_mode: html
          message: "\U0001F33F Die Balkontür ist geschlossen"
    - conditions:
      - condition: trigger
        id: open_10min
      sequence:
      - condition: state
        entity_id: binary_sensor.ikea_sensor_03_balkontur
        state: 'on'
      - repeat:
          count: 2
          sequence:
          - parallel:
            - action: notify.mobile_app_andreas_iphone_15pro_max
              data:
                title: "\U0001F33F Balkon"
                message: Die Balkontür ist noch offen
            - action: notify.mobile_app_karo_iphone
              data:
                title: "\U0001F33F Balkon"
                message: Die Balkontür ist noch offen
            - action: telegram_bot.send_message
              data:
                chat_id: 988178587
                parse_mode: html
                message: "\U0001F33F Die Balkontür ist noch offen"
          - delay: 00:05:00
  mode: restart
- id: '1763366715360'
  alias: Rollladen + Lüften Erinnerung – Wohnzimmer (Fensterschutz)
  description: Morgens öffnet der Rollladen bei Sonnenaufgang. Abends schließt er
    bei Sonnenuntergang – wenn das Wohnzimmerfenster offen ist, bleibt er offen und
    schließt erst sobald das Fenster wieder geschlossen wird. Zusätzlich Erinnerung
    nach 10 Minuten Lüften.
  triggers:
  - alias: Morgens – Sonnenaufgang
    event: sunrise
    id: sunrise
    trigger: sun
  - alias: Abends – Sonnenuntergang
    event: sunset
    id: sunset
    trigger: sun
  - alias: Wohnzimmerfenster geschlossen
    type: not_opened
    device_id: c4baeb7fce91539c4146c86fca19f101
    entity_id: 1ed9a16123511b92a774f15d8b20dc9f
    domain: binary_sensor
    id: window_closed
    trigger: device
  - alias: Wohnzimmerfenster geöffnet
    type: opened
    device_id: c4baeb7fce91539c4146c86fca19f101
    entity_id: 1ed9a16123511b92a774f15d8b20dc9f
    domain: binary_sensor
    id: window_opened
    trigger: device
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: sunrise
      sequence:
      - target:
          entity_id: cover.rolladen
        data:
          position: 100
        action: cover.set_cover_position
    - conditions:
      - condition: trigger
        id: sunset
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: binary_sensor.ikea_sensor_08_tur
            state: 'off'
          sequence:
          - target:
              entity_id: cover.rolladen
            data:
              position: 0
            action: cover.set_cover_position
        default:
        - wait_for_trigger:
          - entity_id: binary_sensor.ikea_sensor_08_tur
            to: 'off'
            trigger: state
          continue_on_timeout: false
        - target:
            entity_id: cover.rolladen
          data:
            position: 0
          action: cover.set_cover_position
    - conditions:
      - condition: trigger
        id: window_closed
      - condition: sun
        after: sunset
      sequence:
      - target:
          entity_id: cover.rolladen
        data:
          position: 0
        action: cover.set_cover_position
    - conditions:
      - condition: trigger
        id: window_opened
      sequence:
      - delay: 00:10:00
      - condition: state
        entity_id: binary_sensor.ikea_sensor_08_tur
        state: 'on'
      - action: alexa_devices.send_sound
        data:
          sound: amzn_sfx_doorbell_01
          device_id: 1b8e7ee657368337c9fe5919ac41e3c3
      - action: notify.mobile_app_andreas_iphone_15pro_max
