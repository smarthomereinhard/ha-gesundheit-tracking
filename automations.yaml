- id: '1772133567098'
  alias: Wetter – Regen/Schnee Warnung (stumm nach Zeitprofil)
  description: 'Prueft weather.forecast_home alle 30min. Stumm: Mo-Fr 19-07 Uhr, Sa-So
    21-09 Uhr.'
  triggers:
  - minutes: /30
    alias: Alle 30 Minuten prüfen
    trigger: time_pattern
  conditions:
  - condition: template
    alias: Cooldown 6 Stunden
    value_template: '{% set last = this.last_triggered %} {{ last is none or (as_timestamp(now())
      - as_timestamp(last)) > 21600 }}'
  actions:
  - variables:
      fc: '{{ state_attr(''weather.forecast_home'', ''forecast'') | default([]) }}'
      next: '{{ fc[0] if fc | length > 0 else dict() }}'
      cond: '{{ next.get(''condition'', '''') }}'
      precip_prob: '{{ next.get(''precipitation_probability'', 0) | int(0) }}'
      temp: '{{ next.get(''temperature'', none) }}'
      wind: '{{ next.get(''wind_speed'', none) }}'
      when: '{{ next.get(''datetime'', '''') }}'
      dow: '{{ now().isoweekday() }}'
      is_weekday: '{{ dow in [1,2,3,4,5] }}'
      is_weekend: '{{ dow in [6,7] }}'
      quiet_weekday: '{{ is_weekday and ((now().hour >= 19) or (now().hour < 7)) }}'
      quiet_weekend: '{{ is_weekend and ((now().hour >= 21) or (now().hour < 9)) }}'
      quiet: '{{ quiet_weekday or quiet_weekend }}'
      title: ☔️ Wetterwarnung
      message: '{% set c = cond if cond else states(''weather.forecast_home'') %}
        In Kürze möglich: {{ c }}{% if precip_prob %} ({{ precip_prob }}%){% endif
        %}. {% if temp is not none %}Temp: {{ temp }}°C.{% endif %} {% if wind is
        not none %} Wind: {{ wind }}.{% endif %} {% if when %} Zeitpunkt: {{ when
        }}.{% endif %}'
  - choose:
    - conditions:
      - condition: template
        alias: Regen/Schnee wahrscheinlich
        value_template: '{% set bad = [''rainy'',''pouring'',''snowy'',''snowy-rainy'',''hail'',''lightning'',''lightning-rainy'']
          %} {{ cond in bad or precip_prob >= 60 }}'
      sequence:
      - parallel:
        - action: notify.mobile_app_andreas_iphone_15pro_max
          data:
            title: '{{ title }}'
            message: '{{ message }}'
            data:
              push:
                interruption-level: '{{ ''passive'' if quiet else ''active'' }}'
        - action: notify.mobile_app_karo_iphone
          data:
            title: '{{ title }}'
            message: '{{ message }}'
            data:
              push:
                interruption-level: '{{ ''passive'' if quiet else ''active'' }}'
  mode: single
- id: '1772133803994'
  alias: Button – Wetter morgen (Telegram)
  description: Wird per input_button.wetter_morgen_ansage ausgelöst, liest die morgige
    Vorhersage aus weather.forecast_home und sendet sie via Telegram.
  triggers:
  - entity_id: input_button.wetter_morgen_ansage
    alias: Button gedrückt
    trigger: state
  conditions: []
  actions:
  - action: weather.get_forecasts
    alias: Forecast (daily) abrufen
    target:
      entity_id: weather.forecast_home
    data:
      type: daily
    response_variable: fc
  - variables:
      tomorrow: '{{ (fc[''weather.forecast_home''].forecast[1]) if (fc[''weather.forecast_home''].forecast
        | length > 1) else dict() }}'
      cond: '{{ tomorrow.get(''condition'', states(''weather.forecast_home'')) }}'
      tmax: '{{ tomorrow.get(''temperature'', none) }}'
      tmin: '{{ tomorrow.get(''templow'', none) }}'
      pop: '{{ tomorrow.get(''precipitation_probability'', none) }}'
      wind: '{{ tomorrow.get(''wind_speed'', none) }}'
      dt: '{{ tomorrow.get(''datetime'', '''') }}'
      msg: 'Wetter morgen{% if dt %} ({{ as_datetime(dt).strftime(''%d.%m.%Y'') }}){%
        endif %}: {{ cond }}. {% if tmax is not none %}Max {{ tmax }}°C.{% endif %}
        {% if tmin is not none %} Min {{ tmin }}°C.{% endif %} {% if pop is not none
        %} Regenwahrscheinlichkeit {{ pop }}%.{% endif %} {% if wind is not none %}
        Wind {{ wind }}.{% endif %}'
  - action: telegram_bot.send_message
    alias: Telegram Wetter morgen senden
    data:
      parse_mode: html
      message: '{{ msg }}'
  mode: single
