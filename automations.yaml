- id: '1757233138801'
  alias: Geräte Batterie Warnung
  description: Benachrichtigt, wenn der Batteriestand eines Geräts niedrig ist.
  triggers:
  - trigger: event
    event_type: battery_notes_battery_threshold
    event_data:
      battery_low: true
    id: low
  - trigger: event
    event_type: battery_notes_battery_threshold
    event_data:
      battery_low: false
    id: high
  conditions: []
  actions:
  - if:
    - condition: trigger
      id:
      - low
    then:
    - action: notify.persistent_notification
      data:
        title: '{{ trigger.event.data.device_name }} Battery Low'
        message: Das Gerät hat einen Batteriestand von {{ trigger.event.data.battery_level
          }}% {{ '\n' -}} du benötigst {{ trigger.event.data.battery_quantity }}×
          {{ trigger.event.data.battery_type }}
        data:
          notification_id: '{{ trigger.event.data.device_id }}-{{ trigger.event.data.source_entity_id
            }}'
  - if:
    - condition: trigger
      id:
      - high
    then:
    - action: persistent_notification.dismiss
      data:
        notification_id: '{{ trigger.event.data.device_id }}-{{ trigger.event.data.source_entity_id
          }}'
  mode: single
