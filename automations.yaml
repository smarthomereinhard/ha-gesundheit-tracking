- id: '1769534612209'
  alias: Büro Licht Bewegung (Tag/Nacht & manueller Override)
  description: Steuert das Bürolicht basierend auf Bewegung, mit Helligkeitsanpassung
    für Nacht und einer intelligenten manuellen Überschreibung.
  triggers:
  - entity_id: binary_sensor.hue_motion_sensor_2_bewegung
    from: 'off'
    to: 'on'
    id: motion_on
    trigger: state
  - entity_id: binary_sensor.hue_motion_sensor_2_bewegung
    from: 'on'
    to: 'off'
    for:
      minutes: 3
    id: motion_off_3m
    trigger: state
  - entity_id: light.deckenlampe_buro
    to: 'on'
    id: light_on
    trigger: state
  - entity_id: light.deckenlampe_buro
    to: 'off'
    id: light_off
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      - condition: state
        entity_id: light.deckenlampe_buro
        state: 'off'
      - condition: state
        entity_id: sun.sun
        state: below_horizon
      sequence:
      - target:
          entity_id: input_boolean.buro_licht_automatik
        action: input_boolean.turn_on
      - target:
          entity_id: input_boolean.buro_licht_manuell
        action: input_boolean.turn_off
      - choose:
        - conditions:
          - condition: time
            after: '18:00:00'
            before: '22:00:00'
          sequence:
          - target:
              entity_id: light.deckenlampe_buro
            data:
              brightness_pct: 80
              transition: 2
            action: light.turn_on
        default:
        - target:
            entity_id: light.deckenlampe_buro
          data:
            brightness_pct: 30
            transition: 2
          action: light.turn_on
      - delay: 00:00:02
      - target:
          entity_id: input_boolean.buro_licht_automatik
        action: input_boolean.turn_off
    - conditions:
      - condition: trigger
        id: light_on
      - condition: state
        entity_id: input_boolean.buro_licht_automatik
        state: 'off'
      sequence:
      - target:
          entity_id: input_boolean.buro_licht_manuell
        action: input_boolean.turn_on
      - target:
          entity_id: switch.hue_motion_sensor_2_bewegungssensor_aktiviert
        action: switch.turn_off
    - conditions:
      - condition: trigger
        id: light_off
      sequence:
      - target:
          entity_id:
          - input_boolean.buro_licht_manuell
          - input_boolean.buro_licht_automatik
        action: input_boolean.turn_off
      - target:
          entity_id: switch.hue_motion_sensor_2_bewegungssensor_aktiviert
        action: switch.turn_on
    - conditions:
      - condition: trigger
        id: motion_off_3m
      - condition: state
        entity_id: input_boolean.buro_licht_manuell
        state: 'off'
      sequence:
      - target:
          entity_id: light.deckenlampe_buro
        data:
          transition: 3
        action: light.turn_off
  mode: restart
- id: '1769990000000'
  alias: Büro – Fensterkontakte steuern Lightstrips & Schreibtisch (konsolidiert)
  description: Konsolidiert Büro-Fensterkontakt-Automationen in eine robuste State-Machine
    mit Debounce, Fade und Nachtlogik.
  triggers:
  - trigger: state
    entity_id: binary_sensor.window_and_door_sensor_e714
    to: 'off'
    for: 00:00:02
    id: e714_closed
  - trigger: state
    entity_id: binary_sensor.window_and_door_sensor_e714
    to: 'on'
    for: 00:00:05
    id: e714_opened
  - trigger: state
    entity_id: binary_sensor.window_and_door_sensor_e714_2
    to: 'on'
    id: e7142_opened
  - trigger: state
    entity_id: binary_sensor.window_and_door_sensor_e714_2
    to: 'off'
    id: e7142_closed
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: e714_closed
      - condition: or
        conditions:
        - condition: time
          after: 06:00:00
          before: '10:00:00'
        - condition: time
          after: '18:00:00'
      - condition: state
        entity_id: light.hue_lightstrip_1_2
        state: 'off'
      sequence:
      - target:
          entity_id: light.hue_lightstrip_1_2
        data:
          transition: 2
        action: light.turn_on
    - conditions:
      - condition: trigger
        id: e714_opened
      - condition: or
        conditions:
        - condition: time
          after: 06:00:00
          before: '10:00:00'
        - condition: time
          after: '18:00:00'
      sequence:
      - target:
          entity_id: light.hue_lightstrip_1_2
        data:
          transition: 15
        action: light.turn_off
    - conditions:
      - condition: trigger
        id: e7142_opened
      - condition: or
        conditions:
        - condition: state
          entity_id: light.schreibtisch_rechts
          state: 'on'
        - condition: state
          entity_id: light.schreibtisch_links
          state: 'on'
      sequence:
      - action: light.turn_off
        target:
          entity_id:
          - light.schreibtisch_links
          - light.schreibtisch_rechts
    - conditions:
      - condition: trigger
        id: e7142_closed
      - condition: sun
        after: sunset
        before: sunrise
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.schreibtisch_links
          - light.schreibtisch_rechts
        data:
          brightness_pct: 100
  mode: restart
- id: '1774206000000'
  alias: The Frame (32) – Apple TV Büro AUS → Art Mode / 21 Uhr TV AUS
  description: Steuert den 32er The Frame abhängig vom Apple TV im Büro. Vor 21 Uhr
    geht der TV bei Apple-TV-Aus in den Art Mode, ab 21 Uhr wird der TV vollständig
    ausgeschaltet.
  triggers:
  - id: apple_tv_off
    trigger: state
    entity_id: media_player.buro_2_2
    to: 'off'
  - id: apple_tv_standby
    trigger: state
    entity_id: media_player.buro_2_2
    to: standby
  - id: tv_off_21
    trigger: time
    at: '21:00:00'
  conditions:
  - condition: state
    entity_id: input_boolean.automationen_ein_aus
    state: 'on'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: tv_off_21
      - condition: not
        conditions:
        - condition: state
          entity_id: media_player.the_frame_32_2
          state: 'off'
      sequence:
      - alias: The Frame vollständig ausschalten
        action: media_player.turn_off
        target:
          entity_id: media_player.the_frame_32_2
    - conditions:
      - condition: trigger
        id:
        - apple_tv_off
        - apple_tv_standby
      - condition: time
        before: '21:00:00'
      - condition: state
        entity_id: media_player.the_frame_32_2
        state: 'on'
      - condition: template
        value_template: '{{ state_attr(''media_player.the_frame_32_2'', ''source'')
          == ''Apple TV'' }}'
      sequence:
      - delay:
          seconds: 3
      - alias: Apple TV Status zur Sicherheit erneut prüfen
        condition: template
        value_template: '{{ states(''media_player.buro_2_2'') in [''off'', ''standby'']
          }}

          '
      - alias: Art Mode aktivieren
        action: samsungtv_smart.set_art_mode
        data:
          entity_id: media_player.the_frame_32_2
    - conditions:
      - condition: trigger
        id:
        - apple_tv_off
        - apple_tv_standby
      - condition: time
        after: '21:00:00'
      - condition: not
        conditions:
        - condition: state
          entity_id: media_player.the_frame_32_2
          state: 'off'
      sequence:
      - alias: Nach 21 Uhr The Frame vollständig ausschalten
        action: media_player.turn_off
        target:
          entity_id: media_player.the_frame_32_2
  mode: single
- id: buero_stuhl_andi_lightstrip
  alias: Büro – Stuhl Andi → Lightstrip 1
  description: 'Stuhl besetzt = Lightstrip an (nur nach Sonnenuntergang). Stuhl verlassen
    = 5 Minuten warten, dann Lightstrip aus. Kurze Bewegungen schalten das Licht nicht
    aus (mode: restart). Tagsüber bleibt das Licht aus.'
  triggers:
  - trigger: state
    entity_id: binary_sensor.window_and_door_sensor_916f_2
    to: 'on'
    id: verlassen
  - trigger: state
    entity_id: binary_sensor.window_and_door_sensor_916f_2
    to: 'off'
    id: besetzt
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: besetzt
      - condition: or
        conditions:
        - condition: sun
          after: sunset
        - condition: sun
          before: sunrise
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.hue_lightstrip_1
        data:
          brightness_pct: 90
          color_temp_kelvin: 4103
    - conditions:
      - condition: trigger
        id: verlassen
      sequence:
      - delay:
          hours: 0
          minutes: 5
          seconds: 0
          milliseconds: 0
      - condition: state
        entity_id: binary_sensor.window_and_door_sensor_916f_2
        state: 'on'
      - action: light.turn_off
        target:
          entity_id: light.hue_lightstrip_1
        data: {}
  mode: restart
