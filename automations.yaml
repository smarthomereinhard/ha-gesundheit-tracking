          - delay: 00:05:00
  mode: restart
- id: '1738836091116'
  alias: ATV Wozi spielt → Küche & Deckenlampe aus (außer manuell)
  description: Wenn der Apple TV im Wohnzimmer zu spielen beginnt, werden Küchenlichter
    und Deckenlampe ausgeschaltet – außer sie wurden manuell eingeschaltet (erkannt
    über context.parent_id).
  triggers:
  - trigger: state
    entity_id: media_player.apple_tv
    to: playing
  conditions:
  - condition: state
    entity_id: input_boolean.automationen_ein_aus
    state: 'on'
  actions:
  - alias: Küche aus – nur wenn nicht manuell eingeschaltet
    if:
    - condition: template
      value_template: "{{ state_attr('light.deckenlampe_kuche', 'context') is none\n
        \  or state_attr('light.deckenlampe_kuche', 'context').parent_id is none }}"
    then:
    - action: light.turn_off
      target:
        entity_id:
        - light.deckenlampe_kuche
        - light.unterschrank
        - light.schranke
      data:
        transition: 3
  - alias: Deckenlampe aus – nur wenn nicht manuell eingeschaltet
    if:
    - condition: template
      value_template: "{{ state_attr('light.deckenlampe', 'context') is none\n   or
        state_attr('light.deckenlampe', 'context').parent_id is none }}"
    then:
    - action: light.turn_off
      target:
        entity_id: light.deckenlampe
      data:
        transition: 3
  mode: single
- id: '1769347538122'
  alias: Küche – FP2 Präsenz – Lichtprofil Tag/Nacht + Kochmodus (Dunstabzug)
  description: Praesenz (FP2) -> Licht an (Zeitprofil), keine Praesenz -> Licht aus
    (Tag 2min / Nacht 20s). Solange Dunstabzug AN ist, bleibt Licht an. Tagsueber
    wird das Licht nur eingeschaltet, wenn es unter der eingestellten Helligkeitsschwelle
    ist.
  triggers:
  - id: presence_on
    trigger: state
    entity_id:
    - binary_sensor.presence_sensor_fp2_c965_presence_sensor_1
    - binary_sensor.presence_sensor_fp2_c965_presence_sensor_2
    - binary_sensor.presence_sensor_fp2_c965_presence_sensor_4
    - binary_sensor.presence_sensor_fp2_c965_presence_sensor_5
    to: 'on'
  - id: hood_on
    trigger: state
    entity_id: switch.shellyplus1pm_b0b21c1b4a6c_switch_0
    to: 'on'
  - id: hood_off
    trigger: state
    entity_id: switch.shellyplus1pm_b0b21c1b4a6c_switch_0
    to: 'off'
  conditions:
  - condition: state
    entity_id: input_boolean.automationen_ein_aus
    state: 'on'
  actions:
  - choose:
    - conditions:
      - condition: time
        after: 04:00:00
        before: 06:00:00
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.deckenlampe_kuche
          - light.unterschrank
          - light.schranke
        data:
          brightness_pct: 30
          color_temp_kelvin: 2700
          transition: 1
    - conditions:
      - condition: time
        after: 06:00:00
        before: '21:00:00'
      - condition: or
        conditions:
        - condition: numeric_state
          entity_id: sensor.presence_sensor_fp2_c965_light_sensor_light_level
          below: input_number.kuche_helligkeit_schwelle
        - condition: state
          entity_id: switch.shellyplus1pm_b0b21c1b4a6c_switch_0
          state: 'on'
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.deckenlampe_kuche
          - light.unterschrank
          - light.schranke
        data:
          brightness_pct: 100
          color_temp_kelvin: 4000
          transition: 1
    - conditions:
      - condition: or
        conditions:
        - condition: time
          after: '21:00:00'
        - condition: time
          before: 04:00:00
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.deckenlampe_kuche
          - light.unterschrank
          - light.schranke
        data:
          brightness_pct: 15
          color_temp_kelvin: 3000
          transition: 2
  - alias: Warten bis keine Praesenz mehr und Dunstabzug aus
    wait_template: '{{ is_state(''binary_sensor.presence_sensor_fp2_c965_presence_sensor_1'',''off'')
      and is_state(''binary_sensor.presence_sensor_fp2_c965_presence_sensor_2'',''off'')
      and is_state(''binary_sensor.presence_sensor_fp2_c965_presence_sensor_4'',''off'')
      and is_state(''binary_sensor.presence_sensor_fp2_c965_presence_sensor_5'',''off'')
      and is_state(''switch.shellyplus1pm_b0b21c1b4a6c_switch_0'',''off'') }}'
  - choose:
    - conditions:
      - condition: time
        after: 04:00:00
        before: '21:00:00'
      sequence:
      - delay:
          minutes: 2
    default:
    - delay:
        seconds: 20
  - condition: template
    value_template: '{{ is_state(''binary_sensor.presence_sensor_fp2_c965_presence_sensor_1'',''off'')
      and is_state(''binary_sensor.presence_sensor_fp2_c965_presence_sensor_2'',''off'')
      and is_state(''binary_sensor.presence_sensor_fp2_c965_presence_sensor_4'',''off'')
      and is_state(''binary_sensor.presence_sensor_fp2_c965_presence_sensor_5'',''off'')
      and is_state(''switch.shellyplus1pm_b0b21c1b4a6c_switch_0'',''off'') }}'
  - choose:
    - conditions:
      - condition: time
        after: 04:00:00
        before: '21:00:00'
      sequence:
      - action: light.turn_off
        target:
          entity_id:
          - light.deckenlampe_kuche
          - light.unterschrank
          - light.schranke
        data:
          transition: 5
    default:
    - action: light.turn_off
      target:
        entity_id:
        - light.deckenlampe_kuche
        - light.unterschrank
        - light.schranke
      data:
        transition: 2
  mode: restart
- id: '1771855370344'
  alias: Küche – Schublade steuert Dunstabzug (Nachlauf & Abbruch)
  description: Schublade auf = Dunstabzug an. Schublade zu = nach 1 Stunde aus (wenn
    weiterhin zu) + TTS nur 08-20 Uhr. Wenn Dunstabzug manuell ausgeschaltet wird,
    wird der Nachlauf sofort abgebrochen.
  triggers:
  - entity_id: binary_sensor.ikea_sensor_06_schublade_tur
    to: 'on'
    id: opened
    trigger: state
  - entity_id: binary_sensor.ikea_sensor_06_schublade_tur
    to: 'off'
    id: closed
    trigger: state
  - entity_id: switch.shellyplus1pm_b0b21c1b4a6c_switch_0
    to: 'off'
    id: hood_off
    trigger: state
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: opened
      sequence:
      - target:
          entity_id: switch.shellyplus1pm_b0b21c1b4a6c_switch_0
        action: switch.turn_on
    - conditions:
      - condition: trigger
        id: closed
      sequence:
      - delay:
          hours: 1
      - condition: state
        entity_id: binary_sensor.ikea_sensor_06_schublade_tur
        state: 'off'
      - condition: state
        entity_id: switch.shellyplus1pm_b0b21c1b4a6c_switch_0
        state: 'on'
      - target:
          entity_id: switch.shellyplus1pm_b0b21c1b4a6c_switch_0
        action: switch.turn_off
      - choose:
        - conditions:
          - condition: time
            after: 08:00:00
            before: '20:00:00'
          sequence:
          - target:
              entity_id: media_player.sonos_all
            data:
              message: Die Dunstabzugshaube ist jetzt aus.
              language: de-DE
            action: tts.cloud_say
    - conditions:
      - condition: trigger
        id: hood_off
      sequence:
      - stop: Dunstabzug manuell aus – Nachlauf abgebrochen.
  mode: restart
- id: waschmaschine_zyklusstart_merken
  alias: Waschmaschine – Zyklusstart merken
  description: Erkennt den Start robust über die Leistungsaufnahme und merkt den Start-Zählerstand.
  triggers:
  - alias: Start erkennen
    trigger: numeric_state
    entity_id: sensor.waschmaschine
    above: 8
    for:
      minutes: 2
  conditions:
  - alias: Automationen aktiv
    condition: state
    entity_id: input_boolean.automationen_ein_aus
    state: 'on'
  - alias: Nur wenn noch kein Zyklus aktiv ist
    condition: numeric_state
    entity_id: input_number.waschmaschine_start_kwh
    below: 0.001
  actions:
  - alias: Start-Zählerstand speichern
    action: input_number.set_value
    target:
      entity_id: input_number.waschmaschine_start_kwh
    data:
      value: '{{ states("sensor.waschmaschine_switch_0_energy") | float(0) }}'
  mode: single
- id: waschmaschine_fertig_telegram
  alias: Waschmaschine – Fertig Telegram
  description: Meldet das Ende des Waschgangs inklusive Verbrauch und Stromkosten.
  triggers:
  - alias: Ende erkennen
    trigger: numeric_state
    entity_id: sensor.waschmaschine
    below: 2
    for:
      minutes: 8
  conditions:
  - alias: Automationen aktiv
    condition: state
    entity_id: input_boolean.automationen_ein_aus
    state: 'on'
  - alias: Start-Zählerstand vorhanden
    condition: numeric_state
    entity_id: input_number.waschmaschine_start_kwh
    above: 0
  - alias: Mindestverbrauch für echten Waschgang
    condition: template
    value_template: '{{ (states("sensor.waschmaschine_switch_0_energy") | float(0)
      - states("input_number.waschmaschine_start_kwh") | float(0)) > 0.02 }}'
  actions:
  - alias: Variablen berechnen
    variables:
      start_kwh: '{{ states("input_number.waschmaschine_start_kwh") | float(0) }}'
      end_kwh: '{{ states("sensor.waschmaschine_switch_0_energy") | float(0) }}'
      verbrauch_kwh: '{{ [states("sensor.waschmaschine_switch_0_energy") | float(0)
        - states("input_number.waschmaschine_start_kwh") | float(0), 0] | max | round(3)
        }}'
      strompreis_eur_kwh: '{% set aktiv = states("sensor.strompreis_aktiv_eur_kwh")
        %}{% if aktiv not in ["unknown", "unavailable", "none", ""] %}{{ aktiv | float(0)
        }}{% else %}{{ (states("input_number.input_number_strompreis_ct") | float(0))
        / 100 }}{% endif %}'
      strompreis_ct: '{{ (strompreis_eur_kwh | float(0) * 100) | round(2) }}'
      stromkosten_eur: '{{ ([states("sensor.waschmaschine_switch_0_energy") | float(0)
        - states("input_number.waschmaschine_start_kwh") | float(0), 0] | max * (strompreis_eur_kwh
        | float(0))) | round(3) }}'
  - alias: Zeitstempel speichern
    action: input_datetime.set_datetime
    target:
      entity_id: input_datetime.waschmaschine_letztes_ende
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
  - alias: Benachrichtigungen parallel senden
    parallel:
    - alias: Push an Andreas
      action: notify.mobile_app_andreas_iphone_15pro_max
      data:
        title: "\U0001F9FA Waschmaschine"
        message: 'Fertig! Verbrauch: {{ verbrauch_kwh }} kWh · Strompreis: {{ strompreis_ct
          }} ct/kWh · Kosten: {{ stromkosten_eur }} €'
    - alias: Push an Karo
      action: notify.mobile_app_karo_iphone
      data:
        title: "\U0001F9FA Waschmaschine"
        message: 'Fertig! Verbrauch: {{ verbrauch_kwh }} kWh · Strompreis: {{ strompreis_ct
          }} ct/kWh · Kosten: {{ stromkosten_eur }} €'
    - alias: Telegram an Andreas
      action: telegram_bot.send_message
      data:
        chat_id: 988178587
        parse_mode: html
        message: "\U0001F9FA <b>Waschmaschine fertig!</b> ⚡ Verbrauch: {{ verbrauch_kwh
          }} kWh \U0001F4A1 Strompreis: {{ strompreis_ct }} ct/kWh \U0001F4B6 Stromkosten:
          {{ stromkosten_eur }} €"
    - alias: Sonos TTS
      action: tts.speak
      target:
        entity_id: tts.home_assistant_cloud
      data:
        cache: false
        media_player_entity_id: media_player.sonos_all
        message: 'Sir, die Waschmaschine ist fertig. Verbrauch: {{ verbrauch_kwh }}
          Kilowattstunden, Stromkosten: {{ stromkosten_eur }} Euro.'
        language: de-DE
      enabled: false
    - alias: Lichter blinken
      repeat:
        count: 2
        sequence:
        - action: light.turn_on
          target:
            entity_id:
            - light.deckenlampe_kuche
            - light.deckenlampe
            - light.deckenlampe_buro
            - light.bettgestell
          data:
            flash: long
        - if:
          - condition: template
            value_template: '{{ repeat.index < repeat.count }}'
          then:
          - delay:
              seconds: 5
  - alias: Schränke 2 Minuten grün pulsieren
    repeat:
      count: 24
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.schranke
          - light.unterschrank
        data:
          rgb_color:
          - 0
          - 255
          - 0
          brightness: 255
          transition: 2
      - delay:
          seconds: 2
      - action: light.turn_on
        target:
          entity_id:
          - light.schranke
          - light.unterschrank
        data:
          rgb_color:
          - 0
          - 255
          - 0
          brightness: 50
          transition: 2
      - delay:
          seconds: 3
  - alias: Schränke Licht zurücksetzen
    action: light.turn_off
    target:
      entity_id:
      - light.schranke
      - light.unterschrank
  - alias: Start-Zählerstand zurücksetzen
    action: input_number.set_value
    target:
      entity_id: input_number.waschmaschine_start_kwh
    data:
      value: 0
  mode: single
- id: spuelmaschine_zyklusstart
  alias: Spülmaschine – Zyklusstart merken
  description: Erkennt den Start robust über die Leistungsaufnahme und merkt den Start-Zählerstand.
  triggers:
  - alias: Start erkennen
    trigger: numeric_state
    entity_id: sensor.shellyplugsg3_8cbfea9829f4_switch_0_power
    above: 8
    for:
      minutes: 2
  conditions:
  - alias: Automationen aktiv
    condition: state
    entity_id: input_boolean.automationen_ein_aus
    state: 'on'
  - alias: Nur wenn noch kein Zyklus aktiv ist
    condition: numeric_state
    entity_id: input_number.spuelmaschine_start_kwh
    below: 0.001
  actions:
  - alias: Start-Zählerstand speichern
    action: input_number.set_value
    target:
      entity_id: input_number.spuelmaschine_start_kwh
    data:
      value: '{{ states("sensor.shellyplugsg3_8cbfea9829f4_switch_0_energy") | float(0)
        }}'
  mode: single
- id: spuelmaschine_fertig_2
  alias: Spülmaschine – Fertig
  description: Meldet das Ende des Spülgangs und lässt das Unterschrank-Licht 2 Minuten
    grün pulsieren.
  triggers:
  - alias: Ende erkennen
    trigger: numeric_state
    entity_id: sensor.shellyplugsg3_8cbfea9829f4_switch_0_power
    below: 2
    for:
      minutes: 8
  conditions:
  - alias: Automationen aktiv
    condition: state
    entity_id: input_boolean.automationen_ein_aus
    state: 'on'
  - alias: Start-Zählerstand vorhanden
    condition: numeric_state
    entity_id: input_number.spuelmaschine_start_kwh
    above: 0
  - alias: Mindestverbrauch
    condition: template
    value_template: '{{ (states("sensor.shellyplugsg3_8cbfea9829f4_switch_0_energy")
      | float(0) - states("input_number.spuelmaschine_start_kwh") | float(0)) > 0.02
      }}'
  actions:
  - alias: Variablen berechnen
    variables:
      verbrauch_kwh: '{{ [states("sensor.shellyplugsg3_8cbfea9829f4_switch_0_energy")
        | float(0) - states("input_number.spuelmaschine_start_kwh") | float(0), 0]
        | max | round(3) }}'
      strompreis_eur_kwh: '{% set aktiv = states("sensor.strompreis_aktiv_eur_kwh")
        %}{% if aktiv not in ["unknown", "unavailable", "none", ""] %}{{ aktiv | float(0)
        }}{% else %}{{ (states("input_number.input_number_strompreis_ct") | float(0))
        / 100 }}{% endif %}'
      strompreis_ct: '{{ (strompreis_eur_kwh | float(0) * 100) | round(2) }}'
      stromkosten_eur: '{{ ([states("sensor.shellyplugsg3_8cbfea9829f4_switch_0_energy")
        | float(0) - states("input_number.spuelmaschine_start_kwh") | float(0), 0]
        | max * (strompreis_eur_kwh | float(0))) | round(3) }}'
  - alias: Zeitstempel speichern
    action: input_datetime.set_datetime
    target:
      entity_id: input_datetime.spulmaschine_letztes_ende
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
  - alias: Tab abziehen
    action: script.spulmaschine_tab_verbraucht
  - alias: Push an Karo
    action: notify.mobile_app_karo_iphone
    data:
      message: 'Fertig! Verbrauch: {{ verbrauch_kwh }} kWh · Kosten: {{ stromkosten_eur
        }} €'
      title: "\U0001F37D️ Spülmaschine"
  - alias: Push an Andreas
    action: notify.mobile_app_andreas_iphone_15pro_max
    data:
      title: "\U0001F37D️ Spülmaschine"
      message: 'Fertig! Verbrauch: {{ verbrauch_kwh }} kWh · Kosten: {{ stromkosten_eur
        }} €'
  - alias: Telegram an Andreas
    action: telegram_bot.send_message
    data:
      chat_id: 988178587
      parse_mode: html
      message: "\U0001F37D️ <b>Spülmaschine fertig!</b> ⚡ Verbrauch: {{ verbrauch_kwh
        }} kWh \U0001F4A1 Strompreis: {{ strompreis_ct }} ct/kWh \U0001F4B6 Stromkosten:
        {{ stromkosten_eur }} €"
  - alias: Sonos TTS
    action: tts.speak
    target:
      entity_id: tts.home_assistant_cloud
    data:
      cache: false
      media_player_entity_id: media_player.sonos_all
      message: 'Sir, die Spülmaschine ist fertig. Verbrauch: {{ verbrauch_kwh }} Kilowattstunden,
        Stromkosten: {{ stromkosten_eur }} Euro.'
      language: de-DE
    enabled: false
  - alias: Unterschrank 2 Minuten grün pulsieren
    repeat:
      count: 24
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.unterschrank
        data:
          rgb_color:
          - 0
          - 255
          - 0
          brightness: 255
          transition: 2
      - delay:
          seconds: 2
      - action: light.turn_on
        target:
          entity_id: light.unterschrank
        data:
          rgb_color:
          - 0
          - 255
          - 0
          brightness: 50
          transition: 2
      - delay:
          seconds: 3
  - alias: Unterschrank zurücksetzen
    action: light.turn_off
    target:
      entity_id: light.unterschrank
  - alias: Start-Zählerstand zurücksetzen
    action: input_number.set_value
    target:
      entity_id: input_number.spuelmaschine_start_kwh
    data:
      value: 0
  mode: single
