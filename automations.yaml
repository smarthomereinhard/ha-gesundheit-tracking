  - entity_id:
    - input_button.kaffe
    trigger: state
    id: Kaffee
  - entity_id: input_button.milch
    trigger: state
    id: Milch
  - entity_id: input_button.brot
    trigger: state
    id: Brot
  - entity_id: input_button.eier
    trigger: state
    id: Eier
  conditions: []
  actions:
