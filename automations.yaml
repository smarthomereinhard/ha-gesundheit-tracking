- id: '1737120957713'
  alias: Badezimmer Licht bei Bewegung
  description: Licht einschalten, wenn Bewegung erkannt wird, und ausschalten, wenn
    keine Bewegung für 3 Minuten erkannt wird. Wenn der Shelly manuell eingeschaltet
    wird, werden Bewegungs- und Lichtsensor deaktiviert. Wenn der Shelly manuell ausgeschaltet
    wird, werden beide wieder aktiviert.
  triggers:
  - trigger: state
    entity_id: binary_sensor.hue_motion_sensor_3_bewegung
    from: 'off'
    to: 'on'
    id: bewegung_start
  - trigger: state
    entity_id: switch.plus1pm_switch_0
    from: 'off'
    to: 'on'
    id: shelly_manuell_an
  - trigger: state
    entity_id: switch.plus1pm_switch_0
    from: 'on'
    to: 'off'
    id: shelly_manuell_aus
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: bewegung_start
      - condition: state
        entity_id: switch.hue_motion_sensor_3_bewegungssensor_aktiviert
        state: 'on'
      sequence:
      - action: switch.turn_on
        target:
          entity_id: switch.plus1pm_switch_0
      - delay:
          minutes: 3
      - condition: state
        entity_id: binary_sensor.hue_motion_sensor_3_bewegung
        state: 'off'
      - action: switch.turn_off
        target:
          entity_id: switch.plus1pm_switch_0
    - conditions:
      - condition: trigger
        id: shelly_manuell_an
      - condition: template
        value_template: '{{ trigger.to_state.context.parent_id is none }}

          '
      sequence:
      - action: switch.turn_off
        target:
          entity_id:
          - switch.hue_motion_sensor_3_bewegungssensor_aktiviert
          - switch.hue_motion_sensor_3_lichtsensor_aktiviert
    - conditions:
      - condition: trigger
        id: shelly_manuell_aus
      - condition: template
        value_template: '{{ trigger.to_state.context.parent_id is none }}

          '
      sequence:
      - action: switch.turn_on
        target:
          entity_id:
          - switch.hue_motion_sensor_3_bewegungssensor_aktiviert
          - switch.hue_motion_sensor_3_lichtsensor_aktiviert
  mode: single
