- id: '1771691931205'
  alias: Schlafzimmer – Fenster offen Erinnerung
  description: Erinnerung per Push, falls das Fenster länger als 10 Minuten offen
    ist. Bestätigung bei Schließen.
  triggers:
  - id: open_10min
    alias: Fenster 10 Minuten offen
    entity_id: binary_sensor.ikea_sensor_7_tur
    to: 'on'
    for: 00:10:00
    trigger: state
  - id: closed
    alias: Fenster geschlossen
    entity_id: binary_sensor.ikea_sensor_7_tur
    to: 'off'
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: closed
      sequence:
      - parallel:
        - action: notify.mobile_app_andreas_iphone_15pro_max
          data:
            title: "\U0001FA9F Schlafzimmer"
            message: Das Fenster ist jetzt geschlossen.
        - action: notify.mobile_app_karo_iphone
          data:
