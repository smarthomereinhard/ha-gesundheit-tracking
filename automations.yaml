      produkt_name: '{{ trigger.id }}'
  - action: todo.get_items
    target:
      entity_id: todo.einkaufsliste_2
    data:
      status: needs_action
    response_variable: aktuelle_liste
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ aktuelle_liste[''todo.einkaufsliste_2''][''items''] |
          selectattr(''summary'', ''search'', produkt_name) | list | length > 0 }}'
      sequence:
      - variables:
          match: '{{ aktuelle_liste[''todo.einkaufsliste_2''][''items''] | selectattr(''summary'',
            ''search'', produkt_name) | list | first }}'
          aktuelle_anzahl: '{% set parts = match.summary.split(''x '') %} {{ parts[0]
            | int if parts | length > 1 and parts[0] | int > 0 else 1 }}'
          neue_anzahl: '{{ aktuelle_anzahl + 1 }}'
      - action: todo.update_item
        target:
          entity_id: todo.einkaufsliste_2
        data:
          item: '{{ match.summary }}'
          rename: '{{ neue_anzahl }}x {{ produkt_name }}'
    - conditions: []
      sequence:
      - action: todo.add_item
        target:
          entity_id: todo.einkaufsliste_2
        data:
          item: 1x {{ produkt_name }}
