- id: '1736169864036'
  alias: Haustüre – Licht Eingang & Benachrichtigung
  description: Schaltet das Licht im Eingangsbereich beim Öffnen der Haustüre ein
    und sendet eine Benachrichtigung beim Öffnen und Schließen. Das Licht schaltet
    sich je nach Tageszeit unterschiedlich lange aus.
  triggers:
  - alias: Haustüre geöffnet
    type: opened
    device_id: 6359a6bb3fc290f983360c56a85086d4
    entity_id: da19cf8798b9d9b565da7d77eaaa3e85
    domain: binary_sensor
    id: door_opened
    trigger: device
  - alias: Haustüre geschlossen
    type: not_opened
    device_id: 6359a6bb3fc290f983360c56a85086d4
    entity_id: da19cf8798b9d9b565da7d77eaaa3e85
    domain: binary_sensor
    id: door_closed
    trigger: device
  conditions: []
  actions:
  - parallel:
    - alias: Benachrichtigung an Andreas
      data:
        title: "\U0001F6AA Haustüre"
        message: '{% if trigger.id == ''door_opened'' %}Geöffnet{% else %}Geschlossen{%
          endif %}

          '
      action: notify.mobile_app_andreas_iphone_15pro_max
    - alias: Benachrichtigung an Karo
      data:
        title: "\U0001F6AA Haustüre"
        message: '{% if trigger.id == ''door_opened'' %}Geöffnet{% else %}Geschlossen{%
          endif %}

          '
      action: notify.mobile_app_karo_iphone
      enabled: false
    - action: telegram_bot.send_message
      data:
        chat_id: 988178587
        parse_mode: html
        message: "{% if trigger.id == 'door_opened' %}\n  \U0001F6AA Haustüre wurde
          geöffnet\n{% else %}\n  \U0001F6AA Haustüre wurde geschlossen\n{% endif
          %}\n"
  - if:
    - condition: trigger
      id: door_opened
    then:
    - choose:
      - conditions:
        - alias: Zeitfenster morgens 04:00–08:00
          condition: time
          after: 04:00:00
          before: 08:00:00
        sequence:
        - alias: Licht Eingang auf 100% einschalten
          target:
            area_id: eingang
          data:
            brightness_pct: 100
          action: light.turn_on
        - alias: Warten bis Haustüre geschlossen ist
          wait_for_trigger:
          - type: not_opened
            device_id: 6359a6bb3fc290f983360c56a85086d4
            entity_id: da19cf8798b9d9b565da7d77eaaa3e85
            domain: binary_sensor
            trigger: device
          timeout: 00:10:00
          continue_on_timeout: false
        - alias: 2 Minuten Nachlauf
          delay: 00:02:00
        - alias: Licht Eingang ausschalten
          target:
            area_id: eingang
          data:
            transition: 10
          action: light.turn_off
      - conditions: []
        sequence:
        - alias: Licht Eingang auf 100% einschalten
          target:
            area_id: eingang
          data:
            brightness_pct: 100
          action: light.turn_on
        - alias: 5 Minuten warten
          delay: 00:05:00
        - alias: Licht Eingang ausschalten
          target:
            area_id: eingang
          data:
            transition: 10
          action: light.turn_off
  mode: single
