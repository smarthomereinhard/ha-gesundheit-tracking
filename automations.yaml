- id: '1774207000000'
  alias: The Frame (32) – Zeitfenster Art Mode nur bei Anwesenheit
  description: Schaltet den 32er The Frame morgens 04:00–07:00 und abends 16:00–21:00
    in den Art Mode. Nur bei Anwesenheit. Außerhalb der Zeitfenster oder bei Abwesenheit
    wird der TV vollständig ausgeschaltet.
  triggers:
  - id: morning_on
    trigger: time
    at: 04:00:00
  - id: morning_off
    trigger: time
    at: 07:00:00
  - id: evening_on
    trigger: time
    at: '16:00:00'
  - id: evening_off
    trigger: time
    at: '21:00:00'
  - id: arrived_home
    trigger: state
    entity_id: person.andreas
    to: home
  - id: left_home
    trigger: state
    entity_id: person.andreas
    from: home
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - morning_on
        - evening_on
      - condition: state
        entity_id: input_boolean.automationen_ein_aus
        state: 'on'
      - condition: state
        entity_id: person.andreas
        state: home
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: media_player.the_frame_32_2
            state: 'off'
          sequence:
          - alias: The Frame einschalten
            action: media_player.turn_on
            target:
              entity_id: media_player.the_frame_32_2
      - alias: Auf TV-Start warten
        wait_template: '{{ not is_state(''media_player.the_frame_32_2'', ''off'')
          }}'
        timeout: 00:00:20
        continue_on_timeout: true
      - choose:
        - conditions:
          - condition: state
            entity_id: media_player.the_frame_32_2
            state: 'off'
          sequence:
          - alias: Zweiter Einschaltversuch
            action: media_player.turn_on
            target:
              entity_id: media_player.the_frame_32_2
          - wait_template: '{{ not is_state(''media_player.the_frame_32_2'', ''off'')
              }}'
            timeout: 00:00:20
            continue_on_timeout: true
      - condition: not
        conditions:
        - condition: state
          entity_id: media_player.the_frame_32_2
          state: 'off'
      - delay:
          seconds: 3
      - alias: Art Mode aktivieren
        action: samsungtv_smart.set_art_mode
        data:
          entity_id: media_player.the_frame_32_2
    - conditions:
      - condition: trigger
        id: arrived_home
      - condition: state
        entity_id: input_boolean.automationen_ein_aus
        state: 'on'
      - condition: or
        conditions:
        - condition: time
          after: 04:00:00
          before: 07:00:00
        - condition: time
          after: '16:00:00'
          before: '21:00:00'
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: media_player.the_frame_32_2
            state: 'off'
          sequence:
          - alias: The Frame einschalten
            action: media_player.turn_on
            target:
              entity_id: media_player.the_frame_32_2
      - alias: Auf TV-Start warten
        wait_template: '{{ not is_state(''media_player.the_frame_32_2'', ''off'')
          }}'
        timeout: 00:00:20
        continue_on_timeout: true
      - choose:
        - conditions:
          - condition: state
            entity_id: media_player.the_frame_32_2
            state: 'off'
          sequence:
          - alias: Zweiter Einschaltversuch
            action: media_player.turn_on
            target:
              entity_id: media_player.the_frame_32_2
          - wait_template: '{{ not is_state(''media_player.the_frame_32_2'', ''off'')
              }}'
            timeout: 00:00:20
            continue_on_timeout: true
      - condition: not
        conditions:
        - condition: state
          entity_id: media_player.the_frame_32_2
          state: 'off'
      - delay:
          seconds: 3
      - alias: Art Mode aktivieren
        action: samsungtv_smart.set_art_mode
        data:
          entity_id: media_player.the_frame_32_2
    - conditions:
      - condition: trigger
        id:
        - morning_off
        - evening_off
      - condition: not
        conditions:
        - condition: state
          entity_id: media_player.the_frame_32_2
          state: 'off'
      sequence:
      - alias: The Frame vollständig ausschalten
        action: media_player.turn_off
        target:
          entity_id: media_player.the_frame_32_2
    - conditions:
      - condition: trigger
        id: left_home
      - condition: not
        conditions:
        - condition: state
          entity_id: media_player.the_frame_32_2
          state: 'off'
      - condition: or
        conditions:
        - condition: time
          after: 04:00:00
          before: 07:00:00
        - condition: time
          after: '16:00:00'
          before: '21:00:00'
      sequence:
      - alias: The Frame bei Abwesenheit ausschalten
        action: media_player.turn_off
        target:
          entity_id: media_player.the_frame_32_2
  mode: single
