- id: wohnzimmer_bewegung_art_mode
  alias: Wohnzimmer – Licht bei Bewegung mit Sofort-An/Aus
  description: Schaltet die Deckenlampe bei Bewegung ein und aus.
  triggers:
  - entity_id: binary_sensor.presence_sensor_fp2_c965_presence_sensor_3
    to: 'on'
    id: motion_on
    trigger: state
  - entity_id: binary_sensor.presence_sensor_fp2_c965_presence_sensor_3
    to: 'off'
    id: motion_off
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion_on
      - condition: or
        conditions:
        - condition: sun
          after: sunset
        - condition: sun
          before: sunrise
      sequence:
      - target:
          entity_id: light.deckenlampe
        action: light.turn_on
        data:
          brightness_pct: 50
          transition: 5
    - conditions:
      - condition: trigger
        id: motion_off
      sequence:
      - target:
          entity_id: light.deckenlampe
        action: light.turn_off
        data:
          transition: 37
  mode: restart
- id: '1774773519549'
  alias: Wohnzimmer Licht – Präsenz FP2
  description: 'Deckenlampe an wenn jemand im Wohnzimmer ist und es dunkel genug ist.
    Tag: nur unter 75 lx. Nacht: immer.'
  triggers:
  - entity_id: binary_sensor.presence_sensor_fp2_c965_presence_sensor_3
    to: 'on'
    id: belegt
    trigger: state
  - entity_id: binary_sensor.presence_sensor_fp2_c965_presence_sensor_3
    to: 'off'
    id: frei
    trigger: state
  conditions:
  - condition: state
    entity_id: input_boolean.automationen_ein_aus
    state: 'on'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: belegt
      - condition: time
        after: 04:00:00
        before: 06:00:00
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.deckenlampe
        data:
          brightness_pct: 20
          color_temp_kelvin: 2700
          transition: 2
    - conditions:
      - condition: trigger
        id: belegt
      - condition: time
        after: 06:00:00
        before: '21:00:00'
      - condition: numeric_state
        entity_id: sensor.presence_sensor_fp2_c965_light_sensor_light_level
        below: 75
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.deckenlampe
        data:
          brightness_pct: 100
          color_temp_kelvin: 4000
          transition: 2
    - conditions:
      - condition: trigger
        id: belegt
      - condition: or
        conditions:
        - condition: time
          after: '21:00:00'
        - condition: time
          before: 04:00:00
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.deckenlampe
        data:
          brightness_pct: 30
          color_temp_kelvin: 2700
          transition: 2
    - conditions:
      - condition: trigger
        id: frei
      sequence:
      - wait_template: '{{ is_state(''binary_sensor.presence_sensor_fp2_c965_presence_sensor_3'',
          ''off'') }}'
      - choose:
        - conditions:
          - condition: time
            after: 06:00:00
            before: '21:00:00'
          sequence:
          - delay:
              minutes: 2
        default:
        - delay:
            seconds: 30
      - condition: state
        entity_id: binary_sensor.presence_sensor_fp2_c965_presence_sensor_3
        state: 'off'
      - action: light.turn_off
        target:
          entity_id: light.deckenlampe
        data:
          transition: 5
  - action: automation.turn_on
    target:
      entity_id: automation.wohnzimmer_licht_prasenz_fp2
  mode: restart
